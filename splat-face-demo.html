<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Lite — Gaussian Splat + Face Tracking</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #050210;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Georgia', serif;
    color: #c8a96e;
    user-select: none;
  }

  /* ── Splat 뷰어 컨테이너 ── */
  #splat-container {
    position: absolute;
    inset: 0;
  }
  #splat-container canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  /* ── 로딩 화면 ── */
  #loading {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: #050210;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 18px;
    transition: opacity .6s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }

  .loading-rune {
    font-size: 48px;
    opacity: .4;
    animation: spin 8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-title {
    font-size: 18px;
    letter-spacing: 6px;
    text-transform: uppercase;
    opacity: .9;
  }
  .loading-bar-bg {
    width: 280px; height: 2px;
    background: rgba(200,169,110,.15);
    border-radius: 2px;
  }
  .loading-bar {
    height: 100%;
    background: linear-gradient(to right, #7a5020, #c8a96e);
    border-radius: 2px;
    width: 0%;
    transition: width .4s ease;
  }
  .loading-status {
    font-size: 11px;
    letter-spacing: 2px;
    opacity: .5;
    text-transform: uppercase;
  }

  /* ── 씬 선택 바 ── */
  #scene-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 200;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 20px;
    background: linear-gradient(to bottom, rgba(0,0,0,.7) 0%, transparent 100%);
  }
  #scene-bar label {
    font-size: 11px;
    letter-spacing: 2px;
    opacity: .5;
    white-space: nowrap;
  }
  #splat-url {
    flex: 1;
    background: rgba(0,0,0,.5);
    border: 1px solid rgba(200,169,110,.25);
    color: #c8a96e;
    padding: 6px 10px;
    font-size: 11px;
    font-family: monospace;
    outline: none;
  }
  #splat-url:focus { border-color: rgba(200,169,110,.6); }

  .btn {
    background: rgba(200,169,110,.12);
    border: 1px solid rgba(200,169,110,.35);
    color: #c8a96e;
    padding: 6px 14px;
    font-size: 11px;
    letter-spacing: 1px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .2s;
  }
  .btn:hover { background: rgba(200,169,110,.25); }

  /* 프리셋 씬 버튼들 */
  .scene-presets {
    display: flex;
    gap: 6px;
  }
  .preset-btn {
    background: rgba(200,169,110,.08);
    border: 1px solid rgba(200,169,110,.2);
    color: rgba(200,169,110,.6);
    padding: 4px 10px;
    font-size: 10px;
    letter-spacing: 1px;
    cursor: pointer;
    transition: all .2s;
  }
  .preset-btn:hover, .preset-btn.active {
    background: rgba(200,169,110,.2);
    color: #c8a96e;
    border-color: rgba(200,169,110,.5);
  }

  /* ── 웹캠 프리뷰 ── */
  #webcam-preview {
    position: fixed;
    bottom: 20px; right: 20px;
    z-index: 150;
    width: 160px; height: 120px;
    border: 1px solid rgba(200,169,110,.25);
    border-radius: 3px;
    overflow: hidden;
    background: #000;
    transition: opacity .3s;
  }
  #webcam-preview.hidden { opacity: 0; pointer-events: none; }
  #webcam {
    width: 100%; height: 100%;
    object-fit: cover;
    transform: scaleX(-1); /* 미러링 */
  }
  #webcam-label {
    position: absolute;
    bottom: 4px; left: 6px;
    font-size: 9px;
    letter-spacing: 1px;
    color: rgba(200,169,110,.5);
  }

  /* ── Face 포인터 (화면 중앙 기준 위치 표시) ── */
  #face-cursor {
    position: fixed;
    z-index: 150;
    pointer-events: none;
    transform: translate(-50%, -50%);
    transition: opacity .3s;
    opacity: 0;
  }
  #face-cursor .ring {
    width: 20px; height: 20px;
    border: 1px solid rgba(200,169,110,.6);
    border-radius: 50%;
    animation: ring-pulse 2s ease-in-out infinite;
  }
  @keyframes ring-pulse {
    0%,100% { transform: scale(1); opacity: .6; }
    50%      { transform: scale(1.4); opacity: .2; }
  }

  /* ── 하단 상태바 ── */
  #status-bar {
    position: fixed;
    bottom: 20px; left: 20px;
    z-index: 150;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .status-item {
    font-size: 10px;
    letter-spacing: 1.5px;
    opacity: .45;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .status-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #666;
  }
  .status-dot.green { background: #4caf50; }
  .status-dot.yellow { background: #ff9800; }
  .status-dot.red { background: #f44336; }

  /* ── 컨트롤 힌트 ── */
  #controls-hint {
    position: fixed;
    bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 150;
    font-size: 10px;
    letter-spacing: 2px;
    opacity: .3;
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* ── 비녜트 오버레이 ── */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 100;
    pointer-events: none;
    background: radial-gradient(
      ellipse at 50% 50%,
      transparent 40%,
      rgba(0,0,0,.45) 78%,
      rgba(0,0,0,.88) 100%
    );
  }

  /* ── 에러 메시지 ── */
  #error-msg {
    position: fixed;
    inset: 0;
    z-index: 500;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    background: rgba(0,0,0,.85);
  }
  #error-msg.show { display: flex; }
  #error-text {
    font-size: 13px;
    opacity: .7;
    letter-spacing: 1px;
    max-width: 500px;
    text-align: center;
    line-height: 1.8;
  }
</style>
</head>
<body>

<!-- ── 로딩 화면 ── -->
<div id="loading">
  <div class="loading-rune">⬡</div>
  <div class="loading-title">Entering the Realm</div>
  <div class="loading-bar-bg">
    <div class="loading-bar" id="progress-bar"></div>
  </div>
  <div class="loading-status" id="loading-status">Initializing...</div>
</div>

<!-- ── 씬 선택 바 ── -->
<div id="scene-bar">
  <label>SCENE</label>
  <div class="scene-presets">
    <button class="preset-btn active" onclick="loadPreset('garden')">Garden</button>
    <button class="preset-btn" onclick="loadPreset('treehill')">Treehill</button>
  </div>
  <input id="splat-url" type="text" placeholder="Or enter a .splat / .ply URL directly...">
  <button class="btn" onclick="loadCustomUrl()">Load</button>
</div>

<!-- ── Splat 뷰어 ── -->
<div id="splat-container"></div>

<!-- ── 오버레이 ── -->
<div class="vignette"></div>

<!-- ── 웹캠 프리뷰 ── -->
<div id="webcam-preview">
  <video id="webcam" autoplay playsinline muted></video>
  <div id="webcam-label">FACE TRACKING</div>
</div>

<!-- ── Face 커서 ── -->
<div id="face-cursor"><div class="ring"></div></div>

<!-- ── 상태바 ── -->
<div id="status-bar">
  <div class="status-item">
    <div class="status-dot" id="dot-splat"></div>
    <span id="status-splat">Splat: Loading</span>
  </div>
  <div class="status-item">
    <div class="status-dot" id="dot-face"></div>
    <span id="status-face">Face: Standby</span>
  </div>
  <div class="status-item">
    <div class="status-dot" id="dot-cam"></div>
    <span id="status-cam">Webcam: Connecting</span>
  </div>
</div>

<div id="controls-hint">Rotate your head to shift perspective · W toggle webcam</div>

<!-- ── 에러 패널 ── -->
<div id="error-msg">
  <div style="font-size:24px; opacity:.3">⚠</div>
  <div id="error-text"></div>
  <button class="btn" onclick="document.getElementById('error-msg').classList.remove('show')">Close</button>
</div>


<script src="coi-serviceworker.min.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/": "https://cdn.jsdelivr.net/npm/three@0.176.0/"
  }
}
</script>
<script type="module">
(async () => {
// ════════════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════════════

const PRESETS = {
  garden:   'https://huggingface.co/datasets/dylanebert/3dgs/resolve/main/garden/garden-7k.splat',
  treehill: 'https://huggingface.co/cakewalk/splat-data/resolve/main/treehill.splat',
};

const CAMERA_PRESETS = {
  garden:   { pos: [0, -2, 6], lookAt: [0, 0, 0] },
  treehill: { pos: [0, -8, 6], lookAt: [0, 0, 0] },
};

// Face tracking → 카메라 이동 강도 (단위: 씬 스케일)
const FACE_STRENGTH = 1.5;
// Smoothing (0=즉각, 1=고정)
const SMOOTH = 0.08;

// ════════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════════

let viewer        = null;
let faceLandmarker = null;
let rawFX = 0, rawFY = 0;      // raw face position (-1 ~ 1)
let smFX  = 0, smFY  = 0;      // smoothed
let faceDetected  = false;
let baseCamPos    = null;       // Three.js Vector3
let lookAtPos     = { x: 0, y: 0, z: 0 };
let currentPreset = 'bonsai';
let webcamActive  = false;

// ════════════════════════════════════════════════════════════
//  UI HELPERS
// ════════════════════════════════════════════════════════════

const $ = id => document.getElementById(id);

function setProgress(pct, msg) {
  $('progress-bar').style.width = pct + '%';
  $('loading-status').textContent = msg;
}

function setStatus(key, state, msg) {
  // state: 'green' | 'yellow' | 'red' | ''
  $('dot-' + key).className = 'status-dot ' + state;
  $('status-' + key).textContent = msg;
}

function showError(msg) {
  $('error-text').textContent = msg;
  $('error-msg').classList.add('show');
}

// ════════════════════════════════════════════════════════════
//  STEP 1 — 라이브러리 로딩
// ════════════════════════════════════════════════════════════

setProgress(5, 'Loading Gaussian Splatting library...');

// CDN 순서대로 fallback 시도
const GS3D_URLS = [
  './node_modules/@mkkellogg/gaussian-splats-3d/build/gaussian-splats-3d.module.js',  // 로컬 npm (가장 안정)
  'https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.7/build/gaussian-splats-3d.module.min.js',
  'https://cdn.jsdelivr.net/npm/@mkkellogg/gaussian-splats-3d@0.4.1/build/gaussian-splats-3d.module.min.js',
];

let GS3D;
for (const url of GS3D_URLS) {
  try {
    setProgress(10, `Loading library... ${url.includes('node_modules') ? '(local)' : '(CDN)'}`);
    GS3D = await import(url);
    console.log('✅ gaussian-splats-3d 로드 성공:', url);
    break;
  } catch(e) {
    console.warn('⚠️ 로드 실패, 다음 시도:', url, e.message);
  }
}

if (!GS3D) {
  showError(
    'Failed to load Gaussian Splatting library.\n\n' +
    'Run the following in your terminal, then refresh:\n\n' +
    '  cd DND-lite\n' +
    '  npm install @mkkellogg/gaussian-splats-3d\n\n' +
    '(keep the server running)'
  );
  setProgress(100, 'Failed — see terminal instructions');
  return;
}

const GSViewer = GS3D.Viewer || GS3D.default;

// ════════════════════════════════════════════════════════════
//  STEP 2 — MediaPipe Face Landmarker
// ════════════════════════════════════════════════════════════

setProgress(20, 'Loading face tracking model...');

const MP_URLS = [
  './node_modules/@mediapipe/tasks-vision/vision_bundle.mjs',  // 로컬 npm
  'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs',
  'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/vision_bundle.mjs',
];

let FaceLandmarker, FilesetResolver;
for (const url of MP_URLS) {
  try {
    const mp = await import(url);
    FaceLandmarker  = mp.FaceLandmarker;
    FilesetResolver = mp.FilesetResolver;
    if (FaceLandmarker) { console.log('✅ MediaPipe 로드 성공:', url); break; }
  } catch(e) {
    console.warn('⚠️ MediaPipe 로드 실패:', url, e.message);
  }
}
if (!FaceLandmarker) {
  console.warn('MediaPipe 로드 실패 → 마우스 fallback');
  setStatus('face', 'yellow', 'Face: mouse fallback');
}

if (FaceLandmarker) {
  try {
    const filesetResolver = await FilesetResolver.forVisionTasks(
      'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm'
    );
    faceLandmarker = await FaceLandmarker.createFromOptions(filesetResolver, {
      baseOptions: {
        modelAssetPath:
          'https://storage.googleapis.com/mediapipe-models/face_landmarker/face_landmarker/float16/1/face_landmarker.task',
        delegate: 'GPU',
      },
      runningMode: 'VIDEO',
      numFaces: 1,
      outputFacialTransformationMatrixes: true,
    });
    setStatus('face', 'yellow', 'Face: Ready (awaiting webcam)');
  } catch(e) {
    console.warn('FaceLandmarker 초기화 실패:', e);
    setStatus('face', 'red', 'Face: Init failed');
  }
}

// ════════════════════════════════════════════════════════════
//  STEP 3 — 웹캠 연결
// ════════════════════════════════════════════════════════════

setProgress(40, 'Connecting webcam...');

const webcamEl = $('webcam');
try {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: 'user', width: 320, height: 240 }
  });
  webcamEl.srcObject = stream;
  await new Promise(res => webcamEl.onloadedmetadata = res);
  webcamEl.play();
  webcamActive = true;
  setStatus('cam', 'green', 'Webcam: Connected');
} catch(e) {
  $('webcam-preview').classList.add('hidden');
  setStatus('cam', 'yellow', 'Webcam: None (mouse mode)');
  // 마우스 fallback
  document.addEventListener('mousemove', e => {
    rawFX = -((e.clientX / window.innerWidth  - 0.5) * 2);
    rawFY = -((e.clientY / window.innerHeight - 0.5) * 2);
    faceDetected = true;
  });
}

// ════════════════════════════════════════════════════════════
//  STEP 4 — Face tracking 루프
// ════════════════════════════════════════════════════════════

function startFaceLoop() {
  if (!faceLandmarker || !webcamActive) return;

  function detect() {
    if (webcamEl.readyState >= 2) {
      try {
        const results = faceLandmarker.detectForVideo(webcamEl, performance.now());

        if (results.facialTransformationMatrixes?.length > 0) {
          // 4x4 column-major matrix → yaw(Y축) / pitch(X축) 추출
          const m = results.facialTransformationMatrixes[0].data;
          // yaw:   atan2(-m[2], sqrt(m[6]²+m[10]²))  → 좌우 회전
          // pitch: atan2(m[6], m[10])                 → 상하 회전
          const yaw   = Math.atan2(-m[2],  Math.sqrt(m[6]*m[6] + m[10]*m[10]));
          const pitch  = Math.atan2(m[6],  m[10]);
          // 라디안 → -1~1 정규화 (±30° 범위 기준)
          rawFX = yaw   / (Math.PI / 12);
          rawFY = pitch / (Math.PI / 6);
          faceDetected = true;
          setStatus('face', 'green', `Yaw ${(yaw*180/Math.PI).toFixed(1)}°  Pitch ${(pitch*180/Math.PI).toFixed(1)}°`);
        } else {
          faceDetected = false;
          setStatus('face', 'yellow', 'Face: Not detected');
        }
      } catch(e) { /* ignore per-frame errors */ }
    }
    requestAnimationFrame(detect);
  }
  detect();
}
startFaceLoop();

// ════════════════════════════════════════════════════════════
//  STEP 5 — Gaussian Splat 씬 로딩
// ════════════════════════════════════════════════════════════

async function loadScene(url, preset) {
  $('loading').classList.remove('hidden');
  setProgress(50, 'Initializing scene...');
  setStatus('splat', 'yellow', 'Splat: Loading...');

  // 기존 뷰어 정리
  if (viewer) {
    try { viewer.dispose(); } catch(e) {}
    $('splat-container').innerHTML = '';
  }

  // 카메라 파라미터
  const camCfg = CAMERA_PRESETS[preset] || CAMERA_PRESETS.bonsai;
  lookAtPos = { x: camCfg.lookAt[0], y: camCfg.lookAt[1], z: camCfg.lookAt[2] };

  try {
    viewer = new GSViewer({
      rootElement: $('splat-container'),
      cameraUp: [0, -1, 0],
      initialCameraPosition: camCfg.pos,
      initialCameraLookAt:   camCfg.lookAt,
      selfDrivenMode: true,
    });

    setProgress(60, 'Downloading scene... (may be tens of MB, please wait)');

    await viewer.addSplatScene(url, {
      showLoadingUI: false,
    });

    // 컨트롤 비활성화 (face tracking 전용)
    if (viewer.controls) viewer.controls.enabled = false;

    // 베이스 카메라 위치 저장
    baseCamPos = viewer.camera.position.clone();

    setProgress(100, 'Done!');
    setStatus('splat', 'green', 'Splat: ' + (preset || 'custom'));

    viewer.start();

    // 페이드 아웃
    setTimeout(() => {
      $('loading').classList.add('hidden');
      startCameraLoop();
    }, 500);

  } catch(e) {
    setProgress(100, 'Load failed');
    setStatus('splat', 'red', 'Splat: Failed');
    $('loading').classList.add('hidden');
    showError(
      `Scene load failed: ${e.message}\n\n` +
      `• The file URL may be blocked by CORS policy.\n` +
      `• This page must be served from localhost or HTTPS.\n` +
      `• Try hosting the .splat file yourself or use a different URL.`
    );
    console.error(e);
  }
}

// ════════════════════════════════════════════════════════════
//  STEP 6 — 카메라 오프셋 루프 (핵심!)
// ════════════════════════════════════════════════════════════

function startCameraLoop() {
  function tick() {
    if (!viewer?.camera || !baseCamPos) {
      requestAnimationFrame(tick);
      return;
    }

    // Smoothing
    smFX += (rawFX - smFX) * SMOOTH;
    smFY += (rawFY - smFY) * SMOOTH;

    // 카메라 위치 = 베이스 + face offset
    // 얼굴이 오른쪽 → 카메라가 왼쪽으로 → 씬이 오른쪽으로 이동 (시차 효과)
    viewer.camera.position.x = baseCamPos.x + smFX * FACE_STRENGTH;
    viewer.camera.position.y = baseCamPos.y - smFY * FACE_STRENGTH;

    // 항상 같은 포인트를 바라봄 (head-coupled perspective 효과)
    viewer.camera.lookAt(lookAtPos.x, lookAtPos.y, lookAtPos.z);

    // Face 커서 UI 업데이트
    if (faceDetected) {
      const cx = window.innerWidth  / 2 + smFX * window.innerWidth  * 0.25;
      const cy = window.innerHeight / 2 + smFY * window.innerHeight * 0.25;
      $('face-cursor').style.left    = cx + 'px';
      $('face-cursor').style.top     = cy + 'px';
      $('face-cursor').style.opacity = '1';
    } else {
      $('face-cursor').style.opacity = '0';
    }

    requestAnimationFrame(tick);
  }
  tick();
}

// ════════════════════════════════════════════════════════════
//  PUBLIC — 씬 프리셋/커스텀 로딩
// ════════════════════════════════════════════════════════════

window.loadPreset = (key) => {
  currentPreset = key;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  loadScene(PRESETS[key], key);
};

window.loadCustomUrl = () => {
  const url = $('splat-url').value.trim();
  if (!url) return;
  document.querySelectorAll('.preset-btn').forEach(b => b.classList.remove('active'));
  loadScene(url, 'custom');
};

// ════════════════════════════════════════════════════════════
//  키보드 단축키
// ════════════════════════════════════════════════════════════

document.addEventListener('keydown', e => {
  // W — 웹캠 프리뷰 토글
  if (e.key === 'w' || e.key === 'W') {
    $('webcam-preview').classList.toggle('hidden');
  }
  // Space — 베이스 카메라 리셋
  if (e.key === ' ' && viewer?.camera) {
    baseCamPos = viewer.camera.position.clone();
  }
});
