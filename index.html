<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Lite</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    color: #c8a96e;
  }
  h1 {
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(200,169,110,.4);
    margin-bottom: 48px;
  }
  #role-picker {
    display: flex;
    gap: 16px;
    margin-bottom: 40px;
  }
  .role-btn {
    padding: 14px 40px;
    background: rgba(200,169,110,.06);
    border: 1px solid rgba(200,169,110,.2);
    border-radius: 4px;
    color: rgba(200,169,110,.55);
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Georgia', serif;
    transition: all .2s;
  }
  .role-btn:hover, .role-btn.active {
    background: rgba(200,169,110,.18);
    border-color: rgba(200,169,110,.5);
    color: #ffe9a0;
  }
  .section { display: none; }
  .section.visible { display: flex; flex-direction: column; align-items: center; }
  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
    width: 260px;
  }
  label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(200,169,110,.4);
  }
  input, select {
    background: rgba(200,169,110,.06);
    border: 1px solid rgba(200,169,110,.25);
    border-radius: 4px;
    padding: 10px 14px;
    color: #ffe9a0;
    font-size: 16px;
    letter-spacing: 2px;
    font-family: 'Georgia', serif;
    width: 100%;
  }
  input:focus, select:focus { outline: none; border-color: rgba(200,169,110,.6); }
  input::placeholder { color: rgba(200,169,110,.2); letter-spacing: 2px; }
  select option { background: #1a1a1a; color: #c8a96e; }
  #code-input {
    font-size: 24px;
    letter-spacing: 8px;
    text-align: center;
    text-transform: uppercase;
    font-family: monospace;
  }
  #code-input::placeholder { font-size: 14px; letter-spacing: 4px; }
  button {
    display: block;
    width: 260px;
    padding: 12px;
    background: rgba(200,169,110,.08);
    border: 1px solid rgba(200,169,110,.3);
    border-radius: 4px;
    color: #c8a96e;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Georgia', serif;
    transition: all .2s;
    text-align: center;
    margin-top: 8px;
  }
  button:hover { background: rgba(200,169,110,.18); color: #ffe9a0; }
  button:disabled { opacity: .35; cursor: default; }
  .divider {
    width: 260px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0 8px;
  }
  .divider hr { flex: 1; border: none; border-top: 1px solid rgba(200,169,110,.12); }
  .divider span { font-size: 10px; letter-spacing: 3px; color: rgba(200,169,110,.25); text-transform: uppercase; }
  #btn-solo {
    background: transparent;
    border-color: rgba(200,169,110,.15);
    color: rgba(200,169,110,.4);
  }
  #btn-solo:hover { background: rgba(200,169,110,.08); color: rgba(200,169,110,.8); border-color: rgba(200,169,110,.3); }
  #status {
    margin-top: 20px;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(200,169,110,.35);
    text-transform: uppercase;
    height: 16px;
  }
  #dm-section a {
    display: block;
    width: 260px;
    padding: 14px;
    background: rgba(200,169,110,.08);
    border: 1px solid rgba(200,169,110,.3);
    border-radius: 4px;
    color: #c8a96e;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    text-decoration: none;
    transition: all .2s;
  }
  #dm-section a:hover { background: rgba(200,169,110,.18); color: #ffe9a0; }
  .dm-note {
    margin-top: 16px;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(200,169,110,.3);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<h1>D&D Lite</h1>

<div id="role-picker">
  <button class="role-btn" id="btn-dm">DM</button>
  <button class="role-btn active" id="btn-player">Player</button>
</div>

<div id="player-section" class="section visible">
  <div class="field">
    <label>Name</label>
    <input id="name-input" type="text" placeholder="Your name" maxlength="24" autocomplete="off">
  </div>
  <div class="field">
    <label>Class</label>
    <select id="role-select">
      <option value="warrior">Warrior</option>
      <option value="mage">Mage</option>
      <option value="rogue">Rogue</option>
      <option value="cleric">Cleric</option>
      <option value="ranger">Ranger</option>
    </select>
  </div>
  <div class="field">
    <label>Session Code</label>
    <input id="code-input" type="text" maxlength="4" placeholder="ABCD" autocomplete="off" spellcheck="false">
  </div>
  <button id="btn-join" disabled>Join Session</button>
  <div class="divider"><hr><span>or</span><hr></div>
  <button id="btn-solo">Play Solo</button>
  <div id="status"></div>
</div>

<div id="dm-section" class="section">
  <a href="scenes/dm/lobby.html">Open DM Lobby →</a>
  <p class="dm-note">Create a session · share the code with players</p>
</div>

<script type="module">
import { connect, send, on } from './scripts/game-socket.js';

const nameInput  = document.getElementById('name-input');
const roleSelect = document.getElementById('role-select');
const codeInput  = document.getElementById('code-input');
const btnJoin    = document.getElementById('btn-join');
const statusEl   = document.getElementById('status');

// Pre-fill from saved character
const existing = JSON.parse(localStorage.getItem('dndlite-character') || 'null');
if (existing) {
  nameInput.value = existing.name || '';
  roleSelect.value = existing.role || 'warrior';
}

// Role picker
document.getElementById('btn-dm').addEventListener('click', () => {
  document.getElementById('btn-dm').classList.add('active');
  document.getElementById('btn-player').classList.remove('active');
  document.getElementById('player-section').classList.remove('visible');
  document.getElementById('dm-section').classList.add('visible');
});

document.getElementById('btn-player').addEventListener('click', () => {
  document.getElementById('btn-player').classList.add('active');
  document.getElementById('btn-dm').classList.remove('active');
  document.getElementById('dm-section').classList.remove('visible');
  document.getElementById('player-section').classList.add('visible');
  statusEl.textContent = '';
});

function updateJoinBtn() {
  btnJoin.disabled = nameInput.value.trim().length === 0 || codeInput.value.length !== 4;
}
nameInput.addEventListener('input', updateJoinBtn);
codeInput.addEventListener('input', () => {
  codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  updateJoinBtn();
});

function saveCharacter() {
  localStorage.setItem('dndlite-character', JSON.stringify({
    name: nameInput.value.trim(),
    role: roleSelect.value,
  }));
}

let connected = false;
connect(() => { connected = true; statusEl.textContent = 'Connected'; });

on('joined', (msg) => {
  saveCharacter();
  localStorage.setItem('player-id', msg.playerId);
  localStorage.setItem('session-code', codeInput.value);
  localStorage.setItem('unlocked-stages', JSON.stringify(msg.unlockedStages));
  statusEl.textContent = 'Joined! Entering world…';
  setTimeout(() => { window.location.href = 'scenes/world-map.html'; }, 600);
});

on('error', (msg) => {
  statusEl.textContent = msg.message;
  updateJoinBtn();
});

on('_disconnect', () => {
  connected = false;
  statusEl.textContent = 'Server not reachable';
});

btnJoin.addEventListener('click', () => {
  if (!connected || !nameInput.value.trim()) return;
  btnJoin.disabled = true;
  statusEl.textContent = 'Joining…';
  send({ type: 'player_join', code: codeInput.value, name: nameInput.value.trim(), role: roleSelect.value });
});

document.getElementById('btn-solo').addEventListener('click', () => {
  if (!nameInput.value.trim()) { statusEl.textContent = 'Enter your name first'; return; }
  saveCharacter();
  localStorage.removeItem('session-code');
  localStorage.removeItem('player-id');
  localStorage.setItem('unlocked-stages', JSON.stringify(['stage_01', 'stage_02', 'stage_03']));
  window.location.href = 'scenes/world-map.html';
});
</script>
</body>
</html>
