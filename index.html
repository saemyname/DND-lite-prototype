<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Lite</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    color: #c8a96e;
    padding: 40px 16px;
  }
  h1 {
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(200,169,110,.4);
    margin-bottom: 48px;
  }
  #role-picker {
    display: flex;
    gap: 16px;
    margin-bottom: 40px;
  }
  .role-btn {
    padding: 14px 40px;
    background: rgba(200,169,110,.06);
    border: 1px solid rgba(200,169,110,.2);
    border-radius: 4px;
    color: rgba(200,169,110,.55);
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Georgia', serif;
    transition: all .2s;
    width: auto;
  }
  .role-btn:hover, .role-btn.active {
    background: rgba(200,169,110,.18);
    border-color: rgba(200,169,110,.5);
    color: #ffe9a0;
  }
  .section { display: none; }
  .section.visible { display: flex; flex-direction: column; align-items: center; }

  /* Class cards */
  .cc-roles {
    display: flex;
    gap: 20px;
    margin-bottom: 28px;
  }
  .cc-role-card {
    width: 210px;
    padding: 20px 18px;
    background: rgba(200,169,110,.04);
    border: 1px solid rgba(200,169,110,.15);
    border-radius: 6px;
    cursor: pointer;
    transition: all .2s;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .cc-role-card:hover {
    background: rgba(200,169,110,.09);
    border-color: rgba(200,169,110,.35);
  }
  .cc-role-card.selected {
    background: rgba(200,169,110,.12);
    border-color: rgba(200,169,110,.6);
  }
  .cc-role-icon {
    font-size: 26px;
    filter: grayscale(1);
    transition: filter .2s;
    margin-bottom: 2px;
  }
  .cc-role-card.selected .cc-role-icon { filter: grayscale(0); }
  .cc-role-name {
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #c8a96e;
  }
  .cc-role-desc {
    font-size: 10px;
    color: rgba(200,169,110,.4);
    line-height: 1.5;
    letter-spacing: .5px;
  }
  .cc-card-stats {
    display: flex;
    flex-direction: column;
    gap: 5px;
    border-top: 1px solid rgba(200,169,110,.1);
    padding-top: 10px;
    margin-top: 4px;
  }
  .cc-card-stat { display: flex; align-items: center; gap: 6px; }
  .cc-card-stat-name {
    font-size: 9px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: rgba(200,169,110,.4);
    width: 26px;
    text-align: right;
    flex-shrink: 0;
  }
  .cc-card-stat-bar {
    flex: 1;
    height: 3px;
    background: rgba(200,169,110,.1);
    border-radius: 2px;
    overflow: hidden;
  }
  .cc-card-stat-fill {
    height: 100%;
    border-radius: 2px;
    transition: width .4s ease;
  }
  .cc-card-stat-fill.stat-fill { background: linear-gradient(to right, #c8a96e, #ffe9a0); }
  .cc-card-stat-fill.hp-fill   { background: linear-gradient(to right, #c45050, #e85d5d); }
  .cc-card-stat-val {
    font-size: 10px;
    color: rgba(200,169,110,.6);
    width: 16px;
    text-align: right;
    flex-shrink: 0;
  }
  .cc-card-stat-val.hp-val { color: #e85d5d; }

  /* Text fields */
  .form-row {
    display: flex;
    gap: 16px;
    margin-bottom: 20px;
    width: 670px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .field.grow { flex: 1; }
  .field.shrink { flex: 0 0 180px; }
  label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(200,169,110,.4);
  }
  input {
    background: rgba(200,169,110,.06);
    border: 1px solid rgba(200,169,110,.25);
    border-radius: 4px;
    padding: 10px 14px;
    color: #ffe9a0;
    font-size: 16px;
    letter-spacing: 2px;
    font-family: 'Georgia', serif;
    width: 100%;
  }
  input:focus { outline: none; border-color: rgba(200,169,110,.6); }
  input::placeholder { color: rgba(200,169,110,.2); letter-spacing: 2px; }
  #code-input {
    font-size: 24px;
    letter-spacing: 8px;
    text-align: center;
    text-transform: uppercase;
    font-family: monospace;
  }
  #code-input::placeholder { font-size: 14px; letter-spacing: 4px; }
  button {
    display: block;
    width: 260px;
    padding: 12px;
    background: rgba(200,169,110,.08);
    border: 1px solid rgba(200,169,110,.3);
    border-radius: 4px;
    color: #c8a96e;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Georgia', serif;
    transition: all .2s;
    text-align: center;
    margin-top: 8px;
    width: 670px;
    min-width: 0;
  }
  button:hover { background: rgba(200,169,110,.18); color: #ffe9a0; }
  button:disabled { opacity: .35; cursor: default; }
  .divider {
    width: 670px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0 8px;
  }
  .divider hr { flex: 1; border: none; border-top: 1px solid rgba(200,169,110,.12); }
  .divider span { font-size: 10px; letter-spacing: 3px; color: rgba(200,169,110,.25); text-transform: uppercase; }
  #btn-solo {
    background: transparent;
    border-color: rgba(200,169,110,.15);
    color: rgba(200,169,110,.4);
  }
  #btn-solo:hover { background: rgba(200,169,110,.08); color: rgba(200,169,110,.8); border-color: rgba(200,169,110,.3); }
  #status {
    margin-top: 20px;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(200,169,110,.35);
    text-transform: uppercase;
    height: 16px;
  }
  #dm-section a {
    display: block;
    width: 260px;
    padding: 14px;
    background: rgba(200,169,110,.08);
    border: 1px solid rgba(200,169,110,.3);
    border-radius: 4px;
    color: #c8a96e;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-align: center;
    text-decoration: none;
    transition: all .2s;
  }
  #dm-section a:hover { background: rgba(200,169,110,.18); color: #ffe9a0; }
  .dm-note {
    margin-top: 16px;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(200,169,110,.3);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<h1>D&D Lite</h1>

<div id="role-picker">
  <button class="role-btn" id="btn-dm">DM</button>
  <button class="role-btn active" id="btn-player">Player</button>
</div>

<div id="player-section" class="section visible">

  <div class="cc-roles" id="cc-roles">
    <div class="cc-role-card" data-role="warrior">
      <div class="cc-role-icon">⚔️</div>
      <div class="cc-role-name">Warrior</div>
      <div class="cc-role-desc">Brute force and iron will. Survives what others cannot.</div>
      <div class="cc-card-stats"></div>
    </div>
    <div class="cc-role-card" data-role="rogue">
      <div class="cc-role-icon">🏹</div>
      <div class="cc-role-name">Rogue</div>
      <div class="cc-role-desc">Swift and silent. Strikes before you blink.</div>
      <div class="cc-card-stats"></div>
    </div>
    <div class="cc-role-card" data-role="mage">
      <div class="cc-role-icon">🔮</div>
      <div class="cc-role-name">Mage</div>
      <div class="cc-role-desc">Arcane knowledge and power. Bends reality itself.</div>
      <div class="cc-card-stats"></div>
    </div>
  </div>

  <div class="form-row">
    <div class="field grow">
      <label>Name</label>
      <input id="name-input" type="text" placeholder="Your name" maxlength="24" autocomplete="off">
    </div>
    <div class="field shrink">
      <label>Session Code</label>
      <input id="code-input" type="text" maxlength="4" placeholder="ABCD" autocomplete="off" spellcheck="false">
    </div>
  </div>
  <button id="btn-join" disabled>Join Session</button>
  <div class="divider"><hr><span>or</span><hr></div>
  <button id="btn-solo">Play Solo</button>
  <div id="status"></div>
</div>

<div id="dm-section" class="section">
  <a href="scenes/dm/lobby.html">Open DM Lobby →</a>
  <p class="dm-note">Create a session · share the code with players</p>
</div>

<script type="module">
import { connect, send, on } from './scripts/game-socket.js';

const ROLE_STATS = {
  warrior: { str: 14, agi: 10, int:  8, lck: 10, hp: 20 },
  rogue:   { str:  8, agi: 14, int: 10, lck: 12, hp: 14 },
  mage:    { str:  6, agi:  8, int: 14, lck: 12, hp: 12 },
};
const STAT_LABELS = [
  { key: 'str', label: 'STR', max: 20 },
  { key: 'agi', label: 'AGI', max: 20 },
  { key: 'int', label: 'INT', max: 20 },
  { key: 'lck', label: 'LCK', max: 20 },
  { key: 'hp',  label: 'HP',  max: 20 },
];

// Build stat bars inside each card
document.querySelectorAll('.cc-role-card').forEach(card => {
  const stats = ROLE_STATS[card.dataset.role];
  card.querySelector('.cc-card-stats').innerHTML = STAT_LABELS.map(s => {
    const isHp = s.key === 'hp';
    const pct = (stats[s.key] / s.max * 100);
    return `<div class="cc-card-stat">
      <span class="cc-card-stat-name">${s.label}</span>
      <div class="cc-card-stat-bar"><div class="cc-card-stat-fill ${isHp ? 'hp-fill' : 'stat-fill'}" style="width:${pct}%"></div></div>
      <span class="cc-card-stat-val ${isHp ? 'hp-val' : ''}">${stats[s.key]}</span>
    </div>`;
  }).join('');
});

const nameInput = document.getElementById('name-input');
const codeInput = document.getElementById('code-input');
const btnJoin   = document.getElementById('btn-join');
const statusEl  = document.getElementById('status');

let selectedRole = null;

function selectRole(role) {
  selectedRole = role;
  document.querySelectorAll('.cc-role-card').forEach(c => {
    c.classList.toggle('selected', c.dataset.role === role);
  });
  updateJoinBtn();
}

document.querySelectorAll('.cc-role-card').forEach(card => {
  card.addEventListener('click', () => selectRole(card.dataset.role));
});

// Pre-fill from saved character
const existing = JSON.parse(localStorage.getItem('dndlite-character') || 'null');
if (existing) {
  nameInput.value = existing.name || '';
  if (existing.role && ROLE_STATS[existing.role]) selectRole(existing.role);
}

// Role picker (DM / Player toggle)
document.getElementById('btn-dm').addEventListener('click', () => {
  document.getElementById('btn-dm').classList.add('active');
  document.getElementById('btn-player').classList.remove('active');
  document.getElementById('player-section').classList.remove('visible');
  document.getElementById('dm-section').classList.add('visible');
});

document.getElementById('btn-player').addEventListener('click', () => {
  document.getElementById('btn-player').classList.add('active');
  document.getElementById('btn-dm').classList.remove('active');
  document.getElementById('dm-section').classList.remove('visible');
  document.getElementById('player-section').classList.add('visible');
  statusEl.textContent = '';
});

function updateJoinBtn() {
  btnJoin.disabled = !selectedRole || nameInput.value.trim().length === 0 || codeInput.value.length !== 4;
}
nameInput.addEventListener('input', updateJoinBtn);
codeInput.addEventListener('input', () => {
  codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  updateJoinBtn();
});

function saveCharacter() {
  localStorage.setItem('dndlite-character', JSON.stringify({
    name: nameInput.value.trim(),
    role: selectedRole,
    ...ROLE_STATS[selectedRole],
  }));
}

let connected = false;
connect(() => { connected = true; statusEl.textContent = 'Connected'; });

on('joined', (msg) => {
  saveCharacter();
  localStorage.setItem('player-id', msg.playerId);
  localStorage.setItem('session-code', codeInput.value);
  localStorage.setItem('unlocked-stages', JSON.stringify(msg.unlockedStages));
  statusEl.textContent = 'Joined! Entering world…';
  setTimeout(() => { window.location.href = 'scenes/world-map.html'; }, 600);
});

on('error', (msg) => {
  statusEl.textContent = msg.message;
  updateJoinBtn();
});

on('_disconnect', () => {
  connected = false;
  statusEl.textContent = 'Server not reachable';
});

btnJoin.addEventListener('click', () => {
  if (!connected || !nameInput.value.trim() || !selectedRole) return;
  btnJoin.disabled = true;
  statusEl.textContent = 'Joining…';
  send({ type: 'player_join', code: codeInput.value, name: nameInput.value.trim(), role: selectedRole });
});

document.getElementById('btn-solo').addEventListener('click', () => {
  if (!nameInput.value.trim()) { statusEl.textContent = 'Enter your name first'; return; }
  if (!selectedRole) { statusEl.textContent = 'Choose a class first'; return; }
  saveCharacter();
  localStorage.removeItem('session-code');
  localStorage.removeItem('player-id');
  localStorage.setItem('unlocked-stages', JSON.stringify(['stage_01', 'stage_02', 'stage_03']));
  window.location.href = 'scenes/world-map.html';
});
</script>
</body>
</html>
