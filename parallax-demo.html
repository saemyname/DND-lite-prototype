<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Lite — Parallax Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Georgia', 'Times New Roman', serif;
  }

  .scene {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  /*
   * 각 레이어는 뷰포트보다 30% 크게 만들어
   * 마우스 이동 시 가장자리가 노출되지 않도록 함
   */
  .layer {
    position: absolute;
    width: 130%;
    height: 130%;
    top: -15%;
    left: -15%;
    will-change: transform;
    background-size: 100% 100%;   /* 투명 PNG 레이어 — 정확히 채움 */
    background-repeat: no-repeat;
    background-position: center;
  }

  /* 배경 레이어는 cover로 (투명 불필요) */
  #L0 {
    background-image: url('images/layer0-bg.png');
    background-size: cover;
    background-position: center;
  }

  /* 투명 PNG 레이어들 */
  #L1 { background-image: url('images/layer1-arch.png'); }
  #L2 { background-image: url('images/layer2-walls.png'); }
  #L3 { background-image: url('images/layer3-ceiling-floor.png'); }
  #L4 { background-image: url('images/layer4-pillars.png'); }
  #L5 { background-image: url('images/layer5-foreground.png'); }


  /* ─────────────────────────────────────────────
     CSS 오버레이 효과 (이미지 위에 얹히는 것들)
     이미지 퀄리티에 따라 on/off 조절 가능
  ───────────────────────────────────────────── */

  /* 횃불 빛 번짐 오버레이 (layer2 위에 절대 위치) */
  .torch-glow-overlay {
    position: absolute;
    width: 130%;
    height: 130%;
    top: -15%;
    left: -15%;
    will-change: transform;
    pointer-events: none;
  }

  @keyframes glow-pulse-left {
    0%,100% { opacity:.18; transform: scale(1); }
    30%      { opacity:.30; transform: scale(1.08); }
    60%      { opacity:.14; transform: scale(.95); }
  }
  @keyframes glow-pulse-right {
    0%,100% { opacity:.16; transform: scale(1); }
    40%      { opacity:.28; transform: scale(1.06); }
    70%      { opacity:.12; transform: scale(.97); }
  }

  .glow-left {
    position: absolute;
    /* 이미지에서 왼쪽 횃불 위치에 맞게 조정 */
    left: 20%; top: 28%;
    width: 18%; height: 22%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,140,0,.55) 0%, transparent 70%);
    animation: glow-pulse-left .8s ease-in-out infinite;
    transform-origin: center;
    mix-blend-mode: screen;
  }
  .glow-right {
    position: absolute;
    /* 이미지에서 오른쪽 횃불 위치에 맞게 조정 */
    right: 20%; top: 28%;
    width: 18%; height: 22%;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,140,0,.55) 0%, transparent 70%);
    animation: glow-pulse-right .9s ease-in-out infinite;
    transform-origin: center;
    mix-blend-mode: screen;
  }

  /* 전체 화면 비녜트 (가장 위에 고정) */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 50;
    pointer-events: none;
    background: radial-gradient(
      ellipse at 50% 50%,
      transparent 40%,
      rgba(0,0,0,.5) 75%,
      rgba(0,0,0,.92) 100%
    );
  }

  /* 상하 그림자 */
  .letterbox {
    position: fixed;
    inset: 0;
    z-index: 51;
    pointer-events: none;
    background:
      linear-gradient(to bottom,  rgba(0,0,0,.65) 0%, transparent 18%),
      linear-gradient(to top,     rgba(0,0,0,.75) 0%, transparent 22%);
  }

  /* 장소명 */
  .location-banner {
    position: fixed;
    top: 44px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    color: #c8a96e;
    font-size: 20px;
    letter-spacing: 5px;
    text-transform: uppercase;
    text-shadow: 0 0 24px rgba(200,169,110,.9), 0 0 60px rgba(200,169,110,.3);
    pointer-events: none;
    white-space: nowrap;
  }

  .hint {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    color: #7a6040;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    pointer-events: none;
    white-space: nowrap;
  }

  /* 이미지 로딩 전 fallback 배경 */
  #L0 { background-color: #080414; }
</style>
</head>
<body>

<div class="scene" id="scene">

  <!-- ════════════════════════════════
       LAYER 0 · 배경 (가장 느림)
       파일: images/layer0-bg.jpg
       권장: 2560×1440, JPG, 투명 불필요
       내용: 던전 안쪽 분위기, 원경, 마법빛
  ════════════════════════════════ -->
  <div class="layer" id="L0"></div>

  <!-- ════════════════════════════════
       LAYER 1 · 먼 아치/복도
       파일: images/layer1-arch.png
       권장: 2560×1440, PNG 투명배경
       내용: 중앙에 돌문/아치, 좌우는 투명
  ════════════════════════════════ -->
  <div class="layer" id="L1"></div>

  <!-- ════════════════════════════════
       LAYER 2 · 중간 벽 + 횃불
       파일: images/layer2-walls.png
       권장: 2560×1440, PNG 투명배경
       내용: 좌우 벽면 패널 + 횃불, 가운데 투명
  ════════════════════════════════ -->
  <div class="layer" id="L2">
    <!-- 횃불 빛 번짐: CSS 애니메이션 오버레이
         이미지 횃불 위치에 맞게 left/right/top 조정 -->
    <div class="glow-left"></div>
    <div class="glow-right"></div>
  </div>

  <!-- ════════════════════════════════
       LAYER 3 · 천장 + 바닥
       파일: images/layer3-ceiling-floor.png
       권장: 2560×1440, PNG 투명배경
       내용: 위쪽 천장 슬래브 + 아래 바닥, 가운데 투명
  ════════════════════════════════ -->
  <div class="layer" id="L3"></div>

  <!-- ════════════════════════════════
       LAYER 4 · 메인 기둥
       파일: images/layer4-pillars.png
       권장: 2560×1440, PNG 투명배경
       내용: 좌우 돌기둥 2개, 가운데 투명
  ════════════════════════════════ -->
  <div class="layer" id="L4"></div>

  <!-- ════════════════════════════════
       LAYER 5 · 전경 (가장 빠름)
       파일: images/layer5-foreground.png
       권장: 2560×1440, PNG 투명배경
       내용: 가장 어두운 전경 기둥 실루엣, 가운데 투명
  ════════════════════════════════ -->
  <div class="layer" id="L5"></div>

</div><!-- /scene -->

<!-- CSS 오버레이 (이미지 위 고정) -->
<div class="vignette"></div>
<div class="letterbox"></div>

<!-- UI -->
<div class="location-banner">The Forgotten Dungeon</div>
<div class="hint">Move cursor to look around</div>


<script>
// ── Parallax 레이어 설정 ──────────────────────────────────
// speed: 값이 클수록 더 많이 움직임 (가까운 레이어일수록 크게)
const layerConfig = [
  { id: 'L0', speed: 0.008 },   // 배경 — 거의 안 움직임
  { id: 'L1', speed: 0.025 },   // 먼 아치
  { id: 'L2', speed: 0.050 },   // 중간 벽 + 횃불
  { id: 'L3', speed: 0.082 },   // 천장 / 바닥
  { id: 'L4', speed: 0.125 },   // 메인 기둥
  { id: 'L5', speed: 0.175 },   // 전경 (가장 많이 움직임)
];

// 횃불 빛 오버레이도 layer2와 동일한 속도로 움직임
const torchOverlay = {
  el: document.querySelector('.torch-glow-overlay'),
  speed: 0.050,
};

const layers = layerConfig.map(cfg => ({
  el: document.getElementById(cfg.id),
  speed: cfg.speed,
}));

const scene = document.getElementById('scene');
let mouseX = 0, mouseY = 0;
let curX = 0, curY = 0;

// 마우스 / 터치 추적
scene.addEventListener('mousemove', e => {
  mouseX = e.clientX - window.innerWidth  / 2;
  mouseY = e.clientY - window.innerHeight / 2;
});
scene.addEventListener('touchmove', e => {
  const t = e.touches[0];
  mouseX = t.clientX - window.innerWidth  / 2;
  mouseY = t.clientY - window.innerHeight / 2;
  e.preventDefault();
}, { passive: false });

// 부드러운 lerp 루프
function tick() {
  const ease = 0.07;  // 낮을수록 더 부드럽고 느릿하게
  curX += (mouseX - curX) * ease;
  curY += (mouseY - curY) * ease;

  layers.forEach(({ el, speed }) => {
    el.style.transform = `translate(${(-curX * speed).toFixed(2)}px, ${(-curY * speed).toFixed(2)}px)`;
  });

  // L2 안의 횃불 빛 div들도 동일하게 이동
  const L2 = document.getElementById('L2');
  L2.querySelectorAll('.glow-left, .glow-right').forEach(el => {
    // glow는 L2 내부에 있으므로 L2 transform에 자동 포함됨
  });

  requestAnimationFrame(tick);
}
tick();
</script>
</body>
</html>
