<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Lite — Room</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/": "https://cdn.jsdelivr.net/npm/three@0.176.0/"
  }
}
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050210;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Georgia', serif;
    color: #c8a96e;
    user-select: none;
  }
  canvas { display: block; width: 100%; height: 100%; }

  /* Vignette */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(0,0,0,.2) 80%, rgba(0,0,0,.5) 100%);
  }

  /* Room title */
  #room-title {
    position: fixed;
    top: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-size: 18px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(220,190,130,.9);
    text-shadow: 0 0 10px rgba(200,169,110,.4);
    background: rgba(0,0,0,.55);
    padding: 8px 20px;
    border: 1px solid rgba(200,169,110,.3);
    border-radius: 4px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1s;
  }
  #room-title.visible { opacity: 1; }

  /* HUD stats — bottom left */
  #hud-stats {
    position: fixed;
    bottom: 28px;
    left: 28px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: rgba(0,0,0,.45);
    border: 1px solid rgba(200,169,110,.12);
    border-radius: 6px;
    padding: 12px 16px;
    backdrop-filter: blur(4px);
  }
  #hud-name {
    font-size: 24px;
    letter-spacing: 2px;
    color: #ffe9a0;
    opacity: .9;
    line-height: 1.2;
  }
  #hud-role {
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #c8a96e;
    opacity: .5;
    margin-bottom: 4px;
  }
  .hud-stat {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .hud-stat-name {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c8a96e;
    opacity: .5;
    width: 36px;
  }
  .hud-stat-bar {
    width: 90px;
    height: 4px;
    background: rgba(200,169,110,.12);
    border-radius: 2px;
    overflow: hidden;
  }
  .hud-stat-fill {
    height: 100%;
    border-radius: 2px;
  }
  .hud-stat-fill.stat-fill { background: linear-gradient(to right, #c8a96e, #ffe9a0); }
  .hud-stat-fill.hp-fill   { background: linear-gradient(to right, #c45050, #e85d5d); }
  .hud-stat-val {
    font-size: 15px;
    color: #c8a96e;
    opacity: .75;
    width: 22px;
    text-align: right;
  }
  .hud-stat-val.hp-val { color: #e85d5d; }

  /* Event panel — bottom center */
  #event-panel {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    width: 520px;
    max-width: calc(100vw - 340px);
    background: rgba(0,0,0,.65);
    border: 1px solid rgba(200,169,110,.2);
    border-radius: 8px;
    padding: 20px 24px;
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    gap: 14px;
    opacity: 0;
    transform: translateX(-50%) translateY(20px);
    transition: all .6s ease;
  }
  #event-panel.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  #event-desc {
    font-size: 14px;
    line-height: 1.7;
    color: rgba(200,169,110,.8);
    letter-spacing: .5px;
  }

  #event-actions {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .event-btn {
    padding: 10px 20px;
    background: rgba(200,169,110,.08);
    border: 1px solid rgba(200,169,110,.3);
    border-radius: 4px;
    color: #c8a96e;
    font-family: 'Georgia', serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
  }
  .event-btn:hover {
    background: rgba(200,169,110,.18);
    border-color: rgba(200,169,110,.6);
    color: #ffe9a0;
    box-shadow: 0 0 20px rgba(200,169,110,.15);
  }
  .event-btn:active { background: rgba(200,169,110,.3); }
  .event-btn:disabled {
    opacity: .3;
    pointer-events: none;
  }

  #event-result {
    font-size: 15px;
    letter-spacing: 1px;
    color: #ffe9a0;
    min-height: 0;
    overflow: hidden;
    transition: all .3s;
  }
  #event-result.success { color: #66bb6a; }
  #event-result.fail { color: #e85d5d; }

  /* D20 dice — always visible, left of webcam */
  #d20-hud {
    position: fixed;
    bottom: 20px;
    right: 100px;
    z-index: 60;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    pointer-events: none;
    cursor: default;
    transform: scale(1);
    transform-origin: bottom center;
    transition: transform .4s ease, filter .3s;
  }
  #d20-hud.active {
    animation: d20-bounce .6s ease;
    transform: scale(2) translateY(0);
    pointer-events: all;
    cursor: pointer;
  }
  @keyframes d20-bounce {
    0%   { transform: scale(1) translateY(0); }
    15%  { transform: scale(2) translateY(-40px); }
    30%  { transform: scale(2) translateY(0); }
    45%  { transform: scale(2) translateY(-20px); }
    60%  { transform: scale(2) translateY(0); }
    75%  { transform: scale(2) translateY(-8px); }
    90%  { transform: scale(2) translateY(0); }
    100% { transform: scale(2) translateY(0); }
  }
  #d20-hud.rolled {
    pointer-events: none;
    cursor: default;
  }
  #d20-hud.active:not(.rolled):hover #d20-dice-shape { filter: brightness(1.4) drop-shadow(0 0 8px rgba(200,169,110,.5)); }
  #d20-dice-wrapper {
    position: relative;
    width: 80px;
    height: 80px;
  }
  #d20-dice-shape {
    width: 80px;
    height: 80px;
    transition: filter .2s;
  }
  #d20-dice-shape polygon, #d20-dice-shape line {
    stroke: rgba(200,169,110,.85);
    stroke-width: 1.4;
  }
  #d20-dice-shape polygon { fill: rgba(30,22,12,.85); }
  #d20-dice-value {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 22px;
    font-family: 'Georgia', serif;
    color: #ffe9a0;
    pointer-events: none;
    text-shadow: 0 0 10px rgba(200,169,110,.8);
  }
  #d20-label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(200,169,110,.4);
    height: 14px;
  }
  @keyframes d20-roll {
    0%   { transform: rotate(0deg)   scale(1); }
    20%  { transform: rotate(72deg)  scale(1.15); }
    40%  { transform: rotate(144deg) scale(0.95); }
    60%  { transform: rotate(216deg) scale(1.1); }
    80%  { transform: rotate(288deg) scale(0.98); }
    100% { transform: rotate(360deg) scale(1); }
  }
  #d20-dice-shape.rolling { animation: d20-roll .5s ease-out; }
  #d20-dice-shape.success polygon { fill: rgba(102,187,106,.15); }
  #d20-dice-shape.success polygon, #d20-dice-shape.success line { stroke: rgba(102,187,106,.8); }
  #d20-dice-shape.fail polygon { fill: rgba(232,93,93,.15); }
  #d20-dice-shape.fail polygon, #d20-dice-shape.fail line { stroke: rgba(232,93,93,.8); }

  #event-outcome {
    font-size: 13px;
    line-height: 1.6;
    color: rgba(200,169,110,.7);
  }

  #back-to-map {
    position: fixed;
    top: 28px;
    left: 28px;
    z-index: 50;
    padding: 10px 20px;
    background: rgba(0,0,0,.45);
    border: 1px solid rgba(200,169,110,.25);
    border-radius: 4px;
    color: #c8a96e;
    font-family: 'Georgia', serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
    backdrop-filter: blur(4px);
  }
  #back-to-map:hover {
    background: rgba(200,169,110,.15);
    border-color: rgba(200,169,110,.5);
    color: #ffe9a0;
  }

  .hidden { display: none !important; }

  /* Loading */
  #room-loading {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: #050210;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    transition: opacity .6s;
  }
  #room-loading.hidden { opacity: 0; pointer-events: none; }
  .rl-rune { font-size: 42px; opacity: .4; animation: spin 8s linear infinite; }
  .rl-text { font-size: 14px; letter-spacing: 5px; text-transform: uppercase; opacity: .7; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Game over overlay */
  #game-over {
    position: fixed;
    inset: 0;
    z-index: 800;
    background: rgba(0,0,0,.85);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
  }
  #game-over.hidden { display: none; }
  .go-title {
    font-size: 36px;
    color: #e85d5d;
    letter-spacing: 6px;
    text-shadow: 0 0 40px rgba(232,93,93,.4);
  }
  .go-text {
    font-size: 14px;
    color: rgba(200,169,110,.5);
    letter-spacing: 2px;
  }
</style>
</head>
<body>

<canvas id="room-canvas"></canvas>
<div class="vignette"></div>

<button id="back-to-map" onclick="window.location.href='../map.html'">← Map</button>
<div id="room-title"></div>

<!-- HUD -->
<div id="hud-stats">
  <div id="hud-name">Adventurer</div>
  <div id="hud-role">--</div>
  <div class="hud-stat">
    <span class="hud-stat-name">STR</span>
    <div class="hud-stat-bar"><div class="hud-stat-fill stat-fill" id="bar-str" style="width:0%"></div></div>
    <span class="hud-stat-val" id="val-str">--</span>
  </div>
  <div class="hud-stat">
    <span class="hud-stat-name">AGI</span>
    <div class="hud-stat-bar"><div class="hud-stat-fill stat-fill" id="bar-agi" style="width:0%"></div></div>
    <span class="hud-stat-val" id="val-agi">--</span>
  </div>
  <div class="hud-stat">
    <span class="hud-stat-name">INT</span>
    <div class="hud-stat-bar"><div class="hud-stat-fill stat-fill" id="bar-int" style="width:0%"></div></div>
    <span class="hud-stat-val" id="val-int">--</span>
  </div>
  <div class="hud-stat">
    <span class="hud-stat-name">LCK</span>
    <div class="hud-stat-bar"><div class="hud-stat-fill stat-fill" id="bar-lck" style="width:0%"></div></div>
    <span class="hud-stat-val" id="val-lck">--</span>
  </div>
  <div class="hud-stat">
    <span class="hud-stat-name">HP</span>
    <div class="hud-stat-bar"><div class="hud-stat-fill hp-fill" id="bar-hp" style="width:0%"></div></div>
    <span class="hud-stat-val hp-val" id="val-hp">--</span>
  </div>
</div>

<!-- Event panel -->
<div id="event-panel">
  <div id="event-desc"></div>
  <div id="event-actions"></div>
  <div id="event-result" class="hidden"></div>
  <div id="event-outcome" class="hidden"></div>
</div>

<!-- D20 dice — fixed bottom right -->
<div id="d20-hud">
  <div id="d20-dice-wrapper">
    <svg id="d20-dice-shape" viewBox="0 0 64 64">
      <polygon points="32,4 60,20 60,44 32,60 4,44 4,20"/>
      <line x1="32" y1="4"  x2="32" y2="60"/>
      <line x1="4"  y1="20" x2="60" y2="44"/>
      <line x1="60" y1="20" x2="4"  y2="44"/>
      <line x1="32" y1="4"  x2="4"  y2="44"/>
      <line x1="32" y1="4"  x2="60" y2="44"/>
      <line x1="4"  y1="20" x2="32" y2="60"/>
      <line x1="60" y1="20" x2="32" y2="60"/>
    </svg>
    <div id="d20-dice-value">—</div>
  </div>
  <div id="d20-label">Roll d20</div>
</div>

<!-- Webcam preview -->
<div id="webcam-preview" class="hidden">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="face-canvas"></canvas>
</div>

<!-- Loading -->
<div id="room-loading">
  <div class="rl-rune">⬡</div>
  <div class="rl-text">Entering Room</div>
</div>

<!-- Game over -->
<div id="game-over" class="hidden">
  <div class="go-title">YOU HAVE FALLEN</div>
  <div class="go-text">Your adventure ends here...</div>
  <button class="event-btn" onclick="window.location.href='../../index.html'">Start Over</button>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { initFaceCamera, updateFaceCamera, initRotationButtons } from '../../scripts/face-camera.js';
import { loadBlockMaterials, buildVoxelGroups, groupToMesh } from '../../scripts/voxel-textures.js';

const $ = id => document.getElementById(id);

// ── Character from localStorage ──
const charData = JSON.parse(localStorage.getItem('dndlite-character') || 'null');
if (!charData) { window.location.href = '../../index.html'; }

const currentRoom = localStorage.getItem('dndlite-currentRoom') || 'entrance';

// Populate HUD
$('hud-name').textContent = charData.name;
$('hud-role').textContent = charData.role;
['str','agi','int','lck'].forEach(key => {
  $('val-' + key).textContent = charData[key];
  $('bar-' + key).style.width = (charData[key] / 20 * 100) + '%';
});
function updateHP() {
  $('val-hp').textContent = charData.hp;
  $('bar-hp').style.width = (charData.hp / 20 * 100) + '%';
}
updateHP();

// ══════════════════════════════════════
//   VOXEL BLOCKS — Kenney textures via shared module
// ══════════════════════════════════════

const blockMaterials = loadBlockMaterials('../../Assets/Tiles/');

function parseRoom(data) {
  const [sx, sy, sz] = data.size;
  const grid = new Int8Array(sx * sy * sz).fill(-1);
  const idx = (x, y, z) => x + y * sx + z * sx * sy;

  // Fill rectangular regions
  if (data.fills) {
    for (const f of data.fills) {
      for (let x = f.from[0]; x <= f.to[0]; x++)
        for (let y = f.from[1]; y <= f.to[1]; y++)
          for (let z = f.from[2]; z <= f.to[2]; z++)
            grid[idx(x, y, z)] = f.type;
    }
  }

  // Individual blocks
  if (data.blocks) {
    for (const b of data.blocks) {
      grid[idx(b[0], b[1], b[2])] = b[3];
    }
  }

  return { grid, sx, sy, sz };
}

function buildVoxelMeshes(roomData, scene) {
  const { grid, sx, sy, sz } = parseRoom(roomData);
  // The room JSON's palette maps local index → block name; pass it directly
  // to buildVoxelGroups so the mesh builder can look up textures by name.
  const groups = buildVoxelGroups(grid, [sx, sy, sz], roomData.palette);
  const meshes = [];
  for (const [key, g] of Object.entries(groups)) {
    if (g.positions.length === 0) continue;
    const mesh = groupToMesh(key, g, blockMaterials);
    scene.add(mesh);
    meshes.push(mesh);
  }
  return meshes;
}

// ══════════════════════════════════════
//   THREE.JS SCENE SETUP
// ══════════════════════════════════════

const canvas = $('room-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 0.9;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x06020e);
scene.fog = new THREE.Fog(0x06020e, 25, 50);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 80);

// Ambient (adjusted per room in loadRoom)
const ambient = new THREE.AmbientLight(0xfff0d0, 1.2);
scene.add(ambient);

// Directional sunlight for outdoor rooms (adjusted per room)
const sunLight = new THREE.DirectionalLight(0xfff5e0, 0);
sunLight.position.set(5, 15, 5);
sunLight.castShadow = true;
scene.add(sunLight);

// ══════════════════════════════════════
//   LOAD ROOM + BUILD
// ══════════════════════════════════════

let roomLights = [];

async function loadRoom() {
  const resp = await fetch(`../../rooms/${currentRoom}.json`);
  const data = await resp.json();

  // Lighting per room type
  if (data.id === 'lair') {
    // Castle interior — bright and grand
    ambient.intensity = 1.5;
    sunLight.intensity = 1.0;
    scene.background = new THREE.Color(0x1a1020);
    scene.fog = new THREE.Fog(0x1a1020, 30, 60);
  } else {
    // Outdoor rooms — sunny and open
    ambient.intensity = 2.0;
    sunLight.intensity = 3.0;
    scene.background = new THREE.Color(0x87CEEB);
    scene.fog = new THREE.Fog(0x87CEEB, 30, 60);
  }

  // Build voxels
  buildVoxelMeshes(data, scene);

  // Room lights
  if (data.lights) {
    data.lights.forEach((l, i) => {
      const color = parseInt(l.color);
      const light = new THREE.PointLight(color, l.intensity || 6, 20, 2);
      light.position.set(l.pos[0], l.pos[1], l.pos[2]);
      light.castShadow = false;
      light._phase = i * 1.7;
      scene.add(light);
      roomLights.push(light);
    });
  }

  // Camera based on room size
  const [sx, sy, sz] = data.size;
  // Camera above room, looking at center — fit entire room in view
  const cx = sx / 2, cy = sy * 0.2, cz = sz / 2;
  const maxSpan = Math.max(sx, sz);
  const camHeight = Math.max(sy * 1.2, maxSpan * 0.6);
  const camBack = maxSpan * 0.8;
  const CAM_BASE = new THREE.Vector3(cx, camHeight, cz + camBack);
  const CAM_LOOK = new THREE.Vector3(cx, cy, cz);

  const camConfig = {
    basePos: CAM_BASE,
    lookTarget: CAM_LOOK,
    offAxis: false,
    far: 80,
  };

  initFaceCamera();
  initRotationButtons();

  window.addEventListener('resize', () => {
    const w = window.innerWidth, h = window.innerHeight;
    renderer.setSize(w, h);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  });

  // Store base intensity
  roomLights.forEach(l => { l._baseIntensity = l.intensity; });

  // ── Player miniature ──
  const MOVE_RANGE = { Warrior: 3, Rogue: 5, Mage: 4 };
  const moveRange = MOVE_RANGE[charData.role] || 4;

  const gltfLoader = new GLTFLoader();
  const MINI_SCALE = 0.4;
  const MINI_FILES = { Warrior: 'warrior.glb', Rogue: 'rogue.glb', Mage: 'mage.glb' };

  function loadPlayerToken() {
    return new Promise((resolve) => {
      const file = MINI_FILES[charData.role];
      if (!file) { resolve(createFallbackToken()); return; }
      gltfLoader.load('../../Assets/' + file, (gltf) => {
        const model = gltf.scene;
        model.scale.setScalar(MINI_SCALE);
        model.traverse(c => { if (c.isMesh) c.castShadow = true; });
        // Center model on its bounding box
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.x -= center.x;
        model.position.z -= center.z;
        // Sit on ground: offset so bottom of bbox is at y=0
        model.position.y -= box.min.y;
        const group = new THREE.Group();
        group.add(model);
        resolve(group);
      }, undefined, () => { resolve(createFallbackToken()); });
    });
  }

  function createFallbackToken() {
    const group = new THREE.Group();
    const baseGeo = new THREE.CylinderGeometry(0.18, 0.22, 0.08, 16);
    const baseMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, roughness: 0.4, metalness: 0.7 });
    group.add(new THREE.Mesh(baseGeo, baseMat));
    const bodyGeo = new THREE.CylinderGeometry(0.08, 0.14, 0.35, 12);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, roughness: 0.4, metalness: 0.6 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 0.22;
    group.add(body);
    const headGeo = new THREE.SphereGeometry(0.1, 12, 10);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, roughness: 0.35, metalness: 0.7 });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 0.46;
    group.add(head);
    group.traverse(c => { if (c.isMesh) c.castShadow = true; });
    return group;
  }

  // ── Grid height map for walkability ──
  const { grid: voxelGrid, sx: gsx, sy: gsy, sz: gsz } = parseRoom(data);
  const gridIdx = (x, y, z) => x + y * gsx + z * gsx * gsy;

  function getFloorY(x, z) {
    // Find highest solid block at (x,z), return its y+1 (standing height)
    for (let y = gsy - 1; y >= 0; y--) {
      if (voxelGrid[gridIdx(x, y, z)] >= 0) return y + 1;
    }
    return 0;
  }

  const IMPASSABLE = ['water', 'lava'];
  const paletteTypes = data.palette;

  function isWalkable(x, z) {
    if (x < 0 || x >= gsx || z < 0 || z >= gsz) return false;
    const fy = getFloorY(x, z);
    if (fy <= 0 || fy >= gsy) return false;

    // Check floor block type — water/lava are impassable
    const floorType = voxelGrid[gridIdx(x, fy - 1, z)];
    if (floorType >= 0 && IMPASSABLE.includes(paletteTypes[floorType])) return false;

    // Need 2 blocks of headroom to stand
    if (fy + 1 < gsy && voxelGrid[gridIdx(x, fy + 1, z)] >= 0) return false;

    return true;
  }

  // ── BFS move range ──
  function calcMoveRange(startX, startZ, range) {
    const tiles = [];
    const visited = new Set();
    const queue = [{ x: startX, z: startZ, dist: 0 }];
    visited.add(`${startX},${startZ}`);

    while (queue.length > 0) {
      const { x, z, dist } = queue.shift();
      const fy = getFloorY(x, z);
      tiles.push({ x, z, y: fy });

      if (dist < range) {
        for (const [dx, dz] of [[1,0],[-1,0],[0,1],[0,-1]]) {
          const nx = x + dx, nz = z + dz;
          const key = `${nx},${nz}`;
          if (!visited.has(key) && isWalkable(nx, nz)) {
            const nfy = getFloorY(nx, nz);
            if (nfy === fy) {
              visited.add(key);
              queue.push({ x: nx, z: nz, dist: dist + 1 });
            }
          }
        }
      }
    }
    return tiles;
  }

  // ── Highlight tiles ──
  const highlightMeshes = [];
  const highlightGroup = new THREE.Group();
  scene.add(highlightGroup);

  function showMoveRange(tiles) {
    clearHighlights();
    tiles.forEach(tile => {
      const plane = new THREE.Mesh(
        new THREE.PlaneGeometry(0.9, 0.9),
        new THREE.MeshBasicMaterial({
          color: 0xff3333,
          transparent: true,
          opacity: 0.35,
          side: THREE.DoubleSide,
        })
      );
      plane.rotation.x = -Math.PI / 2;
      plane.position.set(tile.x + 0.5, tile.y + 0.01, tile.z + 0.5);
      plane.userData = { tileX: tile.x, tileZ: tile.z, tileY: tile.y };
      highlightGroup.add(plane);
      highlightMeshes.push(plane);
    });
  }

  function clearHighlights() {
    highlightMeshes.forEach(m => highlightGroup.remove(m));
    highlightMeshes.length = 0;
  }

  // ── Turn state machine ──
  let turnState = 'spawn';
  let roomCleared = false;
  let playerToken = null;
  let playerPos = { x: data.spawn[0], z: data.spawn[2] };
  let playerTargetPos = null;

  function startTurn() {
    const event = data.event;
    const eventType = event.type;

    // Check if all events in this room are already cleared
    let allCleared = false;
    if (eventType === 'choice' && event.choices) {
      const remaining = event.choices.filter((_, i) => !isEventCleared(`${currentRoom}:${i}`));
      allCleared = remaining.length === 0;
    } else if (eventType !== 'start') {
      allCleared = isEventCleared(currentRoom);
    }

    if (allCleared) {
      // Room is cleared — free movement, then return to map
      turnState = 'move';
      const fy = getFloorY(playerPos.x, playerPos.z);
      playerToken.position.set(playerPos.x + 0.5, fy, playerPos.z + 0.5);
      playerTargetPos = playerToken.position.clone();
      const moveTiles = calcMoveRange(playerPos.x, playerPos.z, moveRange);
      showMoveRange(moveTiles);
      $('event-panel').classList.remove('visible');
      roomCleared = true;
      return;
    }

    // start: skip movement, go straight to event
    if (eventType === 'start') {
      turnState = 'action';
      const fy = getFloorY(playerPos.x, playerPos.z);
      playerToken.position.set(playerPos.x + 0.5, fy, playerPos.z + 0.5);
      startEvent(event);
      return;
    }

    // Combat/trap/choice/boss: show movement phase
    turnState = 'move';
    const fy = getFloorY(playerPos.x, playerPos.z);
    playerToken.position.set(playerPos.x + 0.5, fy, playerPos.z + 0.5);
    playerTargetPos = playerToken.position.clone();

    const moveTiles = calcMoveRange(playerPos.x, playerPos.z, moveRange);
    showMoveRange(moveTiles);

    // No panel during movement — let the player see the board
    $('event-panel').classList.remove('visible');
  }

  // ── Click to move ──
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();

  canvas.addEventListener('click', (e) => {
    if (turnState !== 'move') return;

    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);

    const hits = raycaster.intersectObjects(highlightMeshes);
    if (hits.length > 0) {
      const tile = hits[0].object.userData;
      playerPos = { x: tile.tileX, z: tile.tileZ };
      playerTargetPos = new THREE.Vector3(tile.tileX + 0.5, tile.tileY, tile.tileZ + 0.5);
      turnState = 'moving';
      clearHighlights();
      $('event-panel').classList.remove('visible');
    }
  });

  // ── Move arrow indicator ──
  let moveArrow = null;

  function updateArrow(fromPos, toPos) {
    clearArrow();
    const start = new THREE.Vector3(fromPos.x, fromPos.y + 0.15, fromPos.z);
    const end = new THREE.Vector3(toPos.x, toPos.y + 0.15, toPos.z);
    const dir = new THREE.Vector3().subVectors(end, start);
    const len = dir.length();
    if (len < 0.3) return;
    moveArrow = new THREE.ArrowHelper(dir.normalize(), start, len, 0xff4444, 0.4, 0.2);
    scene.add(moveArrow);
  }

  function clearArrow() {
    if (moveArrow) { scene.remove(moveArrow); moveArrow = null; }
  }

  // Hover cursor + arrow
  canvas.addEventListener('mousemove', (e) => {
    if (turnState !== 'move') {
      canvas.style.cursor = 'default';
      clearArrow();
      return;
    }
    mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(highlightMeshes);
    if (hits.length > 0) {
      canvas.style.cursor = 'pointer';
      const tile = hits[0].object.userData;
      const from = playerToken.position;
      const to = new THREE.Vector3(tile.tileX + 0.5, tile.tileY, tile.tileZ + 0.5);
      updateArrow(from, to);
    } else {
      canvas.style.cursor = 'default';
      clearArrow();
    }
  });

  // ── Trigger position marker ──
  const triggerPos = data.event.triggerPos || null;
  const TRIGGER_RANGE = 1; // must be within 1 tile

  function isNearTrigger() {
    if (!triggerPos) return true; // no triggerPos → auto-trigger (backward compat)
    const dx = Math.abs(playerPos.x - triggerPos[0]);
    const dz = Math.abs(playerPos.z - triggerPos[1]);
    return dx <= TRIGGER_RANGE && dz <= TRIGGER_RANGE;
  }

  // Visual marker at trigger position
  if (triggerPos) {
    const tfy = getFloorY(triggerPos[0], triggerPos[1]);
    const markerGeo = new THREE.RingGeometry(0.25, 0.4, 16);
    markerGeo.rotateX(-Math.PI / 2);
    const markerMat = new THREE.MeshBasicMaterial({ color: 0xff6644, transparent: true, opacity: 0.6, side: THREE.DoubleSide });
    const marker = new THREE.Mesh(markerGeo, markerMat);
    marker.position.set(triggerPos[0] + 0.5, tfy + 0.02, triggerPos[1] + 0.5);
    scene.add(marker);

    // Floating icon above trigger
    const iconGeo = new THREE.OctahedronGeometry(0.15);
    const iconMat = new THREE.MeshStandardMaterial({ color: 0xff6644, emissive: 0xff4422, emissiveIntensity: 0.5 });
    const icon = new THREE.Mesh(iconGeo, iconMat);
    icon.position.set(triggerPos[0] + 0.5, tfy + 1.0, triggerPos[1] + 0.5);
    icon.userData._baseY = tfy + 1.0;
    scene.add(icon);
    roomLights.push({ _isTriggerIcon: true, _mesh: icon }); // reuse tick for bobbing
  }

  // ── Spawn player ──
  const spawnY = getFloorY(data.spawn[0], data.spawn[2]);
  playerToken = await loadPlayerToken();
  playerToken.position.set(data.spawn[0] + 0.5, spawnY, data.spawn[2] + 0.5);
  playerTargetPos = playerToken.position.clone();
  scene.add(playerToken);

  // ── Updated tick with movement ──
  function tick() {
    requestAnimationFrame(tick);
    const t = performance.now() * 0.001;

    // Light flicker + trigger icon bob
    roomLights.forEach(light => {
      if (light._isTriggerIcon) {
        light._mesh.position.y = light._mesh.userData._baseY + Math.sin(t * 2) * 0.15;
        light._mesh.rotation.y = t * 1.5;
        return;
      }
      const flicker = 1.0 + 0.3 * Math.sin(t * 2.8 + light._phase)
                          + 0.15 * Math.sin(t * 5.1 + light._phase * 2.1);
      light.intensity = (light._baseIntensity || 6) * flicker;
    });

    // Player movement animation
    if (playerToken && playerTargetPos) {
      playerToken.position.lerp(playerTargetPos, 0.08);
      // Bob
      playerToken.position.y = playerTargetPos.y + Math.sin(t * 1.8) * 0.02;

      // Check if arrived (during 'moving' state)
      if (turnState === 'moving') {
        const dx = playerToken.position.x - playerTargetPos.x;
        const dz = playerToken.position.z - playerTargetPos.z;
        if (Math.abs(dx) < 0.05 && Math.abs(dz) < 0.05) {
          if (roomCleared) {
            // Cleared room — keep moving freely
            turnState = 'move';
            const moveTiles = calcMoveRange(playerPos.x, playerPos.z, moveRange);
            showMoveRange(moveTiles);
          } else if (isNearTrigger()) {
            // Near event trigger — start event
            turnState = 'action';
            setTimeout(() => startEvent(data.event), 300);
          } else {
            // Not near trigger — move again
            turnState = 'move';
            const moveTiles = calcMoveRange(playerPos.x, playerPos.z, moveRange);
            showMoveRange(moveTiles);
          }
        }
      }
    }

    updateFaceCamera(camera, camConfig);

    // Clamp camera inside room walls (indoor rooms only)
    if (data.id === 'lair') {
      const margin = 0.5;
      camera.position.x = Math.max(margin, Math.min(sx - margin, camera.position.x));
      camera.position.z = Math.max(margin, Math.min(sz - margin, camera.position.z));
    }
    camera.lookAt(CAM_LOOK);

    renderer.render(scene, camera);
  }

  // Expose startTurn for retry
  retryTurn = () => startTurn();
  continueFreeMove = () => {
    roomCleared = true;
    turnState = 'move';
    const moveTiles = calcMoveRange(playerPos.x, playerPos.z, moveRange);
    showMoveRange(moveTiles);
  };

  // Show room
  $('room-loading').classList.add('hidden');
  $('room-title').textContent = data.name;
  $('room-title').classList.add('visible');

  tick();

  // Start turn after a short delay
  setTimeout(() => startTurn(), 800);
}

// ══════════════════════════════════════
//   EVENT / COMBAT SYSTEM
// ══════════════════════════════════════

// Callbacks — set inside loadRoom, called from resolveRoll
let retryTurn = null;
let continueFreeMove = null;

// Track cleared events per room
const clearedEvents = JSON.parse(localStorage.getItem('dndlite-clearedEvents') || '{}');

function markEventCleared(eventKey) {
  clearedEvents[eventKey] = true;
  localStorage.setItem('dndlite-clearedEvents', JSON.stringify(clearedEvents));
}

function isEventCleared(eventKey) {
  return !!clearedEvents[eventKey];
}

const STAT_NAMES = { str: 'Strength', agi: 'Agility', int: 'Intelligence', lck: 'Luck' };

function rollD20() { return Math.floor(Math.random() * 20) + 1; }
function getModifier(val) { return Math.floor((val - 10) / 2); }

function startEvent(event) {
  const panel = $('event-panel');
  const desc = $('event-desc');
  const actions = $('event-actions');
  const result = $('event-result');
  const outcome = $('event-outcome');

  desc.textContent = event.description;
  actions.innerHTML = '';
  result.classList.add('hidden');
  result.className = 'hidden';
  outcome.classList.add('hidden');
  deactivateD20();


  if (event.type === 'start' || event.type === 'rest') {
    // No roll needed
    if (event.type === 'rest' && !isEventCleared(currentRoom)) {
      const heal = event.successHp || 4;
      charData.hp = Math.min(20, charData.hp + heal);
      localStorage.setItem('dndlite-character', JSON.stringify(charData));
      updateHP();
      desc.textContent += `\n\nYou recover ${heal} HP.`;
    }
    if (!isEventCleared(currentRoom)) markEventCleared(currentRoom);
    const btn = createBtn('Continue', () => {
      window.location.href = 'map.html';
    });
    actions.appendChild(btn);

  } else if (event.choices) {
    // Multiple choices (choice / boss with choices) — filter out cleared ones
    event.choices.forEach((choice, i) => {
      const eventKey = `${currentRoom}:${i}`;
      if (isEventCleared(eventKey)) return;
      const statLabel = STAT_NAMES[choice.stat] || choice.stat.toUpperCase();
      const btn = createBtn(`${choice.label} (${statLabel})`, () => {
        disableButtons(actions);
        prepareRoll(choice.stat, choice.dc, choice.successText, choice.failText, choice.successHp || 0, choice.failHp || 0, eventKey);
      });
      actions.appendChild(btn);
    });

  } else {
    // combat / trap / boss — single roll
    const stat = event.stat || 'str';
    const statLabel = STAT_NAMES[stat] || stat.toUpperCase();
    const label = event.type === 'trap' ? `Dodge (${statLabel})` :
                  event.type === 'boss' ? `Fight the Boss (${statLabel})` :
                  `Attack (${statLabel})`;
    const btn = createBtn(label, () => {
      disableButtons(actions);
      prepareRoll(stat, event.dc, event.successText, event.failText, event.successHp || 0, event.failHp || 0, currentRoom);
    });
    actions.appendChild(btn);
  }

  panel.classList.add('visible');
}

function createBtn(text, onclick) {
  const btn = document.createElement('button');
  btn.className = 'event-btn';
  btn.textContent = text;
  btn.addEventListener('click', onclick);
  return btn;
}

function disableButtons(container) {
  container.querySelectorAll('.event-btn').forEach(b => b.disabled = true);
}

let pendingRoll = null;

function deactivateD20() {
  const hud = $('d20-hud');
  hud.classList.remove('active', 'rolled');
  $('d20-dice-shape').classList.remove('rolling', 'success', 'fail');
  $('d20-dice-value').textContent = '—';
  $('d20-dice-value').style.color = '#ffe9a0';
  $('d20-label').textContent = '';
}

function prepareRoll(stat, dc, successText, failText, successHp, failHp, eventKey) {
  pendingRoll = { stat, dc, successText, failText, successHp, failHp, eventKey };

  // Activate d20 — scale up, clickable
  const hud = $('d20-hud');
  hud.classList.remove('rolled');
  hud.classList.add('active');
  $('d20-dice-shape').classList.remove('rolling', 'success', 'fail');
  $('d20-dice-value').textContent = '—';
  $('d20-dice-value').style.color = '#ffe9a0';
  $('d20-label').textContent = 'Roll d20';
}

function executeRoll() {
  if (!pendingRoll) return;
  const { stat, dc, successText, failText, successHp, failHp, eventKey } = pendingRoll;
  pendingRoll = null;

  const result = $('event-result');
  const outcome = $('event-outcome');
  const actions = $('event-actions');
  const hud = $('d20-hud');
  const diceShape = $('d20-dice-shape');
  const diceValue = $('d20-dice-value');

  const roll = rollD20();
  const statVal = charData[stat] || 10;
  const mod = getModifier(statVal);
  const total = roll + mod;
  const success = total >= dc;
  const modStr = mod >= 0 ? `+${mod}` : `${mod}`;
  const statLabel = STAT_NAMES[stat] || stat.toUpperCase();

  // Disable further clicks
  hud.classList.add('rolled');
  $('d20-label').textContent = '';

  // Start rolling animation
  diceShape.classList.remove('rolling', 'success', 'fail');
  void diceShape.offsetWidth;
  diceShape.classList.add('rolling');

  let animCount = 0;
  const animInterval = setInterval(() => {
    diceValue.textContent = Math.floor(Math.random() * 20) + 1;
    animCount++;
    if (animCount > 12) {
      clearInterval(animInterval);

      // Show final roll on dice
      diceValue.textContent = roll;
      diceValue.style.color = roll === 20 ? '#ffe97a' : roll === 1 ? '#ff6b6b' : '#ffe9a0';
      diceShape.classList.remove('rolling');
      diceShape.classList.add(success ? 'success' : 'fail');

      // Show result in event panel
      result.classList.remove('hidden', 'success', 'fail');
      result.classList.add(success ? 'success' : 'fail');
      result.textContent = `${roll} ${modStr} (${statLabel}) = ${total} vs DC ${dc} — ${success ? 'SUCCESS!' : 'FAILED'}`;

      outcome.classList.remove('hidden');
      outcome.textContent = success ? successText : failText;

      // Apply HP change
      const hpChange = success ? successHp : failHp;
      if (hpChange !== 0) {
        charData.hp = Math.max(0, Math.min(20, charData.hp + hpChange));
        localStorage.setItem('dndlite-character', JSON.stringify(charData));
        updateHP();
        const sign = hpChange > 0 ? '+' : '';
        outcome.textContent += ` (${sign}${hpChange} HP)`;
      }

      // Check game over
      if (charData.hp <= 0) {
        setTimeout(() => { $('game-over').classList.remove('hidden'); }, 1000);
        return;
      }

      actions.innerHTML = '';
      if (success) {
        if (eventKey) markEventCleared(eventKey);
        const exploreBtn = createBtn('Explore', () => {
          $('event-panel').classList.remove('visible');
          deactivateD20();
          result.classList.add('hidden');
          outcome.classList.add('hidden');
          actions.innerHTML = '';
          if (continueFreeMove) continueFreeMove();
        });
        const leaveBtn = createBtn('Leave', () => {
          window.location.href = 'map.html';
        });
        actions.appendChild(exploreBtn);
        actions.appendChild(leaveBtn);
      } else {
        const retryBtn = createBtn('Try again', () => {
          $('event-panel').classList.remove('visible');
          deactivateD20();
          result.classList.add('hidden');
          outcome.classList.add('hidden');
          actions.innerHTML = '';
          retryTurn();
        });
        actions.appendChild(retryBtn);
      }
    }
  }, 60);
}

// D20 click handler
$('d20-hud').addEventListener('click', () => {
  if (pendingRoll) executeRoll();
});

// ── Start ──
loadRoom();
</script>
