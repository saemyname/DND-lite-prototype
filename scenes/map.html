<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Lite — Dungeon Map</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/": "https://cdn.jsdelivr.net/npm/three@0.176.0/"
  }
}
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050210;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Georgia', serif;
    color: #c8a96e;
    user-select: none;
  }
  canvas { display: block; width: 100%; height: 100%; }

  /* Room tooltip */
  #tooltip {
    position: fixed;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity .2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transform: translate(-50%, -120%);
  }
  #tooltip.visible { opacity: 1; }
  #tooltip-name {
    font-size: 14px;
    letter-spacing: 2px;
    color: #ffe9a0;
    text-shadow: 0 0 12px rgba(200,169,110,.6);
    white-space: nowrap;
  }
  #tooltip-type {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(200,169,110,.45);
  }

  /* Loading */
  #map-loading {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: #050210;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    transition: opacity .6s;
  }
  #map-loading.hidden { opacity: 0; pointer-events: none; }
  .ml-rune { font-size: 42px; opacity: .4; animation: spin 8s linear infinite; }
  .ml-text { font-size: 14px; letter-spacing: 5px; text-transform: uppercase; opacity: .7; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* HUD — bottom left */
  #hud-stats {
    position: fixed;
    bottom: 28px;
    left: 28px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: rgba(0,0,0,.45);
    border: 1px solid rgba(200,169,110,.12);
    border-radius: 6px;
    padding: 12px 16px;
    backdrop-filter: blur(4px);
  }
  #hud-name {
    font-size: 24px;
    letter-spacing: 2px;
    color: #ffe9a0;
    opacity: .9;
    line-height: 1.2;
  }
  #hud-role {
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #c8a96e;
    opacity: .5;
    margin-bottom: 4px;
  }
  .hud-stat {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .hud-stat-name {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c8a96e;
    opacity: .5;
    width: 120px;
  }
  .hud-stat-bar {
    width: 90px;
    height: 4px;
    background: rgba(200,169,110,.12);
    border-radius: 2px;
    overflow: hidden;
  }
  .hud-stat-fill {
    height: 100%;
    background: linear-gradient(to right, #c8a96e, #ffe9a0);
    border-radius: 2px;
  }
  .hud-stat-val {
    font-size: 15px;
    color: #c8a96e;
    opacity: .75;
    width: 22px;
    text-align: right;
  }

  /* Vignette */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(0,0,0,.5) 70%, rgba(0,0,0,.92) 100%);
  }

  /* Location text */
  #location-title {
    position: fixed;
    top: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-size: 16px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(200,169,110,.5);
    text-shadow: 0 0 20px rgba(200,169,110,.3);
    pointer-events: none;
  }
</style>
</head>
<body>

<canvas id="map-canvas"></canvas>
<div class="vignette"></div>

<div id="location-title">Dungeon Map</div>

<div id="tooltip">
  <div id="tooltip-name"></div>
  <div id="tooltip-type"></div>
</div>

<!-- HUD -->
<div id="hud-stats">
  <div id="hud-name">Adventurer</div>
  <div id="hud-role">—</div>
  <div class="hud-stat">
    <span class="hud-stat-name">Strength</span>
    <div class="hud-stat-bar"><div class="hud-stat-fill" style="width:0%"></div></div>
    <span class="hud-stat-val">—</span>
  </div>
  <div class="hud-stat">
    <span class="hud-stat-name">Agility</span>
    <div class="hud-stat-bar"><div class="hud-stat-fill" style="width:0%"></div></div>
    <span class="hud-stat-val">—</span>
  </div>
  <div class="hud-stat">
    <span class="hud-stat-name">Intelligence</span>
    <div class="hud-stat-bar"><div class="hud-stat-fill" style="width:0%"></div></div>
    <span class="hud-stat-val">—</span>
  </div>
  <div class="hud-stat">
    <span class="hud-stat-name">Luck</span>
    <div class="hud-stat-bar"><div class="hud-stat-fill" style="width:0%"></div></div>
    <span class="hud-stat-val">—</span>
  </div>
</div>

<div id="map-loading">
  <div class="ml-rune">⬡</div>
  <div class="ml-text">Unrolling the Map</div>
</div>

<script type="module">
import * as THREE from 'three';

// ── Character ──
const charData = JSON.parse(localStorage.getItem('dndlite-character') || 'null');
if (!charData) { window.location.href = '../index.html'; }

document.getElementById('hud-name').textContent = charData.name;
document.getElementById('hud-role').textContent = charData.role;
const statBars = document.querySelectorAll('.hud-stat');
['str','agi','int','lck'].forEach((key, i) => {
  const val = charData[key];
  statBars[i].querySelector('.hud-stat-val').textContent = val;
  statBars[i].querySelector('.hud-stat-fill').style.width = (val / 20 * 100) + '%';
});

// ── Dungeon rooms ──
const ROOMS = [
  { id: 'entrance',  name: 'Entrance Hall',     type: 'start',   x: 0,    z: 3.2,  exits: ['corridor'] },
  { id: 'corridor',  name: 'Dark Corridor',     type: 'trap',    x: -1.8, z: 1.2,  exits: ['entrance', 'goblin', 'shrine'] },
  { id: 'shrine',    name: 'Forgotten Shrine',  type: 'choice',  x: 1.8,  z: 1.0,  exits: ['corridor', 'treasury'] },
  { id: 'goblin',    name: 'Goblin Den',        type: 'combat',  x: -2.2, z: -1.2, exits: ['corridor', 'treasury'] },
  { id: 'treasury',  name: 'The Treasury',      type: 'rest',    x: 0.5,  z: -1.5, exits: ['goblin', 'shrine', 'lair'] },
  { id: 'lair',      name: "Dragon's Lair",     type: 'boss',    x: 0,    z: -3.5, exits: ['treasury'] },
];

let currentRoom = 'entrance';
let playerToken;          // the 3D miniature
let playerTargetPos;      // where it's moving to
const roomMeshes = [];    // for raycasting
const roomById = {};
ROOMS.forEach(r => roomById[r.id] = r);

// ── Three.js setup ──
const canvas = document.getElementById('map-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x06020e);
// scene.fog = new THREE.Fog(0x06020e, 18, 35);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.set(0, 5, 8);
camera.lookAt(0, 0, -0.5);

// ── Lighting ──
const ambient = new THREE.AmbientLight(0xfff0d0, 1.0);
scene.add(ambient);

// Directional from above — makes top bright, sides dark
const topLight = new THREE.DirectionalLight(0xfff0d0, 3.0);
topLight.position.set(0, 10, 2);
topLight.castShadow = true;
topLight.shadow.mapSize.set(1024, 1024);
scene.add(topLight);

// Main overhead warm light (like a hanging lantern)
const overhead = new THREE.PointLight(0xffa552, 15, 30, 1.5);
overhead.position.set(0, 4, 0);
overhead.castShadow = true;
overhead.shadow.mapSize.set(1024, 1024);
scene.add(overhead);

// Two candle-like side lights
const candleL = new THREE.PointLight(0xff8833, 3, 10, 2);
candleL.position.set(-3.5, 2.5, 2);
scene.add(candleL);

const candleR = new THREE.PointLight(0xff8833, 3, 10, 2);
candleR.position.set(3.5, 2.5, -2);
scene.add(candleR);

// Subtle blue rim light from behind
const rimLight = new THREE.DirectionalLight(0x4466aa, 0.6);
rimLight.position.set(0, 4, -8);
scene.add(rimLight);

// ── Table ──
const tableGeo = new THREE.BoxGeometry(10, 1.0, 9);
const tableMat = new THREE.MeshStandardMaterial({
  color: 0x694429,
  roughness: 0.85,
  metalness: 0.05,
});
const table = new THREE.Mesh(tableGeo, tableMat);
table.position.y = -0.5;
table.receiveShadow = true;
scene.add(table);

// ── Parchment map ──
const mapGeo = new THREE.PlaneGeometry(8, 8);
const mapMat = new THREE.MeshStandardMaterial({
  color: 0x58761A,
  roughness: 0.95,
  metalness: 0,
  side: THREE.DoubleSide,
});
const parchment = new THREE.Mesh(mapGeo, mapMat);
parchment.rotation.x = -Math.PI / 2;
parchment.position.y = 0.01;
// parchment.position.z = -0.3;
parchment.receiveShadow = true;
scene.add(parchment);

// ── Draw paths (connections between rooms) ──
function createPath(roomA, roomB) {
  const points = [
    new THREE.Vector3(roomA.x, 0.025, roomA.z),
    new THREE.Vector3(roomB.x, 0.025, roomB.z),
  ];
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color: 0x5a4228, linewidth: 1 });
  const line = new THREE.Line(geo, mat);
  scene.add(line);

  // Dashed overlay for style
  const dashMat = new THREE.LineDashedMaterial({
    color: 0x7a5a32,
    dashSize: 0.15,
    gapSize: 0.1,
    linewidth: 1,
  });
  const dashLine = new THREE.Line(geo.clone(), dashMat);
  dashLine.computeLineDistances();
  dashLine.position.y = 0.001;
  scene.add(dashLine);
}

// Draw all connections (avoid duplicates)
const drawnPaths = new Set();
ROOMS.forEach(room => {
  room.exits.forEach(exitId => {
    const key = [room.id, exitId].sort().join('-');
    if (!drawnPaths.has(key)) {
      drawnPaths.add(key);
      createPath(room, roomById[exitId]);
    }
  });
});

// ── Room markers ──
const TYPE_COLORS = {
  start:  0x4caf50,
  trap:   0xff9800,
  combat: 0xf44336,
  choice: 0x42a5f5,
  rest:   0x66bb6a,
  boss:   0xab47bc,
};

const markerGlowMeshes = [];

ROOMS.forEach(room => {
  // Base disc
  const discGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.06, 24);
  const discMat = new THREE.MeshStandardMaterial({
    color: 0x2a1c0f,
    roughness: 0.7,
    metalness: 0.2,
  });
  const disc = new THREE.Mesh(discGeo, discMat);
  disc.position.set(room.x, 0.04, room.z);
  disc.castShadow = true;
  disc.receiveShadow = true;
  scene.add(disc);

  // Colored gem on top
  const gemGeo = new THREE.SphereGeometry(0.12, 16, 12);
  const gemMat = new THREE.MeshStandardMaterial({
    color: TYPE_COLORS[room.type] || 0xc8a96e,
    roughness: 0.3,
    metalness: 0.6,
    emissive: TYPE_COLORS[room.type] || 0xc8a96e,
    emissiveIntensity: 0.3,
  });
  const gem = new THREE.Mesh(gemGeo, gemMat);
  gem.position.set(room.x, 0.15, room.z);
  gem.castShadow = true;
  scene.add(gem);

  // Glow ring (for reachable rooms)
  const ringGeo = new THREE.RingGeometry(0.38, 0.48, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0xffe9a0,
    transparent: true,
    opacity: 0,
    side: THREE.DoubleSide,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.set(room.x, 0.02, room.z);
  scene.add(ring);

  // Invisible click target (larger)
  const hitGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.3, 16);
  const hitMat = new THREE.MeshBasicMaterial({ visible: false });
  const hitMesh = new THREE.Mesh(hitGeo, hitMat);
  hitMesh.position.set(room.x, 0.1, room.z);
  hitMesh.userData = { roomId: room.id };
  scene.add(hitMesh);
  roomMeshes.push(hitMesh);

  room._gem = gem;
  room._ring = ring;
  room._disc = disc;
  markerGlowMeshes.push({ gem, ring, room });
});

// ── Player miniature ──
function createPlayerToken() {
  const group = new THREE.Group();

  // Base
  const baseGeo = new THREE.CylinderGeometry(0.18, 0.22, 0.08, 16);
  const baseMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, roughness: 0.4, metalness: 0.7 });
  group.add(new THREE.Mesh(baseGeo, baseMat));

  // Body
  const bodyGeo = new THREE.CylinderGeometry(0.08, 0.14, 0.35, 12);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, roughness: 0.4, metalness: 0.6 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.22;
  group.add(body);

  // Head
  const headGeo = new THREE.SphereGeometry(0.1, 12, 10);
  const headMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, roughness: 0.35, metalness: 0.7 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 0.46;
  group.add(head);

  group.traverse(c => { if (c.isMesh) c.castShadow = true; });

  const startRoom = roomById[currentRoom];
  group.position.set(startRoom.x, 0.08, startRoom.z);
  playerTargetPos = group.position.clone();

  scene.add(group);
  return group;
}

playerToken = createPlayerToken();

// ── Update reachable room highlights ──
function updateReachable() {
  const current = roomById[currentRoom];
  markerGlowMeshes.forEach(({ gem, ring, room }) => {
    const reachable = current.exits.includes(room.id);
    const isCurrent = room.id === currentRoom;
    ring.material.opacity = reachable ? 0.5 : 0;
    gem.material.emissiveIntensity = isCurrent ? 0.8 : reachable ? 0.5 : 0.15;
  });
}
updateReachable();

// ── Raycasting / click ──
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredRoom = null;

canvas.addEventListener('mousemove', e => {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(roomMeshes);

  const tooltip = document.getElementById('tooltip');
  if (hits.length > 0) {
    const roomId = hits[0].object.userData.roomId;
    const room = roomById[roomId];
    const current = roomById[currentRoom];

    if (current.exits.includes(roomId)) {
      hoveredRoom = roomId;
      canvas.style.cursor = 'pointer';
      document.getElementById('tooltip-name').textContent = room.name;
      document.getElementById('tooltip-type').textContent = room.type;
      tooltip.style.left = e.clientX + 'px';
      tooltip.style.top = e.clientY + 'px';
      tooltip.classList.add('visible');
    } else {
      hoveredRoom = null;
      canvas.style.cursor = 'default';
      tooltip.classList.remove('visible');
    }
  } else {
    hoveredRoom = null;
    canvas.style.cursor = 'default';
    tooltip.classList.remove('visible');
  }
});

canvas.addEventListener('click', () => {
  if (!hoveredRoom) return;
  moveToRoom(hoveredRoom);
});

function moveToRoom(roomId) {
  currentRoom = roomId;
  const room = roomById[roomId];
  playerTargetPos = new THREE.Vector3(room.x, 0.08, room.z);
  updateReachable();
  document.getElementById('tooltip').classList.remove('visible');

  // Save current room, then navigate to viewer after token arrives
  localStorage.setItem('dndlite-currentRoom', roomId);
  setTimeout(() => {
    window.location.href = 'viewer.html';
  }, 1200);
}

// ── Camera subtle sway ──
let rawMouseX = 0, rawMouseY = 0;
let smMouseX = 0, smMouseY = 0;
const BASE_CAM_POS = new THREE.Vector3(0, 5, 10);
const CAM_LOOK = new THREE.Vector3(0, 0, -0.5);

window.addEventListener('mousemove', e => {
  rawMouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
  rawMouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

// ── Resize ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── Render loop ──
const clock = new THREE.Clock();

function tick() {
  requestAnimationFrame(tick);
  const t = clock.getElapsedTime();

  // Light flicker
  overhead.intensity = 8 + Math.sin(t * 2.5) * 1.2 + Math.sin(t * 5.7) * 0.6;
  candleL.intensity  = 3 + Math.sin(t * 3.1 + 1) * 0.8 + Math.sin(t * 7.2) * 0.3;
  candleR.intensity  = 3 + Math.sin(t * 2.8 + 2) * 0.8 + Math.sin(t * 6.5) * 0.3;

  // Glow ring pulse on reachable rooms
  const current = roomById[currentRoom];
  markerGlowMeshes.forEach(({ ring, room }) => {
    if (current.exits.includes(room.id)) {
      ring.material.opacity = 0.3 + 0.2 * Math.sin(t * 2.5 + ROOMS.indexOf(room));
    }
  });

  // Animate player token movement
  if (playerToken && playerTargetPos) {
    playerToken.position.lerp(playerTargetPos, 0.06);
    // Slight bob
    playerToken.position.y = 0.08 + Math.sin(t * 1.8) * 0.015;
  }

  // Camera sway
  smMouseX += (rawMouseX - smMouseX) * 0.03;
  smMouseY += (rawMouseY - smMouseY) * 0.03;
  camera.position.set(
    BASE_CAM_POS.x + smMouseX * 0.6,
    BASE_CAM_POS.y,
    BASE_CAM_POS.z + smMouseY * 0.3
  );
  camera.lookAt(CAM_LOOK);

  renderer.render(scene, camera);
}

// ── DEBUG MODE ──
const debugObjects = [
  { name: 'Table',     obj: table },
  { name: 'Parchment', obj: parchment },
  { name: 'Camera',    obj: camera },
  { name: 'Overhead',  obj: overhead },
];
let debugIdx = 0;
const MOVE_STEP = 0.2;

// Debug overlay
const debugEl = document.createElement('div');
debugEl.style.cssText = 'position:fixed;top:12px;right:12px;z-index:999;background:rgba(0,0,0,.8);color:#ffe9a0;font:12px monospace;padding:12px 16px;border-radius:6px;border:1px solid rgba(200,169,110,.3);line-height:1.8;pointer-events:none;';
document.body.appendChild(debugEl);

function updateDebugUI() {
  const obj = debugObjects[debugIdx];
  const p = obj.obj.position;
  debugEl.innerHTML = debugObjects.map((d, i) => {
    const pos = d.obj.position;
    const prefix = i === debugIdx ? '▸ ' : '  ';
    return `${prefix}[${i+1}] ${d.name}: x${pos.x.toFixed(2)} y${pos.y.toFixed(2)} z${pos.z.toFixed(2)}`;
  }).join('<br>') + '<br><br>WASD=XZ  QE=Y  1-4=select';
}
updateDebugUI();

window.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();

  // Select object: 1-4
  if (key >= '1' && key <= '4') {
    debugIdx = parseInt(key) - 1;
    updateDebugUI();
    return;
  }

  const obj = debugObjects[debugIdx].obj;
  switch(key) {
    case 'w': obj.position.z -= MOVE_STEP; break;
    case 's': obj.position.z += MOVE_STEP; break;
    case 'a': obj.position.x -= MOVE_STEP; break;
    case 'd': obj.position.x += MOVE_STEP; break;
    case 'q': obj.position.y -= MOVE_STEP; break;
    case 'e': obj.position.y += MOVE_STEP; break;
    default: return;
  }

  // Sync BASE_CAM_POS if moving camera
  if (debugObjects[debugIdx].name === 'Camera') {
    BASE_CAM_POS.copy(camera.position);
  }

  updateDebugUI();
});

// Hide loading and start
document.getElementById('map-loading').classList.add('hidden');
tick();
</script>
</body>
</html>
