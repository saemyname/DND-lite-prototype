<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Off-Axis — Furnished Box</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/": "https://cdn.jsdelivr.net/npm/three@0.176.0/"
  }
}
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Georgia', serif;
    color: #c8a96e;
    user-select: none;
  }
  canvas { display: block; width: 100%; height: 100%; }

  #title {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-size: 14px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(200,169,110,.5);
    pointer-events: none;
  }

  #nav {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 50;
    display: flex;
    gap: 8px;
  }
  #nav a {
    padding: 6px 14px;
    background: rgba(200,169,110,.06);
    border: 1px solid rgba(200,169,110,.2);
    border-radius: 4px;
    color: rgba(200,169,110,.55);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    transition: all .2s;
  }
  #nav a:hover, #nav a.active {
    background: rgba(200,169,110,.18);
    border-color: rgba(200,169,110,.5);
    color: #ffe9a0;
  }

  #info {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 50;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(200,169,110,.4);
    line-height: 1.6;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="title">Furnished Box</div>
<div id="nav">
  <a href="map.html" class="active">Furnished</a>
  <a href="map-grid.html">Grid</a>
</div>
<div id="info">
  Move your head to peek inside the box.<br>
  The screen acts as a window into the scene.
</div>

<div id="webcam-preview" class="hidden">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="face-canvas"></canvas>
</div>

<script type="module">
import * as THREE from 'three';
import { initFaceCamera, updateFaceCamera, onResizeFaceCamera } from '../scripts/face-camera.js';
import { buildBox } from '../scripts/off-axis-box.js';

// ── Renderer ──
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// ── Box dimensions ──
// Sized to exceed the off-axis frustum (SCREEN_W=40 wide at z=0),
// so the opening fills the entire screen across common aspect ratios.
const BOX_W = 50, BOX_H = 35, BOX_D = 40;

// ── Camera ──
// Window (open face) is at z=0. Camera sits in front, looking into the box.
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 300);
const BASE_CAM_POS = new THREE.Vector3(0, 0, 24);
const LOOK_TARGET  = new THREE.Vector3(0, 0, -20);
const SCREEN_DIST  = BASE_CAM_POS.z;

// ── Lighting ──
scene.add(new THREE.AmbientLight(0xffffff, 0.4));

const keyLight = new THREE.DirectionalLight(0xffeecc, 1.2);
keyLight.position.set(12, 24, 10);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
keyLight.shadow.camera.left = -35;
keyLight.shadow.camera.right = 35;
keyLight.shadow.camera.top = 35;
keyLight.shadow.camera.bottom = -35;
keyLight.shadow.camera.near = 0.5;
keyLight.shadow.camera.far = 80;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x8899ff, 0.4);
fillLight.position.set(-15, 10, -12);
scene.add(fillLight);

const insideLight = new THREE.PointLight(0xffaa66, 2.0, 70, 1.5);
insideLight.position.set(0, 6, -22);
scene.add(insideLight);

// ── Build the box ──
const boxGroup = new THREE.Group();
scene.add(boxGroup);
buildBox(boxGroup, { w: BOX_W, h: BOX_H, d: BOX_D });

// ── Objects inside (depth cues for parallax) ──
function addCube(x, y, z, size, color) {
  const mesh = new THREE.Mesh(
    new THREE.BoxGeometry(size, size, size),
    new THREE.MeshStandardMaterial({ color, roughness: 0.6, metalness: 0.1 })
  );
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  boxGroup.add(mesh);
  return mesh;
}
function addSphere(x, y, z, r, color) {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(r, 24, 18),
    new THREE.MeshStandardMaterial({ color, roughness: 0.4, metalness: 0.3 })
  );
  mesh.position.set(x, y, z);
  mesh.castShadow = true;
  mesh.receiveShadow = true;
  boxGroup.add(mesh);
  return mesh;
}

const HH = BOX_H / 2;
addCube(-14.0, -HH + 1.6, -6.0, 3.2, 0xc85a3a);
addCube( 13.0, -HH + 1.3, -8.0, 2.6, 0x3a8ac8);
const midSphere = addSphere(0, -HH + 2.2, -18.0, 2.2, 0xd4af37);
addCube(-10.0, -HH + 2.0, -32.0, 4.0, 0x5ac83a);
addCube( 14.0, -HH + 1.6, -34.0, 3.3, 0xc83a8a);
const floater = addSphere(0, 4.5, -15.0, 1.3, 0xffe9a0);

// ── Face tracking ──
initFaceCamera();

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  onResizeFaceCamera(w, h);
});
onResizeFaceCamera(window.innerWidth, window.innerHeight);

// ── Render loop ──
const clock = new THREE.Clock();
const faceCamConfig = {
  basePos: BASE_CAM_POS,
  lookTarget: LOOK_TARGET,
  screenDist: SCREEN_DIST,
  offAxis: true,
  far: 200,
};

function tick() {
  requestAnimationFrame(tick);
  const t = clock.getElapsedTime();

  floater.position.y = 4.5 + Math.sin(t * 1.2) * 1.2;
  midSphere.rotation.y = t * 0.5;

  updateFaceCamera(camera, faceCamConfig);
  renderer.render(scene, camera);
}
tick();
</script>
</body>
</html>
