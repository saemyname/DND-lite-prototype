<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Lite — World Map</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/": "https://cdn.jsdelivr.net/npm/three@0.176.0/"
  }
}
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Georgia', serif;
    color: #c8a96e;
    user-select: none;
  }
  canvas { display: block; width: 100%; height: 100%; }

  #title {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-size: 14px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(200,169,110,.5);
    pointer-events: none;
  }

  #nav {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 50;
    display: flex;
    gap: 8px;
  }
  #nav a {
    padding: 6px 14px;
    background: rgba(200,169,110,.06);
    border: 1px solid rgba(200,169,110,.2);
    border-radius: 4px;
    color: rgba(200,169,110,.55);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    transition: all .2s;
  }
  #nav a:hover, #nav a.active {
    background: rgba(200,169,110,.18);
    border-color: rgba(200,169,110,.5);
    color: #ffe9a0;
  }

  #tooltip {
    position: fixed;
    z-index: 100;
    padding: 6px 14px;
    background: rgba(0,0,0,.85);
    border: 1px solid rgba(200,169,110,.4);
    border-radius: 4px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ffe9a0;
    pointer-events: none;
    opacity: 0;
    transition: opacity .15s;
    white-space: nowrap;
  }
  #tooltip.visible { opacity: 1; }

  #vignette {
    position: fixed;
    inset: 0;
    z-index: 40;
    pointer-events: none;
    box-shadow: inset 0 0 120px 40px rgba(0,0,0,.7);
  }

  #controls-hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(200,169,110,.3);
    pointer-events: none;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="title">3D Interactive map test</div>
<div id="nav">
  <a href="map.html">Box</a>
  <a href="3d-viewer.html">Viewer</a>
  <a href="world-map.html" class="active">World</a>
</div>
<div id="tooltip"></div>
<div id="vignette"></div>
<div id="controls-hint">Scroll to zoom</div>

<div id="webcam-preview" class="hidden">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="face-canvas"></canvas>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/examples/jsm/loaders/DRACOLoader.js';
import { initFaceCamera, updateFaceCamera, onResizeFaceCamera, initRotationButtons } from '../scripts/face-camera.js';

// ══════════════════════════════════════
//   RENDERER
// ══════════════════════════════════════

const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.NoToneMapping;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);
scene.fog = new THREE.FogExp2(0xffffff, 0.003);

// ══════════════════════════════════════
//   CAMERA
// ══════════════════════════════════════

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 300);
const BASE_CAM_POS = new THREE.Vector3(0, 40, 0);
const LOOK_TARGET  = new THREE.Vector3(0, 0, 0);

// ══════════════════════════════════════
//   LIGHTING
// ══════════════════════════════════════

scene.add(new THREE.AmbientLight(0xffffff, 0.8));

const keyLight = new THREE.DirectionalLight(0xffffff, 2.5);
keyLight.position.set(20, 50, 15);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.left = -40;
keyLight.shadow.camera.right = 40;
keyLight.shadow.camera.top = 40;
keyLight.shadow.camera.bottom = -40;
keyLight.shadow.camera.near = 1;
keyLight.shadow.camera.far = 120;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x88aaff, 0.8);
fillLight.position.set(-15, 20, -10);
scene.add(fillLight);

// ══════════════════════════════════════
//   GLB MAP MODEL
// ══════════════════════════════════════

const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/libs/draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

let mapModel = null;
const clickables = [];

gltfLoader.load('../Assets/dnd_map_02a.glb', (gltf) => {
  mapModel = gltf.scene;
  mapModel.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
      clickables.push(child);
    }
  });

  // Center and scale to fill view (same approach as 3d-viewer.html)
  const box = new THREE.Box3().setFromObject(mapModel);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  mapModel.position.sub(center);

  const scale = 60 / Math.max(size.x, size.z, 0.01);
  mapModel.scale.setScalar(scale);

  scene.add(mapModel);
  console.log('Map loaded — size:', size, 'scale:', scale.toFixed(3));
}, undefined, (err) => {
  console.error('Map load error:', err);
});

// ══════════════════════════════════════
//   ZOOM + ROTATION
// ══════════════════════════════════════

let zoomLevel = 0;

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoomLevel -= e.deltaY * 0.03;
  zoomLevel = Math.max(-20, Math.min(30, zoomLevel));
}, { passive: false });

// 90-degree rotation buttons (from face-camera.js)
initRotationButtons();

// ══════════════════════════════════════
//   RAYCASTER + TOOLTIP
// ══════════════════════════════════════

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltipEl = document.getElementById('tooltip');

canvas.addEventListener('pointermove', e => {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickables, false);

  if (hits.length > 0 && hits[0].object.userData.locationName) {
    tooltipEl.textContent = hits[0].object.userData.locationName;
    tooltipEl.style.left = (e.clientX + 16) + 'px';
    tooltipEl.style.top = (e.clientY - 10) + 'px';
    tooltipEl.classList.add('visible');
    canvas.style.cursor = 'pointer';
  } else {
    tooltipEl.classList.remove('visible');
    canvas.style.cursor = 'default';
  }
});

canvas.addEventListener('click', e => {
  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(clickables, false);
  if (hits.length > 0 && hits[0].object.userData.locationId) {
    console.log('Clicked:', hits[0].object.userData.locationId, hits[0].object.userData.locationName);
  }
});

// ══════════════════════════════════════
//   FACE CAMERA
// ══════════════════════════════════════

initFaceCamera();

const faceCamConfig = {
  basePos: BASE_CAM_POS.clone(),
  lookTarget: LOOK_TARGET.clone(),
  screenDist: 30,
  offAxis: true,
  far: 300,
  strength: 8,
  strengthY: 4,
};

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  onResizeFaceCamera(w, h);
});
onResizeFaceCamera(window.innerWidth, window.innerHeight);

// ══════════════════════════════════════
//   RENDER LOOP
// ══════════════════════════════════════

function tick() {
  requestAnimationFrame(tick);

  // Update face camera config with zoom
  // zoomLevel: -20 (max zoom in / top view) to +30 (max zoom out / front view)
  const zoomRatio = 1 - (zoomLevel + 20) / 50; // 0 = zoom in (top), 1 = zoom out (front)
  faceCamConfig.basePos.set(0, 40 + zoomLevel, zoomRatio * 30);
  faceCamConfig.screenDist = 40 + zoomLevel;

  // Fog density: thicker when zoomed out, clear when zoomed in
  scene.fog.density = 0.001 + zoomRatio * 0.008;

  updateFaceCamera(camera, faceCamConfig);
  renderer.render(scene, camera);
}
tick();
</script>
</body>
</html>
