<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Lite — World Map</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/": "https://cdn.jsdelivr.net/npm/three@0.176.0/"
  }
}
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Georgia', serif;
    color: #c8a96e;
    user-select: none;
  }
  canvas { display: block; width: 100%; height: 100%; }

  #title {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-size: 14px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(200,169,110,.5);
    pointer-events: none;
  }

  #nav {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 50;
    display: flex;
    gap: 8px;
  }
  #nav a {
    padding: 6px 14px;
    background: rgba(200,169,110,.06);
    border: 1px solid rgba(200,169,110,.2);
    border-radius: 4px;
    color: rgba(200,169,110,.55);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    transition: all .2s;
  }
  #nav a:hover, #nav a.active {
    background: rgba(200,169,110,.18);
    border-color: rgba(200,169,110,.5);
    color: #ffe9a0;
  }

  #tooltip {
    position: fixed;
    z-index: 100;
    padding: 6px 14px;
    background: rgba(0,0,0,.85);
    border: 1px solid rgba(200,169,110,.4);
    border-radius: 4px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #ffe9a0;
    pointer-events: none;
    opacity: 0;
    transition: opacity .15s;
    white-space: nowrap;
  }
  #tooltip.visible { opacity: 1; }

  #vignette {
    position: fixed;
    inset: 0;
    z-index: 40;
    pointer-events: none;
    box-shadow: inset 0 0 120px 40px rgba(0,0,0,.7);
  }

  #controls-hint {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(200,169,110,.3);
    pointer-events: none;
    text-transform: uppercase;
  }

  #debug-panel {
    position: fixed;
    top: 70px;
    right: 16px;
    z-index: 200;
    background: rgba(0,0,0,.85);
    border: 1px solid rgba(200,169,110,.35);
    border-radius: 6px;
    padding: 12px 14px;
    font-family: monospace;
    font-size: 11px;
    color: #c8a96e;
    min-width: 240px;
    display: none;
  }
  #debug-panel.visible { display: block; }
  #debug-panel h3 {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(200,169,110,.6);
    margin-bottom: 10px;
    border-bottom: 1px solid rgba(200,169,110,.2);
    padding-bottom: 6px;
  }
  #debug-panel .row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 7px;
  }
  #debug-panel label {
    width: 110px;
    font-size: 10px;
    color: rgba(200,169,110,.7);
    flex-shrink: 0;
  }
  #debug-panel input[type=range] {
    flex: 1;
    accent-color: #c8a96e;
    height: 3px;
  }
  #debug-panel .val {
    width: 36px;
    text-align: right;
    font-size: 10px;
    color: #ffe9a0;
  }
  #debug-panel .stat {
    display: flex;
    justify-content: space-between;
    margin-bottom: 4px;
    font-size: 10px;
  }
  #debug-panel .stat span:last-child { color: #ffe9a0; }
  #debug-panel .section { margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(200,169,110,.15); }

  #debug-toggle {
    position: fixed;
    top: 70px;
    right: 16px;
    z-index: 201;
    padding: 5px 10px;
    background: rgba(200,169,110,.08);
    border: 1px solid rgba(200,169,110,.3);
    border-radius: 4px;
    color: rgba(200,169,110,.6);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Georgia', serif;
  }
  #debug-toggle:hover { background: rgba(200,169,110,.18); color: #ffe9a0; }
  #debug-panel.visible ~ #debug-toggle,
  #debug-toggle.panel-open { top: auto; bottom: 70px; right: 16px; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="title">3D Interactive map test</div>
<div id="nav">
  <a href="../index.html">← Home</a>
</div>
<div id="tooltip"></div>
<div id="vignette"></div>
<div id="controls-hint">Scroll to zoom · D = debug</div>

<button id="debug-toggle">Debug</button>
<div id="debug-panel">
  <h3>Camera Debug</h3>

  <div class="stat"><span>zoomLevel</span><span id="db-zoom">0</span></div>
  <div class="stat"><span>zoomRatio</span><span id="db-ratio">0.00</span></div>
  <div class="stat"><span>cam.position</span><span id="db-pos">—</span></div>
  <div class="stat"><span>basePos (Y,Z)</span><span id="db-base">—</span></div>

  <div class="section">
    <div class="row">
      <label>lookTarget X</label>
      <input type="range" id="sl-lx" min="-40" max="40" step="0.5" value="0">
      <span class="val" id="vl-lx">0</span>
    </div>
  </div>

  <div class="section">
    <div class="row">
      <label>zoomIn camY</label>
      <input type="range" id="sl-inY" min="-10" max="80" step="0.5" value="13">
      <span class="val" id="vl-inY">13</span>
    </div>
    <div class="row">
      <label>zoomOut camY</label>
      <input type="range" id="sl-outY" min="-10" max="80" step="0.5" value="7">
      <span class="val" id="vl-outY">7</span>
    </div>
    <div class="row">
      <label>zoomIn camZ</label>
      <input type="range" id="sl-inZ" min="-20" max="60" step="0.5" value="13">
      <span class="val" id="vl-inZ">13</span>
    </div>
    <div class="row">
      <label>zoomOut camZ</label>
      <input type="range" id="sl-outZ" min="-20" max="60" step="0.5" value="18">
      <span class="val" id="vl-outZ">18</span>
    </div>
    <div class="row">
      <label>zoom min</label>
      <input type="range" id="sl-zmin" min="-60" max="0" step="1" value="-20">
      <span class="val" id="vl-zmin">-20</span>
    </div>
    <div class="row">
      <label>zoom max</label>
      <input type="range" id="sl-zmax" min="0" max="80" step="1" value="30">
      <span class="val" id="vl-zmax">30</span>
    </div>
  </div>
</div>


<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/examples/jsm/loaders/DRACOLoader.js';
import { on } from '../scripts/game-socket.js';

// ══════════════════════════════════════
//   RENDERER
// ══════════════════════════════════════

const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.NoToneMapping;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0xffffff);
scene.fog = new THREE.FogExp2(0xffffff, 0.003);

// ══════════════════════════════════════
//   CAMERA
// ══════════════════════════════════════

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 300);
const BASE_CAM_POS = new THREE.Vector3(0, 40, 0);
const LOOK_TARGET  = new THREE.Vector3(0, 0, 5);

// ══════════════════════════════════════
//   LIGHTING
// ══════════════════════════════════════

scene.add(new THREE.AmbientLight(0xffffff, 0.8));

const keyLight = new THREE.DirectionalLight(0xffffff, 2.5);
keyLight.position.set(20, 50, 15);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(2048, 2048);
keyLight.shadow.camera.left = -40;
keyLight.shadow.camera.right = 40;
keyLight.shadow.camera.top = 40;
keyLight.shadow.camera.bottom = -40;
keyLight.shadow.camera.near = 1;
keyLight.shadow.camera.far = 120;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x88aaff, 0.8);
fillLight.position.set(-15, 20, -10);
scene.add(fillLight);

// ══════════════════════════════════════
//   GLB MAP MODEL
// ══════════════════════════════════════

const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/libs/draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

let mapModel = null;
let mapScale = 1;
let mapOffset = new THREE.Vector3();
const clickables = [];

// ── Stage system ──
const stages = {};       // { 'stage_01': { mesh, worldPos } }
let currentStage = null;
let miniature = null;
let miniTargetPos = null; // lerp target for movement
let miniMoving = false;
let miniArrivalCallback = null;
let miniBottomOffset = 0;
const MINI_SPEED = 0.04;  // lerp factor
const clearedStages = new Set(['stage_01']); // start cleared

// Character data
const charData = JSON.parse(localStorage.getItem('dndlite-character') || 'null');
const charRole = charData?.role?.toLowerCase() || 'warrior';

gltfLoader.load('../Assets/dnd_map_06a.glb', (gltf) => {
  mapModel = gltf.scene;

  // Center and scale
  const box = new THREE.Box3().setFromObject(mapModel);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  mapModel.position.sub(center);
  mapOffset.copy(center).negate();

  mapScale = 60 / Math.max(size.x, size.z, 0.01);
  mapModel.scale.setScalar(mapScale);

  // Add to scene and update world matrices BEFORE reading positions
  scene.add(mapModel);
  mapModel.updateMatrixWorld(true);

  // Find stages and tag meshes
  mapModel.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
      clickables.push(child);
    }
    // Match stage/button objects by name (case insensitive)
    const name = (child.name || '').toLowerCase().replace(/[\s._-]+/g, '_');
    if (name.includes('stage') || name.includes('button')) {
      const stageBox = new THREE.Box3().setFromObject(child);
      // Use object pivot XZ (more accurate than bounding box center), bounding box max Y for miniature placement
      const pivotPos = new THREE.Vector3();
      child.getWorldPosition(pivotPos);
      const worldPos = new THREE.Vector3(pivotPos.x, stageBox.max.y, pivotPos.z);
      // Tag for click detection
      child.traverse(c => {
        if (c.isMesh) {
          c.userData.stageId = name;
          c.userData.locationName = child.name;
        }
      });
      if (child.isMesh) {
        child.userData.stageId = name;
        child.userData.locationName = child.name;
      }
      stages[name] = { object: child, worldPos };
      console.log('Stage found:', name, 'at', worldPos.x.toFixed(1), worldPos.y.toFixed(1), worldPos.z.toFixed(1));
    }
  });

  console.log('Map loaded — size:', size, 'scale:', mapScale.toFixed(3));
  console.log('Stages:', Object.keys(stages));

  // Log all object names for debugging
  mapModel.traverse(child => {
    if (child.name) console.log('  obj:', child.name);
  });

  // Clear fog around stage_01
  const s01 = Object.values(stages).find(s => s.object.name.toLowerCase().includes('01'));
  if (s01) {
    revealFog(s01.worldPos.x, s01.worldPos.z);
    currentStage = s01;
  } else {
    // Fallback: clear center
    revealFog(0, 0);
  }

  // Collect stage meshes for raycasting (direct hit on model geometry)
  mapModel.traverse(c => {
    if (c.isMesh && c.userData.stageId && !stageClickables.includes(c)) {
      stageClickables.push(c);
    }
  });

  // Load miniature
  loadMiniature();
}, undefined, (err) => {
  console.error('Map load error:', err);
});

// ── Miniature loading ──
function loadMiniature() {
  const modelFile = `../Assets/${charRole}.glb`;
  gltfLoader.load(modelFile, (gltf) => {
    miniature = gltf.scene;
    miniature.traverse(child => {
      if (child.isMesh) {
        child.castShadow = true;
      }
    });

    // Scale miniature to fit on stage
    const miniBox = new THREE.Box3().setFromObject(miniature);
    const miniSize = miniBox.getSize(new THREE.Vector3());
    const miniScale = 1.5 / Math.max(miniSize.x, miniSize.y, miniSize.z, 0.01);
    miniature.scale.setScalar(miniScale);

    // Offset so bottom of miniature sits at position Y
    const scaledBox = new THREE.Box3().setFromObject(miniature);
    miniBottomOffset = scaledBox.min.y;

    // Place on current stage
    if (currentStage) {
      const p = currentStage.worldPos;
      miniature.position.set(p.x, p.y - miniBottomOffset, p.z);
    }

    scene.add(miniature);
    console.log('Miniature loaded:', charRole);
  }, undefined, (err) => {
    console.error('Miniature load error:', err);
  });
}

// ── Stage clickable meshes (direct hit on model geometry) ──
const stageClickables = [];

// ── Stage key → page URL ──
function getStageURL(stageKey) {
  const num = stageKey.replace(/\D/g, '');
  return `stage${num.padStart(2, '0')}.html`;
}

// ── Move miniature to a stage ──
function moveToStage(stageKey) {
  const stage = stages[stageKey];
  if (!stage || !miniature) return;

  miniTargetPos = stage.worldPos.clone();
  miniTargetPos.y -= miniBottomOffset;
  miniMoving = true;
  currentStage = stage;
  miniArrivalCallback = () => {
    window.location.href = getStageURL(stageKey);
  };

  // Clear fog at destination
  revealFog(stage.worldPos.x, stage.worldPos.z);

  // Mark as cleared
  clearedStages.add(stageKey);
  console.log('Moving to:', stageKey);
}

// ══════════════════════════════════════
//   FOG OF WAR (particle cloud)
// ══════════════════════════════════════

const FOG_COUNT = 3000;
const FOG_SPREAD = 35;  // XZ spread radius
const FOG_Y_MIN = 1;
const FOG_Y_MAX = 3;
const FOG_PARTICLE_SIZE = 12;
const FOG_REVEAL_RADIUS = 10; // world units

// Soft circle sprite texture
const spriteCanvas = document.createElement('canvas');
spriteCanvas.width = 64;
spriteCanvas.height = 64;
const sCtx = spriteCanvas.getContext('2d');
const grad = sCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
grad.addColorStop(0, 'rgba(255,255,255,0.6)');
grad.addColorStop(0.4, 'rgba(255,255,255,0.3)');
grad.addColorStop(1, 'rgba(255,255,255,0)');
sCtx.fillStyle = grad;
sCtx.fillRect(0, 0, 64, 64);
const spriteTexture = new THREE.CanvasTexture(spriteCanvas);

// Particle positions + base opacity
const fogPositions = new Float32Array(FOG_COUNT * 3);
const fogOpacities = new Float32Array(FOG_COUNT); // per-particle opacity
const fogBasePositions = []; // store original positions for reveal check

for (let i = 0; i < FOG_COUNT; i++) {
  const angle = Math.random() * Math.PI * 2;
  const dist = 4 + Math.random() * FOG_SPREAD;
  const x = Math.cos(angle) * dist;
  const z = Math.sin(angle) * dist;
  const y = FOG_Y_MIN + Math.random() * (FOG_Y_MAX - FOG_Y_MIN);
  fogPositions[i * 3]     = x;
  fogPositions[i * 3 + 1] = y;
  fogPositions[i * 3 + 2] = z;
  fogOpacities[i] = 1.0;
  fogBasePositions.push({ x, z });
}

// Per-particle animation state: 'idle' | 'dispersing' | 'gone'
const fogState = [];
for (let i = 0; i < FOG_COUNT; i++) {
  fogState.push({ state: 'idle', vx: 0, vz: 0, progress: 0 });
}

const fogGeo = new THREE.BufferGeometry();
fogGeo.setAttribute('position', new THREE.BufferAttribute(fogPositions, 3));

const fogMat = new THREE.PointsMaterial({
  map: spriteTexture,
  size: FOG_PARTICLE_SIZE,
  transparent: true,
  opacity: 0.5,
  depthWrite: false,
  blending: THREE.NormalBlending,
  sizeAttenuation: true,
  color: 0xdddddd,
});

const fogPoints = new THREE.Points(fogGeo, fogMat);
fogPoints.renderOrder = 900;
scene.add(fogPoints);

function revealFog(worldX, worldZ) {
  for (let i = 0; i < FOG_COUNT; i++) {
    if (fogState[i].state !== 'idle') continue;
    const bp = fogBasePositions[i];
    const dx = bp.x - worldX;
    const dz = bp.z - worldZ;
    const dist2 = dx * dx + dz * dz;
    if (dist2 < FOG_REVEAL_RADIUS * FOG_REVEAL_RADIUS) {
      const dist = Math.sqrt(dist2) || 0.1;
      const speed = 4 + Math.random() * 5;
      fogState[i].state = 'dispersing';
      fogState[i].vx = (dx / dist) * speed;
      fogState[i].vz = (dz / dist) * speed;
      fogState[i].progress = 0;
    }
  }
}

// ══════════════════════════════════════
//   MULTIPLAYER SYNC
// ══════════════════════════════════════

const serverUnlocked = new Set(
  JSON.parse(localStorage.getItem('unlocked-stages') || '["stage_01"]')
);

function syncUnlockedStages(list) {
  serverUnlocked.clear();
  for (const key of list) serverUnlocked.add(key);
  localStorage.setItem('unlocked-stages', JSON.stringify(list));
}

if (localStorage.getItem('session-code')) {
  on('joined', (msg) => {
    if (msg.unlockedStages) syncUnlockedStages(msg.unlockedStages);
  });

  on('player_rejoined', (msg) => {
    if (msg.unlockedStages) syncUnlockedStages(msg.unlockedStages);
  });

  on('stage_unlock', (msg) => {
    serverUnlocked.add(msg.stageKey);
    localStorage.setItem('unlocked-stages', JSON.stringify([...serverUnlocked]));
    console.log('[ws] Stage unlocked:', msg.stageKey);
  });

  on('fog_reveal', (msg) => {
    revealFog(msg.x, msg.z);
  });
}

// ══════════════════════════════════════
//   ZOOM + ROTATION
// ══════════════════════════════════════

let zoomLevel = 0;

// Zoom camera params (editable via debug panel)
const zoomParams = {
  min: -20,
  max: 30,
  inY: 13,   // camY when fully zoomed in
  outY: 7,   // camY when fully zoomed out
  inZ: 13,   // camZ when fully zoomed in
  outZ: 18,  // camZ when fully zoomed out
};

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  zoomLevel -= e.deltaY * 0.03;
  zoomLevel = Math.max(zoomParams.min, Math.min(zoomParams.max, zoomLevel));
}, { passive: false });

// ── Debug panel ──
const debugPanel = document.getElementById('debug-panel');
const debugToggle = document.getElementById('debug-toggle');

function toggleDebug() {
  const visible = debugPanel.classList.toggle('visible');
  debugToggle.textContent = visible ? 'Close' : 'Debug';
}
debugToggle.addEventListener('click', toggleDebug);
document.addEventListener('keydown', e => { if (e.key === 'd' || e.key === 'D') toggleDebug(); });

// Wire sliders
function wireSlider(id, valId, paramKey) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => {
    zoomParams[paramKey] = parseFloat(sl.value);
    vl.textContent = sl.value;
    // Clamp zoomLevel when limits change
    zoomLevel = Math.max(zoomParams.min, Math.min(zoomParams.max, zoomLevel));
  });
}
wireSlider('sl-inY',  'vl-inY',  'inY');
wireSlider('sl-outY', 'vl-outY', 'outY');
wireSlider('sl-inZ',  'vl-inZ',  'inZ');
wireSlider('sl-outZ', 'vl-outZ', 'outZ');
wireSlider('sl-zmin', 'vl-zmin', 'min');
wireSlider('sl-zmax', 'vl-zmax', 'max');

// lookTarget sliders
document.getElementById('sl-lx').addEventListener('input', e => {
  LOOK_TARGET.x = parseFloat(e.target.value);
  document.getElementById('vl-lx').textContent = e.target.value;
});


// ══════════════════════════════════════
//   RAYCASTER + TOOLTIP
// ══════════════════════════════════════

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
const tooltipEl = document.getElementById('tooltip');

let hoveredStageKey = null;

function setStageHover(stageKey, hover) {
  const stage = stages[stageKey];
  if (!stage) return;

  stage.object.traverse(c => {
    if (!c.isMesh) return;
    // Clone material once per mesh to isolate shared instances
    if (!c.userData._matCloned) {
      c.material = Array.isArray(c.material)
        ? c.material.map(m => m.clone())
        : c.material.clone();
      c.userData._matCloned = true;
    }
    const mats = Array.isArray(c.material) ? c.material : [c.material];
    mats.forEach(m => {
      if (m.emissive) {
        m.emissive.setRGB(hover ? 1 : 0, 0, 0);
        m.emissiveIntensity = hover ? 1 : 0;
      }
    });
  });

  stage.object.scale.setScalar(hover ? 1.5 : 1.0);
}

const STAGE_HIT_PX = 55; // screen-space pixel radius for hover/click
const _stageProj = new THREE.Vector3();

function nearestStageKey(clientX, clientY) {
  let bestKey = null, bestDist = STAGE_HIT_PX;
  for (const [key, stage] of Object.entries(stages)) {
    _stageProj.copy(stage.worldPos).project(camera);
    const sx = ( _stageProj.x * 0.5 + 0.5) * window.innerWidth;
    const sy = (1 - (_stageProj.y * 0.5 + 0.5)) * window.innerHeight;
    const d = Math.hypot(sx - clientX, sy - clientY);
    if (d < bestDist) { bestDist = d; bestKey = key; }
  }
  return bestKey;
}

canvas.addEventListener('pointermove', e => {
  const stageKey = nearestStageKey(e.clientX, e.clientY);

  if (stageKey !== hoveredStageKey) {
    if (hoveredStageKey) setStageHover(hoveredStageKey, false);
    hoveredStageKey = stageKey;
    if (hoveredStageKey) setStageHover(hoveredStageKey, true);
  }

  if (stageKey) {
    tooltipEl.textContent = stages[stageKey].object.name;
    tooltipEl.style.left = (e.clientX + 16) + 'px';
    tooltipEl.style.top = (e.clientY - 10) + 'px';
    tooltipEl.classList.add('visible');
    canvas.style.cursor = 'pointer';
  } else {
    tooltipEl.classList.remove('visible');
    canvas.style.cursor = 'default';
  }
});

// Ground plane for raycasting (catches clicks on fog areas)
const groundPlane = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshBasicMaterial({ color: 0x000000, opacity: 0, transparent: true })
);
groundPlane.rotation.x = -Math.PI / 2;
groundPlane.position.y = 0;
scene.add(groundPlane);

canvas.addEventListener('click', e => {
  const stageId = nearestStageKey(e.clientX, e.clientY);
  if (stageId && !miniMoving) {
    const num = parseInt(stageId.replace(/\D/g, ''));
    const prevKey = Object.keys(stages).find(k => k.includes(String(num - 1).padStart(2, '0')));
    if (num === 1 || clearedStages.has(prevKey) || serverUnlocked.has(stageId)) {
      moveToStage(stageId);
    } else {
      console.log('Stage locked:', stageId, '— clear previous first');
    }
  } else {
    // Fog reveal on ground
    mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
    mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects([groundPlane], false);
    if (hits.length > 0) revealFog(hits[0].point.x, hits[0].point.z);
  }
});

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});

// ══════════════════════════════════════
//   RENDER LOOP
// ══════════════════════════════════════

const clock = new THREE.Clock();
let lastTime = 0;

function tick() {
  requestAnimationFrame(tick);
  const t = clock.getElapsedTime();
  const dt = t - lastTime;
  lastTime = t;

  // Fog particle animation
  const fogPos = fogGeo.attributes.position;
  for (let i = 0; i < FOG_COUNT; i++) {
    const s = fogState[i];
    if (s.state === 'gone') continue;
    if (s.state === 'dispersing') {
      s.progress += dt * 1.5;
      // Scatter outward on XZ plane
      fogPos.setX(i, fogPos.getX(i) + s.vx * dt);
      fogPos.setZ(i, fogPos.getZ(i) + s.vz * dt);
      if (s.progress >= 1) {
        s.state = 'gone';
        fogPos.setY(i, -999);
      }
    } else {
      // Idle drift
      const bp = fogBasePositions[i];
      fogPos.setX(i, bp.x + Math.sin(t * 0.3 + i * 0.7) * 1.5);
      fogPos.setZ(i, bp.z + Math.cos(t * 0.25 + i * 0.5) * 1.5);
    }
  }
  fogPos.needsUpdate = true;

  // Miniature movement animation
  if (miniature && miniMoving && miniTargetPos) {
    miniature.position.x += (miniTargetPos.x - miniature.position.x) * MINI_SPEED;
    miniature.position.z += (miniTargetPos.z - miniature.position.z) * MINI_SPEED;
    const dx = miniTargetPos.x - miniature.position.x;
    const dz = miniTargetPos.z - miniature.position.z;
    if (Math.sqrt(dx * dx + dz * dz) < 0.1) {
      miniature.position.x = miniTargetPos.x;
      miniature.position.z = miniTargetPos.z;
      miniMoving = false;
      if (miniArrivalCallback) {
        const cb = miniArrivalCallback;
        miniArrivalCallback = null;
        cb();
      }
    }
  }

  // Update face camera config with zoom
  const zoomRange = zoomParams.max - zoomParams.min || 1;
  const zoomRatio = 1 - (zoomLevel - zoomParams.min) / zoomRange; // 0 = zoom in, 1 = zoom out
  const camY = zoomParams.inY + zoomRatio * (zoomParams.outY - zoomParams.inY);
  const camZ = zoomParams.inZ + zoomRatio * (zoomParams.outZ - zoomParams.inZ);
  BASE_CAM_POS.set(0, camY, camZ);

  // Update debug panel stats
  if (debugPanel.classList.contains('visible')) {
    document.getElementById('db-zoom').textContent  = zoomLevel.toFixed(1);
    document.getElementById('db-ratio').textContent = zoomRatio.toFixed(3);
    document.getElementById('db-pos').textContent   =
      `${camera.position.x.toFixed(1)}, ${camera.position.y.toFixed(1)}, ${camera.position.z.toFixed(1)}`;
    document.getElementById('db-base').textContent  =
      `${camY.toFixed(1)}, ${camZ.toFixed(1)}`;
  }
  // Fog density: thicker when zoomed out, clear when zoomed in
  scene.fog.density = 0.001 + zoomRatio * 0.008;

  // Simple camera: position from zoom params, look at map center
  camera.position.copy(BASE_CAM_POS);
  camera.lookAt(LOOK_TARGET);
  renderer.render(scene, camera);
}
tick();
</script>
<script type="module" src="../scripts/player-session.js"></script>
