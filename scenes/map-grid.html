<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Off-Axis — Grid Box</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/": "https://cdn.jsdelivr.net/npm/three@0.176.0/"
  }
}
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Georgia', serif;
    color: #c8a96e;
    user-select: none;
  }
  canvas { display: block; width: 100%; height: 100%; }

  #title {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-size: 14px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(200,169,110,.5);
    pointer-events: none;
  }

  #nav {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 50;
    display: flex;
    gap: 8px;
  }
  #nav a {
    padding: 6px 14px;
    background: rgba(200,169,110,.06);
    border: 1px solid rgba(200,169,110,.2);
    border-radius: 4px;
    color: rgba(200,169,110,.55);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    transition: all .2s;
  }
  #nav a:hover, #nav a.active {
    background: rgba(200,169,110,.18);
    border-color: rgba(200,169,110,.5);
    color: #ffe9a0;
  }

  #info {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 50;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(200,169,110,.4);
    line-height: 1.6;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="title">Grid Box</div>
<div id="nav">
  <a href="map.html">Furnished</a>
  <a href="map-grid.html" class="active">Grid</a>
</div>
<div id="info">
  Grid lines on walls make the parallax effect obvious.<br>
  Move your head to peek inside.
</div>

<div id="webcam-preview" class="hidden">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="face-canvas"></canvas>
</div>

<script type="module">
import * as THREE from 'three';
import { initFaceCamera, updateFaceCamera, onResizeFaceCamera } from '../scripts/face-camera.js';
import { buildBox } from '../scripts/off-axis-box.js';

// ── Renderer ──
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x000000);

// ── Box dimensions ──
// Opening fills the screen EXACTLY: width = SCREEN_W, height derived from aspect.
const SCREEN_W = 40;
const BOX_W = SCREEN_W;
const BOX_D = 40;
let boxH = SCREEN_W / (window.innerWidth / window.innerHeight);

// ── Camera ──
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 300);
const BASE_CAM_POS = new THREE.Vector3(0, 0, 24);
const LOOK_TARGET  = new THREE.Vector3(0, 0, -20);
const SCREEN_DIST  = BASE_CAM_POS.z;

// ── Lighting ──
// Dim ambient so the grid lines read clearly against dark walls.
scene.add(new THREE.AmbientLight(0x334455, 0.5));

const insideLight = new THREE.PointLight(0x66aaff, 2.0, 70, 1.5);
insideLight.position.set(0, 6, -20);
scene.add(insideLight);

// ── Build the grid box (rebuilt on resize to match aspect) ──
let boxGroup = null;
function rebuildBox() {
  if (boxGroup) {
    scene.remove(boxGroup);
    boxGroup.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material && !Array.isArray(o.material)) o.material.dispose();
    });
  }
  boxH = SCREEN_W / (window.innerWidth / window.innerHeight);
  boxGroup = new THREE.Group();
  scene.add(boxGroup);
  buildBox(boxGroup, {
    w: BOX_W, h: boxH, d: BOX_D,
    wallColor: 0x0f1420,
    frameColor: 0x1a1a2a,
    withGrid: true,
    gridColor: 0x66ddff,
    gridStep: 2.0,
  });
}
rebuildBox();

// ── Face tracking ──
initFaceCamera();

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  onResizeFaceCamera(w, h);
  rebuildBox();
});
onResizeFaceCamera(window.innerWidth, window.innerHeight);

// ── Render loop ──
const faceCamConfig = {
  basePos: BASE_CAM_POS,
  lookTarget: LOOK_TARGET,
  screenDist: SCREEN_DIST,
  offAxis: true,
  strength: 8,   // scaled up for this large test box (default is 2.5)
  far: 200,
};

function tick() {
  requestAnimationFrame(tick);
  updateFaceCamera(camera, faceCamConfig);
  renderer.render(scene, camera);
}
tick();
</script>
</body>
</html>
