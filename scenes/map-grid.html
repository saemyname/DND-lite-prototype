<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Off-Axis — Voxel Room</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/": "https://cdn.jsdelivr.net/npm/three@0.176.0/"
  }
}
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Georgia', serif;
    color: #c8a96e;
    user-select: none;
  }
  canvas { display: block; width: 100%; height: 100%; }

  #title {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-size: 14px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(200,169,110,.5);
    pointer-events: none;
  }

  #nav {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 50;
    display: flex;
    gap: 8px;
  }
  #nav a {
    padding: 6px 14px;
    background: rgba(200,169,110,.06);
    border: 1px solid rgba(200,169,110,.2);
    border-radius: 4px;
    color: rgba(200,169,110,.55);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    transition: all .2s;
  }
  #nav a:hover, #nav a.active {
    background: rgba(200,169,110,.18);
    border-color: rgba(200,169,110,.5);
    color: #ffe9a0;
  }

  #info {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 50;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(200,169,110,.4);
    line-height: 1.6;
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="title">Teenage Room</div>
<div id="nav">
  <a href="map.html">Box</a>
  <a href="map-grid.html" class="active">Room</a>
</div>
<div id="info">
  Peek into the room.<br>
  Board game map on the desk, right side.
</div>

<div id="webcam-preview" class="hidden">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="face-canvas"></canvas>
</div>

<script type="module">
import * as THREE from 'three';
import { initFaceCamera, updateFaceCamera, onResizeFaceCamera } from '../scripts/face-camera.js';
import { loadBlockMaterials, buildVoxelGroups, groupToMesh } from '../scripts/voxel-textures.js';

// ── Renderer ──
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050210);

// ── Camera ──
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 300);
const BASE_CAM_POS = new THREE.Vector3(0, 0, 24);
const LOOK_TARGET  = new THREE.Vector3(0, 0, -8);
const SCREEN_DIST  = BASE_CAM_POS.z;

// ── Lighting ──
scene.add(new THREE.AmbientLight(0xfff0d0, 0.3));

const keyLight = new THREE.DirectionalLight(0xfff0d0, 1.0);
keyLight.position.set(8, 20, 10);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
keyLight.shadow.camera.left = -30;
keyLight.shadow.camera.right = 30;
keyLight.shadow.camera.top = 30;
keyLight.shadow.camera.bottom = -30;
keyLight.shadow.camera.far = 60;
scene.add(keyLight);

// Warm overhead light (bedroom ceiling light)
const ceilingLight = new THREE.PointLight(0xffeedd, 5, 50, 1.5);
ceilingLight.position.set(0, 20, -8);
scene.add(ceilingLight);

// Desk lamp (right side, warm)
const deskLamp = new THREE.PointLight(0xffcc88, 3, 20, 1.5);
deskLamp.position.set(14, 8, -6);
scene.add(deskLamp);

// Window-ish ambient from front (cool daylight)
const windowLight = new THREE.DirectionalLight(0xaabbdd, 0.6);
windowLight.position.set(0, 4, 10);
scene.add(windowLight);

// ── Voxel room — Teenage bedroom ──
// Room grid: 20 wide × 14 tall × 8 deep (voxels)
// Each voxel = 2 world units → 40 × 28 × 16 world units
const RW = 20, RH = 14, RD = 8;
const VSCALE = 2;

const palette = [
  'wood',         // 0 — hardwood floor
  'brick_red',    // 1 — red brick walls
  'wood_red',     // 2 — desk / furniture
  'cotton_blue',  // 3 — bedding
  'cotton_red',   // 4 — rug / accents
  'cotton_tan',   // 5 — pillow / cushion
  'sand',         // 6 — ceiling (light)
  'trunk_white',  // 7 — white furniture (shelf frame)
  'gravel_stone', // 8 — grey furniture
  'gold',         // 9 — board game map pieces
  'ice',          // 10 — window
  'brick_grey',   // 11 — grey accents
  'table',        // 12 — board game map
];
const grid = new Int8Array(RW * RH * RD).fill(-1);
const idx = (x, y, z) => x + y * RW + z * RW * RH;

const FLOOR = 0, WALL = 1, DESK = 2, BED = 3, RUG = 4, PILLOW = 5;
const CEIL = 6, WHITE = 7, GREY = 8, MAP = 9, ICE = 10, GREY2 = 11;

// ── Floor — grey brick ──
for (let x = 0; x < RW; x++)
  for (let z = 0; z < RD; z++)
    grid[idx(x, 0, z)] = GREY2;

// ── Ceiling — light sand color ──
for (let x = 0; x < RW; x++)
  for (let z = 0; z < RD; z++)
    grid[idx(x, RH - 1, z)] = CEIL;

// ── Walls — red brick ──
for (let x = 0; x < RW; x++)
  for (let y = 1; y <= RH - 2; y++)
    grid[idx(x, y, 0)] = WALL;

for (let z = 0; z < RD; z++)
  for (let y = 1; y <= RH - 2; y++) {
    grid[idx(0, y, z)] = WALL;
    grid[idx(RW - 1, y, z)] = WALL;
  }

// ── Window on back wall (glass blocks) ──
for (let x = 8; x <= 11; x++)
  for (let y = 4; y <= 7; y++)
    grid[idx(x, y, 0)] = ICE;

// ── Table (center of room) — wood with legs ──
// 4 legs (y=1)
grid[idx(8, 1, 3)] = FLOOR;
grid[idx(12, 1, 3)] = FLOOR;
grid[idx(8, 1, 5)] = FLOOR;
grid[idx(12, 1, 5)] = FLOOR;
// Tabletop (y=2)
for (let x = 8; x <= 12; x++)
  for (let z = 3; z <= 5; z++)
    grid[idx(x, 2, z)] = FLOOR;

// Board game map — single table block in center of tabletop
grid[idx(10, 2, 4)] = 12;

// ── Chairs — one on each side ──
grid[idx(7, 1, 4)] = FLOOR;   // left chair
grid[idx(13, 1, 4)] = FLOOR;  // right chair


// ── Build voxel meshes ──
const blockMaterials = loadBlockMaterials('../Assets/Tiles/');
const groups = buildVoxelGroups(grid, [RW, RH, RD], palette);
const roomGroup = new THREE.Group();

for (const [key, g] of Object.entries(groups)) {
  if (g.positions.length === 0) continue;
  roomGroup.add(groupToMesh(key, g, blockMaterials));
}

roomGroup.scale.setScalar(VSCALE);
scene.add(roomGroup);

// Position the room: room origin (0,0,0) maps to bottom-left-back corner
// Room front (z=RD-1) should be near z=0 (the window plane)
function repositionRoom() {
  const HH = (40 / (window.innerWidth / window.innerHeight)) / 2;
  roomGroup.position.set(
    -RW * VSCALE / 2,   // center horizontally
    -HH,                // floor at box bottom
    -RD * VSCALE         // back wall pushed to -16
  );
}
repositionRoom();

// ── Face tracking ──
initFaceCamera();

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  onResizeFaceCamera(w, h);
  repositionRoom();
});
onResizeFaceCamera(window.innerWidth, window.innerHeight);

// ── Render loop ──
const clock = new THREE.Clock();
const faceCamConfig = {
  basePos: BASE_CAM_POS,
  lookTarget: LOOK_TARGET,
  screenDist: SCREEN_DIST,
  offAxis: true,
  far: 100,
  strength: 20,
  strengthY: 5,
};

function tick() {
  requestAnimationFrame(tick);
  const t = clock.getElapsedTime();

  // Gentle light variation (not flickering — steady room light)
  deskLamp.intensity = 3 + Math.sin(t * 0.8) * 0.3;

  updateFaceCamera(camera, faceCamConfig);
  renderer.render(scene, camera);
}
tick();
</script>
</body>
</html>
