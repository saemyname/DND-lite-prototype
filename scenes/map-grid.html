<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Off-Axis — GLB Model</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/": "https://cdn.jsdelivr.net/npm/three@0.176.0/"
  }
}
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Georgia', serif;
    color: #c8a96e;
    user-select: none;
  }
  canvas { display: block; width: 100%; height: 100%; }

  #title {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-size: 14px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(200,169,110,.5);
    pointer-events: none;
  }

  #nav {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 50;
    display: flex;
    gap: 8px;
  }
  #nav a {
    padding: 6px 14px;
    background: rgba(200,169,110,.06);
    border: 1px solid rgba(200,169,110,.2);
    border-radius: 4px;
    color: rgba(200,169,110,.55);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    transition: all .2s;
  }
  #nav a:hover, #nav a.active {
    background: rgba(200,169,110,.18);
    border-color: rgba(200,169,110,.5);
    color: #ffe9a0;
  }

  #info {
    position: fixed;
    bottom: 24px;
    left: 24px;
    z-index: 50;
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(200,169,110,.4);
    line-height: 1.6;
  }

  #loading {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(200,169,110,.5);
    transition: opacity .6s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="title">Map Room</div>
<div id="nav">
  <a href="map.html">Box</a>
  <a href="map-grid.html" class="active">Room</a>
</div>
<div id="info">
  GLB model with off-axis projection.
</div>
<div id="loading">Loading model...</div>

<div id="webcam-preview" class="hidden">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="face-canvas"></canvas>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/examples/jsm/loaders/DRACOLoader.js';
import { initFaceCamera, updateFaceCamera, onResizeFaceCamera } from '../scripts/face-camera.js';

// ── Renderer ──
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050210);

// ── Camera ──
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
const BASE_CAM_POS = new THREE.Vector3(0, 0, 24);
const LOOK_TARGET  = new THREE.Vector3(0, 0, -8);
const SCREEN_DIST  = BASE_CAM_POS.z;

// ── Lighting ──
scene.add(new THREE.AmbientLight(0xfff0d0, 0.5));

const keyLight = new THREE.DirectionalLight(0xfff0d0, 1.5);
keyLight.position.set(8, 20, 10);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
keyLight.shadow.camera.left = -30;
keyLight.shadow.camera.right = 30;
keyLight.shadow.camera.top = 30;
keyLight.shadow.camera.bottom = -30;
keyLight.shadow.camera.far = 60;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x8899ff, 0.4);
fillLight.position.set(-10, 8, -6);
scene.add(fillLight);

const overheadLight = new THREE.PointLight(0xffa552, 3, 50, 1.5);
overheadLight.position.set(0, 12, -8);
scene.add(overheadLight);

// ── Load GLB model ──
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/libs/draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

const modelGroup = new THREE.Group();
scene.add(modelGroup);

gltfLoader.load('../Assets/dnd_typeshyt-02a.glb', (gltf) => {
  const model = gltf.scene;
  model.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  // Center and scale the model to fit the off-axis window
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());

  // Center the model at origin
  model.position.sub(center);

  // Scale so model fills screen width, compensating for perspective.
  // Model center sits at z = -depth/2. At that depth, perspective shrinks
  // width by factor camZ / (camZ + depth/2). So we scale larger to cancel.
  const baseScale = 40 / size.x;
  const scaledDepth = size.z * baseScale;
  const camZ = BASE_CAM_POS.z;
  const perspCompensation = (camZ + scaledDepth / 2) / camZ;
  const scale = baseScale * perspCompensation;
  model.scale.setScalar(scale);

  modelGroup.add(model);

  // Position so front face is at z=0
  const finalDepth = size.z * scale;
  modelGroup.position.set(0, 0, -finalDepth / 2);

  document.getElementById('loading').classList.add('hidden');
  console.log('GLB loaded — size:', size, 'scale:', scale);
}, undefined, (err) => {
  console.error('GLB load error:', err);
  document.getElementById('loading').textContent = 'Load failed';
});

// ── Face tracking ──
initFaceCamera();

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  onResizeFaceCamera(w, h);
});
onResizeFaceCamera(window.innerWidth, window.innerHeight);

// ── Render loop ──
const clock = new THREE.Clock();
const faceCamConfig = {
  basePos: BASE_CAM_POS,
  lookTarget: LOOK_TARGET,
  screenDist: SCREEN_DIST,
  offAxis: true,
  far: 500,
  strength: 20,
  strengthY: 5,
};

function tick() {
  requestAnimationFrame(tick);
  updateFaceCamera(camera, faceCamConfig);
  renderer.render(scene, camera);
}
tick();
</script>
</body>
</html>
