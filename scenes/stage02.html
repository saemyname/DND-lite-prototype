<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Lite — Stage 02</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/": "https://cdn.jsdelivr.net/npm/three@0.176.0/"
  }
}
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Georgia', serif;
    color: #c8a96e;
    user-select: none;
  }
  canvas { display: block; width: 100%; height: 100%; }

  #title {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-size: 14px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(200,169,110,.5);
    pointer-events: none;
  }

  #nav {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 50;
    display: flex;
    gap: 8px;
  }
  #nav a {
    padding: 6px 14px;
    background: rgba(200,169,110,.06);
    border: 1px solid rgba(200,169,110,.2);
    border-radius: 4px;
    color: rgba(200,169,110,.55);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    transition: all .2s;
  }
  #nav a:hover {
    background: rgba(200,169,110,.18);
    border-color: rgba(200,169,110,.5);
    color: #ffe9a0;
  }

  #loading {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(200,169,110,.5);
    transition: opacity .6s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="title">Stage 02</div>
<div id="nav">
  <a href="world-map.html">← World</a>
</div>
<div id="loading">Loading...</div>

<div id="webcam-preview" class="hidden">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="face-canvas"></canvas>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/examples/jsm/loaders/DRACOLoader.js';
import { updateFaceCamera, onResizeFaceCamera, initRotationButtons } from '../scripts/face-camera.js';

// ── Grid / combat state (module scope) ──
let gridData = null;
let floorPlane = null;
let playerToken = null;
let playerCol = 0, playerRow = 0;
let playerTargetPos = null;
let enemyTokens = [];
let turnState = 'idle'; // 'idle' | 'move' | 'moving' | 'action'
const highlightMeshes = [];
const highlightGroup = new THREE.Group();
let debugGridLines = [];
let pendingRoll = null;
const charData = JSON.parse(localStorage.getItem('dndlite-character') || 'null');

// ── Renderer ──
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.NoToneMapping;

const scene = new THREE.Scene();
scene.add(highlightGroup);
scene.background = new THREE.Color(0x050210);

// ── Camera ──
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
const BASE_CAM_POS = new THREE.Vector3(0, 8, 30);
const LOOK_TARGET  = new THREE.Vector3(0, 0, 0);

// ── Lighting ──
scene.add(new THREE.AmbientLight(0xfff0d0, 0.5));

const keyLight = new THREE.DirectionalLight(0xfff0d0, 1.5);
keyLight.position.set(8, 20, 10);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
keyLight.shadow.camera.left = -30;
keyLight.shadow.camera.right = 30;
keyLight.shadow.camera.top = 30;
keyLight.shadow.camera.bottom = -30;
keyLight.shadow.camera.far = 60;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x8899ff, 0.4);
fillLight.position.set(-10, 8, -6);
scene.add(fillLight);

const overheadLight = new THREE.PointLight(0xffa552, 3, 50, 1.5);
overheadLight.position.set(0, 12, -8);
scene.add(overheadLight);

// ── GLB loader ──
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/libs/draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

// ── Model loading ──
let currentModel = null;

function placeModel(gltfScene, name) {
  if (currentModel) {
    scene.remove(currentModel);
    currentModel.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) {
        if (Array.isArray(o.material)) o.material.forEach(m => m.dispose());
        else o.material.dispose();
      }
    });
    currentModel = null;
  }

  const model = gltfScene;
  model.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  model.position.sub(center);

  const baseScale = 40 / Math.max(size.x, 0.01);
  const scaledDepth = size.z * baseScale;
  const camZ = BASE_CAM_POS.z;
  const perspComp = (camZ + scaledDepth / 2) / camZ;
  const scale = baseScale * perspComp;
  model.scale.setScalar(scale);

  const group = new THREE.Group();
  group.add(model);
  const finalDepth = size.z * scale;
  group.position.set(0, 0, -finalDepth / 2);

  scene.add(group);
  currentModel = group;

  // Rotate around the model's world center
  LOOK_TARGET.set(0, 0, -finalDepth / 2);

  document.getElementById('loading').classList.add('hidden');
}

// ── Grid utilities ──
function gridToWorld(col, row) {
  const { cellSizeX, cellSizeZ, originX, originZ, floorY } = gridData.grid;
  return new THREE.Vector3(
    originX + col * cellSizeX + cellSizeX / 2,
    floorY,
    originZ + row * cellSizeZ + cellSizeZ / 2
  );
}

function isWalkable(col, row) {
  const { cols, rows } = gridData.grid;
  if (col < 0 || col >= cols || row < 0 || row >= rows) return false;
  return gridData.walkable[row][col] === 1;
}

function calcMoveRange(startCol, startRow, range) {
  const tiles = [];
  const visited = new Set();
  const queue = [{ col: startCol, row: startRow, dist: 0 }];
  visited.add(`${startCol},${startRow}`);
  while (queue.length) {
    const { col, row, dist } = queue.shift();
    tiles.push({ col, row });
    if (dist < range) {
      for (const [dc, dr] of [[1,0],[-1,0],[0,1],[0,-1]]) {
        const nc = col + dc, nr = row + dr;
        const key = `${nc},${nr}`;
        if (!visited.has(key) && isWalkable(nc, nr)) {
          visited.add(key);
          queue.push({ col: nc, row: nr, dist: dist + 1 });
        }
      }
    }
  }
  return tiles;
}

// DEBUG: shows green grid lines for calibration — removed in Task 8
function addDebugGrid() {
  const { cols, rows, cellSizeX, cellSizeZ, originX, originZ, floorY } = gridData.grid;
  const mat = new THREE.LineBasicMaterial({ color: 0x00ff44, opacity: 0.7, transparent: true });
  for (let c = 0; c <= cols; c++) {
    const x = originX + c * cellSizeX;
    const pts = [
      new THREE.Vector3(x, floorY + 0.3, originZ),
      new THREE.Vector3(x, floorY + 0.3, originZ + rows * cellSizeZ),
    ];
    const l = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat);
    scene.add(l);
    debugGridLines.push(l);
  }
  for (let r = 0; r <= rows; r++) {
    const z = originZ + r * cellSizeZ;
    const pts = [
      new THREE.Vector3(originX, floorY + 0.3, z),
      new THREE.Vector3(originX + cols * cellSizeX, floorY + 0.3, z),
    ];
    const l = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat);
    scene.add(l);
    debugGridLines.push(l);
  }
}

function removeDebugGrid() {
  debugGridLines.forEach(l => scene.remove(l));
  debugGridLines = [];
}

gltfLoader.load('../Assets/dnd_luna_ruins_02a.glb', async (gltf) => {
  placeModel(gltf.scene, 'dnd_luna_ruins_02a.glb');

  // Log model bounds for floorY calibration — remove after calibration
  const modelBox = new THREE.Box3().setFromObject(currentModel);
  console.log('[grid-calibrate] model bounds:', {
    minX: modelBox.min.x.toFixed(2), maxX: modelBox.max.x.toFixed(2),
    minY: modelBox.min.y.toFixed(2), maxY: modelBox.max.y.toFixed(2),
    minZ: modelBox.min.z.toFixed(2), maxZ: modelBox.max.z.toFixed(2),
  });

  // Load grid
  const resp = await fetch('../rooms/stage02-grid.json');
  gridData = await resp.json();

  // Invisible floor plane for raycasting
  const floorGeo = new THREE.PlaneGeometry(200, 200);
  floorPlane = new THREE.Mesh(
    floorGeo,
    new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide })
  );
  floorPlane.rotation.x = -Math.PI / 2;
  floorPlane.position.y = gridData.grid.floorY;
  scene.add(floorPlane);

  // Debug grid lines (removed in Task 8)
  addDebugGrid();
}, undefined, (err) => {
  console.error('GLB load error:', err);
  document.getElementById('loading').textContent = 'Load failed';
});

// ── Face tracking + rotation buttons ──
initRotationButtons();

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  onResizeFaceCamera(w, h);
});
onResizeFaceCamera(window.innerWidth, window.innerHeight);

// ── Render loop ──
const faceCamConfig = {
  basePos: BASE_CAM_POS,
  lookTarget: LOOK_TARGET,
  offAxis: false,
  far: 500,
};

function tick() {
  requestAnimationFrame(tick);
  updateFaceCamera(camera, faceCamConfig);
  renderer.render(scene, camera);
}
tick();
</script>

<script type="module" src="../scripts/player-session.js"></script>
</body>
</html>
