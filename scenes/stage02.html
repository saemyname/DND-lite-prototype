<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Lite — Stage 02</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/": "https://cdn.jsdelivr.net/npm/three@0.176.0/"
  }
}
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Georgia', serif;
    color: #c8a96e;
    user-select: none;
  }
  canvas { display: block; width: 100%; height: 100%; }

  #title {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-size: 14px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(200,169,110,.5);
    pointer-events: none;
  }

  #nav {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 50;
    display: flex;
    gap: 8px;
  }
  #nav a {
    padding: 6px 14px;
    background: rgba(200,169,110,.06);
    border: 1px solid rgba(200,169,110,.2);
    border-radius: 4px;
    color: rgba(200,169,110,.55);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    transition: all .2s;
  }
  #nav a:hover {
    background: rgba(200,169,110,.18);
    border-color: rgba(200,169,110,.5);
    color: #ffe9a0;
  }

  #loading {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(200,169,110,.5);
    transition: opacity .6s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<div id="title">Stage 02</div>
<div id="nav">
  <a href="world-map.html">← World</a>
</div>
<div id="loading">Loading...</div>

<div id="webcam-preview" class="hidden">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="face-canvas"></canvas>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/examples/jsm/loaders/DRACOLoader.js';
import { updateFaceCamera, onResizeFaceCamera, initRotationButtons } from '../scripts/face-camera.js';

// ── Grid / combat state (module scope) ──
let gridData = null;
let floorPlane = null;
let playerToken = null;
let playerCol = 0, playerRow = 0;
let playerTargetPos = null;
let enemyTokens = [];
let turnState = 'idle'; // 'idle' | 'move' | 'moving' | 'action'
const highlightMeshes = [];
const highlightGroup = new THREE.Group();
let debugGridLines = [];
let pendingRoll = null;
const charData = JSON.parse(localStorage.getItem('dndlite-character') || 'null');

function initHUD() {
  if (!charData) return;
  const nameEl = document.getElementById('hud-name');
  const roleEl = document.getElementById('hud-role');
  if (nameEl) nameEl.textContent = charData.name;
  if (roleEl) roleEl.textContent = charData.role;
  updateHUD();
}

function updateHUD() {
  if (!charData) return;
  ['str','agi','int','lck','hp'].forEach(key => {
    const val = charData[key] ?? 0;
    const el = document.getElementById('val-' + key);
    const bar = document.getElementById('bar-' + key);
    if (el) el.textContent = val;
    if (bar) bar.style.width = (val / 20 * 100) + '%';
  });
}

// ── Renderer ──
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.NoToneMapping;

const scene = new THREE.Scene();
scene.add(highlightGroup);
scene.background = new THREE.Color(0x050210);

// ── Camera ──
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
const BASE_CAM_POS = new THREE.Vector3(0, 8, 30);
const LOOK_TARGET  = new THREE.Vector3(0, 0, 0);

// ── Lighting ──
scene.add(new THREE.AmbientLight(0xfff0d0, 0.5));

const keyLight = new THREE.DirectionalLight(0xfff0d0, 1.5);
keyLight.position.set(8, 20, 10);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
keyLight.shadow.camera.left = -30;
keyLight.shadow.camera.right = 30;
keyLight.shadow.camera.top = 30;
keyLight.shadow.camera.bottom = -30;
keyLight.shadow.camera.far = 60;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x8899ff, 0.4);
fillLight.position.set(-10, 8, -6);
scene.add(fillLight);

const overheadLight = new THREE.PointLight(0xffa552, 3, 50, 1.5);
overheadLight.position.set(0, 12, -8);
scene.add(overheadLight);

// ── GLB loader ──
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/libs/draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

// ── Model loading ──
let currentModel = null;

function placeModel(gltfScene, name) {
  if (currentModel) {
    scene.remove(currentModel);
    currentModel.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) {
        if (Array.isArray(o.material)) o.material.forEach(m => m.dispose());
        else o.material.dispose();
      }
    });
    currentModel = null;
  }

  const model = gltfScene;
  model.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  model.position.sub(center);

  const baseScale = 40 / Math.max(size.x, 0.01);
  const scaledDepth = size.z * baseScale;
  const camZ = BASE_CAM_POS.z;
  const perspComp = (camZ + scaledDepth / 2) / camZ;
  const scale = baseScale * perspComp;
  model.scale.setScalar(scale);

  const group = new THREE.Group();
  group.add(model);
  const finalDepth = size.z * scale;
  group.position.set(0, 0, -finalDepth / 2);

  scene.add(group);
  currentModel = group;

  // Rotate around the model's world center
  LOOK_TARGET.set(0, 0, -finalDepth / 2);

  document.getElementById('loading').classList.add('hidden');
}

// ── Grid utilities ──
function gridToWorld(col, row) {
  const { cellSizeX, cellSizeZ, originX, originZ, floorY } = gridData.grid;
  return new THREE.Vector3(
    originX + col * cellSizeX + cellSizeX / 2,
    floorY,
    originZ + row * cellSizeZ + cellSizeZ / 2
  );
}

function isWalkable(col, row) {
  const { cols, rows } = gridData.grid;
  if (col < 0 || col >= cols || row < 0 || row >= rows) return false;
  return gridData.walkable[row][col] === 1;
}

function calcMoveRange(startCol, startRow, range) {
  const tiles = [];
  const visited = new Set();
  const queue = [{ col: startCol, row: startRow, dist: 0 }];
  visited.add(`${startCol},${startRow}`);
  while (queue.length) {
    const { col, row, dist } = queue.shift();
    tiles.push({ col, row });
    if (dist < range) {
      for (const [dc, dr] of [[1,0],[-1,0],[0,1],[0,-1]]) {
        const nc = col + dc, nr = row + dr;
        const key = `${nc},${nr}`;
        if (!visited.has(key) && isWalkable(nc, nr)) {
          visited.add(key);
          queue.push({ col: nc, row: nr, dist: dist + 1 });
        }
      }
    }
  }
  return tiles;
}

// DEBUG: shows green grid lines for calibration — removed in Task 8
function addDebugGrid() {
  const { cols, rows, cellSizeX, cellSizeZ, originX, originZ, floorY } = gridData.grid;
  const mat = new THREE.LineBasicMaterial({ color: 0x00ff44, opacity: 0.7, transparent: true });
  for (let c = 0; c <= cols; c++) {
    const x = originX + c * cellSizeX;
    const pts = [
      new THREE.Vector3(x, floorY + 0.3, originZ),
      new THREE.Vector3(x, floorY + 0.3, originZ + rows * cellSizeZ),
    ];
    const l = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat);
    scene.add(l);
    debugGridLines.push(l);
  }
  for (let r = 0; r <= rows; r++) {
    const z = originZ + r * cellSizeZ;
    const pts = [
      new THREE.Vector3(originX, floorY + 0.3, z),
      new THREE.Vector3(originX + cols * cellSizeX, floorY + 0.3, z),
    ];
    const l = new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat);
    scene.add(l);
    debugGridLines.push(l);
  }
}

function removeDebugGrid() {
  debugGridLines.forEach(l => scene.remove(l));
  debugGridLines = [];
}

// ── Player token ──
const MOVE_RANGE_BY_ROLE = { Warrior: 3, Rogue: 5, Mage: 4 };
const MINI_FILES = { Warrior: 'warrior.glb', Rogue: 'rogue.glb', Mage: 'mage.glb' };

function loadPlayerToken() {
  return new Promise((resolve) => {
    const file = MINI_FILES[charData?.role];
    if (!file) { resolve(createFallbackToken()); return; }
    gltfLoader.load('../Assets/' + file, (gltf) => {
      const model = gltf.scene;
      model.scale.setScalar(1.2);
      model.traverse(c => { if (c.isMesh) c.castShadow = true; });
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.x -= center.x;
      model.position.z -= center.z;
      model.position.y -= box.min.y;
      const group = new THREE.Group();
      group.add(model);
      resolve(group);
    }, undefined, () => resolve(createFallbackToken()));
  });
}

function createFallbackToken() {
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0xd4af37, roughness: 0.4, metalness: 0.6 });
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 0.2, 16), mat);
  group.add(base);
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.35, 0.9, 12), mat);
  body.position.y = 0.55;
  group.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 12, 10), mat);
  head.position.y = 1.15;
  group.add(head);
  group.traverse(c => { if (c.isMesh) c.castShadow = true; });
  return group;
}

// ── Enemy tokens ──
function createEnemyToken(enemy) {
  const group = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.9 });
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.2, 0.7), bodyMat);
  body.position.y = 0.6;
  body.castShadow = true;
  group.add(body);
  const headMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.8 });
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.55, 0.55), headMat);
  head.position.y = 1.45;
  head.castShadow = true;
  group.add(head);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff2222 });
  [-0.14, 0.14].forEach(ex => {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 6), eyeMat);
    eye.position.set(ex, 1.48, 0.28);
    group.add(eye);
  });
  group.userData.enemyId = enemy.id;
  return group;
}

function placeEnemies() {
  gridData.enemies.forEach(e => {
    const mesh = createEnemyToken(e);
    const pos = gridToWorld(e.col, e.row);
    mesh.position.set(pos.x, gridData.grid.floorY, pos.z);
    scene.add(mesh);
    enemyTokens.push({ ...e, mesh });
  });
}

function showMoveRange(col, row) {
  clearHighlights();
  const tiles = calcMoveRange(col, row, MOVE_RANGE_BY_ROLE[charData?.role] || 4);
  const { cellSizeX, cellSizeZ, floorY } = gridData.grid;
  tiles.forEach(tile => {
    if (tile.col === col && tile.row === row) return;
    const plane = new THREE.Mesh(
      new THREE.PlaneGeometry(cellSizeX * 0.85, cellSizeZ * 0.85),
      new THREE.MeshBasicMaterial({ color: 0xaa2222, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
    );
    plane.rotation.x = -Math.PI / 2;
    const pos = gridToWorld(tile.col, tile.row);
    plane.position.set(pos.x, floorY + 0.05, pos.z);
    plane.userData = { col: tile.col, row: tile.row };
    highlightGroup.add(plane);
    highlightMeshes.push(plane);
  });
}

function clearHighlights() {
  highlightMeshes.forEach(m => highlightGroup.remove(m));
  highlightMeshes.length = 0;
}

gltfLoader.load('../Assets/dnd_luna_ruins_02a.glb', async (gltf) => {
  placeModel(gltf.scene, 'dnd_luna_ruins_02a.glb');

  // Log model bounds for floorY calibration — remove after calibration
  const modelBox = new THREE.Box3().setFromObject(currentModel);
  console.log('[grid-calibrate] model bounds:', {
    minX: modelBox.min.x.toFixed(2), maxX: modelBox.max.x.toFixed(2),
    minY: modelBox.min.y.toFixed(2), maxY: modelBox.max.y.toFixed(2),
    minZ: modelBox.min.z.toFixed(2), maxZ: modelBox.max.z.toFixed(2),
  });

  // Load grid
  const resp = await fetch('../rooms/stage02-grid.json');
  gridData = await resp.json();

  // Invisible floor plane for raycasting
  const floorGeo = new THREE.PlaneGeometry(200, 200);
  floorPlane = new THREE.Mesh(
    floorGeo,
    new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide })
  );
  floorPlane.rotation.x = -Math.PI / 2;
  floorPlane.position.y = gridData.grid.floorY;
  scene.add(floorPlane);

  // Debug grid lines (removed in Task 8)
  addDebugGrid();

  // Spawn player token
  playerCol = gridData.playerSpawn[0];
  playerRow = gridData.playerSpawn[1];
  playerToken = await loadPlayerToken();
  const spawnPos = gridToWorld(playerCol, playerRow);
  playerToken.position.set(spawnPos.x, gridData.grid.floorY, spawnPos.z);
  playerTargetPos = playerToken.position.clone();
  scene.add(playerToken);

  // Spawn enemy tokens
  placeEnemies();

  // Start move phase
  turnState = 'move';
  showMoveRange(playerCol, playerRow);
}, undefined, (err) => {
  console.error('GLB load error:', err);
  document.getElementById('loading').textContent = 'Load failed';
});

// ── Face tracking + rotation buttons ──
initRotationButtons();
initHUD();

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  onResizeFaceCamera(w, h);
});
onResizeFaceCamera(window.innerWidth, window.innerHeight);

// ── Render loop ──
const faceCamConfig = {
  basePos: BASE_CAM_POS,
  lookTarget: LOOK_TARGET,
  offAxis: false,
  far: 500,
};

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

canvas.addEventListener('click', (e) => {
  if (turnState !== 'move' || !gridData) return;
  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  // Movement: click on red highlight tile
  const tileHits = raycaster.intersectObjects(highlightMeshes);
  if (tileHits.length > 0) {
    const { col, row } = tileHits[0].object.userData;
    playerCol = col;
    playerRow = row;
    playerTargetPos = gridToWorld(col, row).clone();
    turnState = 'moving';
    clearHighlights();
    return;
  }

  // Attack: click on enemy mesh
  const enemyMeshChildren = [];
  enemyTokens.filter(e => e.hp > 0).forEach(e => {
    e.mesh.traverse(c => { if (c.isMesh) enemyMeshChildren.push({ mesh: c, token: e }); });
  });
  const enemyHits = raycaster.intersectObjects(enemyMeshChildren.map(x => x.mesh));
  if (enemyHits.length > 0) {
    const hitMesh = enemyHits[0].object;
    const found = enemyMeshChildren.find(x => x.mesh === hitMesh);
    if (found) {
      const colDist = Math.abs(playerCol - found.token.col);
      const rowDist = Math.abs(playerRow - found.token.row);
      if (colDist <= 1 && rowDist <= 1) {
        startCombat(found.token);
      } else {
        showStatusMsg('Move closer to attack!');
      }
    }
  }
});

function showStatusMsg(text) {
  const el = document.getElementById('status-msg');
  if (!el) return;
  el.textContent = text;
  el.style.opacity = '1';
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => { el.style.opacity = '0'; }, 2200);
}

function tick() {
  requestAnimationFrame(tick);
  updateFaceCamera(camera, faceCamConfig);

  // Player token animation
  if (playerToken && playerTargetPos) {
    playerToken.position.lerp(playerTargetPos, 0.1);
    playerToken.position.y = playerTargetPos.y + Math.sin(performance.now() * 0.002) * 0.06;

    if (turnState === 'moving') {
      const dx = playerToken.position.x - playerTargetPos.x;
      const dz = playerToken.position.z - playerTargetPos.z;
      if (Math.abs(dx) < 0.08 && Math.abs(dz) < 0.08) {
        turnState = 'move';
        showMoveRange(playerCol, playerRow);
      }
    }
  }

  renderer.render(scene, camera);
}
tick();
</script>

<script type="module" src="../scripts/player-session.js"></script>
</body>
</html>
