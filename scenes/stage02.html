<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Lite — Stage 02</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/": "https://cdn.jsdelivr.net/npm/three@0.176.0/"
  }
}
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Georgia', serif;
    color: #c8a96e;
    user-select: none;
  }
  canvas { display: block; width: 100%; height: 100%; }

  #title {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-size: 14px;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(200,169,110,.5);
    pointer-events: none;
  }

  #nav {
    position: fixed;
    top: 24px;
    left: 24px;
    z-index: 50;
    display: flex;
    gap: 8px;
  }
  #nav a {
    padding: 6px 14px;
    background: rgba(200,169,110,.06);
    border: 1px solid rgba(200,169,110,.2);
    border-radius: 4px;
    color: rgba(200,169,110,.55);
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    text-decoration: none;
    transition: all .2s;
  }
  #nav a:hover {
    background: rgba(200,169,110,.18);
    border-color: rgba(200,169,110,.5);
    color: #ffe9a0;
  }

  #loading {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    letter-spacing: 4px;
    color: rgba(200,169,110,.5);
    transition: opacity .6s;
  }
  #loading.hidden { opacity: 0; pointer-events: none; }

  /* Enemy HP labels */
  .enemy-hp {
    position: fixed;
    pointer-events: none;
    z-index: 30;
    font-family: 'Georgia', serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: #e85d5d;
    background: rgba(0,0,0,.65);
    border: 1px solid rgba(232,93,93,.4);
    border-radius: 3px;
    padding: 2px 8px;
    transform: translate(-50%, -100%);
    white-space: nowrap;
  }

  /* Player name labels */
  .player-name-label {
    position: fixed;
    pointer-events: none;
    z-index: 30;
    font-family: 'Georgia', serif;
    font-size: 11px;
    letter-spacing: 1px;
    color: #88c8ff;
    background: rgba(0,0,0,.6);
    border: 1px solid rgba(136,200,255,.4);
    border-radius: 3px;
    padding: 2px 8px;
    transform: translate(-50%, -100%);
    white-space: nowrap;
  }
  .player-name-label.me { color: #ffe9a0; border-color: rgba(255,233,160,.5); }

  /* Status message */
  #status-msg {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 60;
    font-family: 'Georgia', serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #e85d5d;
    opacity: 0;
    transition: opacity .4s;
    pointer-events: none;
  }

  /* HUD stats */
  #hud-stats {
    position: fixed;
    bottom: 28px;
    left: 28px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: rgba(0,0,0,.45);
    border: 1px solid rgba(200,169,110,.12);
    border-radius: 6px;
    padding: 12px 16px;
    backdrop-filter: blur(4px);
    font-family: 'Georgia', serif;
  }
  #hud-name { font-size: 20px; letter-spacing: 2px; color: #ffe9a0; line-height: 1.2; }
  #hud-role { font-size: 11px; letter-spacing: 4px; text-transform: uppercase; color: #c8a96e; opacity: .5; margin-bottom: 4px; }
  .hud-stat { display: flex; align-items: center; gap: 10px; }
  .hud-stat-name { font-size: 12px; letter-spacing: 2px; text-transform: uppercase; color: #c8a96e; opacity: .5; width: 32px; }
  .hud-stat-bar { width: 80px; height: 4px; background: rgba(200,169,110,.12); border-radius: 2px; overflow: hidden; }
  .hud-stat-fill { height: 100%; border-radius: 2px; background: linear-gradient(to right, #c8a96e, #ffe9a0); }
  .hud-stat-fill.hp-fill { background: linear-gradient(to right, #c45050, #e85d5d); }
  .hud-stat-val { font-size: 14px; color: #c8a96e; opacity: .75; width: 22px; text-align: right; }
  .hud-stat-val.hp-val { color: #e85d5d; }

  /* Event panel */
  #event-panel {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    z-index: 50;
    width: 480px;
    max-width: calc(100vw - 340px);
    background: rgba(0,0,0,.65);
    border: 1px solid rgba(200,169,110,.2);
    border-radius: 8px;
    padding: 20px 24px;
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    gap: 14px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .4s ease, transform .4s ease;
    font-family: 'Georgia', serif;
  }
  #event-panel.visible {
    opacity: 1;
    pointer-events: all;
    transform: translateX(-50%) translateY(0);
  }
  #event-desc { font-size: 14px; line-height: 1.7; color: rgba(200,169,110,.8); letter-spacing: .5px; }
  #event-actions { display: flex; gap: 10px; flex-wrap: wrap; }
  #event-result { font-size: 15px; letter-spacing: 1px; color: #ffe9a0; }
  #event-result.success { color: #66bb6a; }
  #event-result.fail { color: #e85d5d; }
  #event-outcome { font-size: 13px; line-height: 1.6; color: rgba(200,169,110,.7); }
  .event-btn {
    padding: 10px 20px;
    background: rgba(200,169,110,.08);
    border: 1px solid rgba(200,169,110,.3);
    border-radius: 4px;
    color: #c8a96e;
    font-family: 'Georgia', serif;
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
  }
  .event-btn:hover { background: rgba(200,169,110,.18); border-color: rgba(200,169,110,.6); color: #ffe9a0; }
  .event-btn:disabled { opacity: .3; pointer-events: none; }

  /* D20 dice */
  #d20-hud {
    position: fixed;
    bottom: 20px;
    right: 28px;
    z-index: 60;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    pointer-events: none;
    transition: transform .4s;
  }
  #d20-hud.active { pointer-events: all; cursor: pointer; transform: scale(1.5) translateY(-16px); }
  #d20-hud.active:hover #d20-dice-shape { filter: brightness(1.4) drop-shadow(0 0 8px rgba(200,169,110,.5)); }
  #d20-dice-shape { width: 80px; height: 80px; transition: filter .2s; }
  #d20-dice-shape polygon { fill: rgba(30,22,12,.85); stroke: rgba(200,169,110,.85); stroke-width: 1.4; }
  #d20-dice-shape line { stroke: rgba(200,169,110,.85); stroke-width: 1.4; }
  #d20-dice-shape.success polygon { fill: rgba(102,187,106,.15); stroke: rgba(102,187,106,.8); }
  #d20-dice-shape.success line { stroke: rgba(102,187,106,.8); }
  #d20-dice-shape.fail polygon { fill: rgba(232,93,93,.15); stroke: rgba(232,93,93,.8); }
  #d20-dice-shape.fail line { stroke: rgba(232,93,93,.8); }
  @keyframes d20-roll {
    0%   { transform: rotate(0deg) scale(1); }
    25%  { transform: rotate(90deg) scale(1.1); }
    50%  { transform: rotate(180deg) scale(0.95); }
    75%  { transform: rotate(270deg) scale(1.1); }
    100% { transform: rotate(360deg) scale(1); }
  }
  #d20-dice-shape.rolling { animation: d20-roll .5s ease-out; }
  #d20-wrapper { position: relative; width: 80px; height: 80px; }
  #d20-value {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 22px;
    font-family: 'Georgia', serif;
    color: #ffe9a0;
    pointer-events: none;
    text-shadow: 0 0 10px rgba(200,169,110,.8);
  }
  #d20-label { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; color: rgba(200,169,110,.4); height: 14px; font-family: 'Georgia', serif; }

  /* Turn indicator */
  #turn-indicator {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 60;
    padding: 6px 18px;
    border-radius: 4px;
    font-family: 'Georgia', serif;
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    background: rgba(0,0,0,.6);
    border: 1px solid rgba(200,169,110,.3);
    color: rgba(200,169,110,.85);
  }
  #turn-indicator.my-turn { color: #ffe9a0; border-color: rgba(255,233,160,.7); }

  /* Overlays */
  #victory, #game-over {
    position: fixed;
    inset: 0;
    z-index: 800;
    background: rgba(0,0,0,.85);
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    font-family: 'Georgia', serif;
  }
  #victory { color: #ffe9a0; }
  #game-over { color: #e85d5d; }
  .overlay-title { font-size: 36px; letter-spacing: 6px; text-shadow: 0 0 40px currentColor; }
  .overlay-sub { font-size: 14px; letter-spacing: 2px; opacity: .5; }
</style>
</head>
<body>

<div id="turn-indicator" style="display:none"></div>
<div id="nav">
  <a href="world-map.html">← World</a>
</div>

<div id="webcam-preview" class="hidden">

  <canvas id="face-canvas"></canvas>

<!-- Status message -->
<div id="status-msg"></div>

<!-- HUD stats -->
<div id="hud-stats">
  <div id="hud-name">Adventurer</div>
  <div id="hud-role">--</div>
  <div class="hud-stat">

    <div class="hud-stat-bar"><div class="hud-stat-fill" id="bar-str" style="width:0%"></div></div>

<!-- D20 dice -->
<div id="d20-hud">

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/examples/jsm/loaders/DRACOLoader.js';
import { updateFaceCamera, onResizeFaceCamera, initRotationButtons } from '../scripts/face-camera.js';
import { send, on } from '../scripts/game-socket.js';

// ── Grid / combat state (module scope) ──
let gridData = null;
let floorPlane = null;
let playerToken = null;
let playerCol = 0, playerRow = 0;
let playerTargetPos = null;
let enemyTokens = [];
let turnState = 'idle'; // 'idle' | 'move' | 'moving' | 'action'
const highlightMeshes = [];
const highlightGroup = new THREE.Group();
let pendingRoll = null;
const charData = JSON.parse(localStorage.getItem('dndlite-character') || 'null');
const myPid = localStorage.getItem('player-id');
let serverState = null;
const playerTokens = new Map();   // pid → { group, label, role }
const loadingPids = new Set();    // pids whose token is mid-load (race guard)

function initHUD() {
  if (!charData) return;
  const nameEl = document.getElementById('hud-name');
  const roleEl = document.getElementById('hud-role');
  if (nameEl) nameEl.textContent = charData.name;
  if (roleEl) roleEl.textContent = charData.role;
  updateHUD();
}

function updateHUD() {
  if (!charData) return;
  ['str','agi','int','lck','hp'].forEach(key => {
    const val = charData[key] ?? 0;
    const el = document.getElementById('val-' + key);
    const bar = document.getElementById('bar-' + key);
    if (el) el.textContent = val;
    if (bar) bar.style.width = (val / 20 * 100) + '%';
  });
}

// ── Renderer ──
const canvas = document.getElementById('canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.NoToneMapping;

const scene = new THREE.Scene();
scene.add(highlightGroup);
scene.background = new THREE.Color(0x050210);

// ── Camera ──
const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 500);
const BASE_CAM_POS = new THREE.Vector3(0, 8, 30);
const LOOK_TARGET  = new THREE.Vector3(0, 0, 0);

// ── Lighting ──
scene.add(new THREE.AmbientLight(0xfff0d0, 0.5));

const keyLight = new THREE.DirectionalLight(0xfff0d0, 1.5);
keyLight.position.set(8, 20, 10);
keyLight.castShadow = true;
keyLight.shadow.mapSize.set(1024, 1024);
keyLight.shadow.camera.left = -30;
keyLight.shadow.camera.right = 30;
keyLight.shadow.camera.top = 30;
keyLight.shadow.camera.bottom = -30;
keyLight.shadow.camera.far = 60;
scene.add(keyLight);

const fillLight = new THREE.DirectionalLight(0x8899ff, 0.4);
fillLight.position.set(-10, 8, -6);
scene.add(fillLight);

const overheadLight = new THREE.PointLight(0xffa552, 3, 50, 1.5);
overheadLight.position.set(0, 12, -8);
scene.add(overheadLight);

// ── GLB loader ──
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/libs/draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);

// ── Model loading ──
let currentModel = null;

function placeModel(gltfScene, name) {
  if (currentModel) {
    scene.remove(currentModel);
    currentModel.traverse(o => {
      if (o.geometry) o.geometry.dispose();
      if (o.material) {
        if (Array.isArray(o.material)) o.material.forEach(m => m.dispose());
        else o.material.dispose();
      }
    });
    currentModel = null;
  }

  const model = gltfScene;
  model.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  const size = box.getSize(new THREE.Vector3());
  model.position.sub(center);

  const baseScale = 40 / Math.max(size.x, 0.01);
  const scaledDepth = size.z * baseScale;
  const camZ = BASE_CAM_POS.z;
  const perspComp = (camZ + scaledDepth / 2) / camZ;
  const scale = baseScale * perspComp;
  model.scale.setScalar(scale);

  const group = new THREE.Group();
  group.add(model);
  const finalDepth = size.z * scale;
  group.position.set(0, 0, -finalDepth / 2);

  scene.add(group);
  currentModel = group;

  // Rotate around the model's world center
  LOOK_TARGET.set(0, 0, -finalDepth / 2);

  document.getElementById('loading').classList.add('hidden');
}

// ── Grid utilities ──
function gridToWorld(col, row) {
  const { cellSizeX, cellSizeZ, originX, originZ, floorY } = gridData.grid;
  return new THREE.Vector3(
    originX + col * cellSizeX + cellSizeX / 2,
    floorY,
    originZ + row * cellSizeZ + cellSizeZ / 2
  );
}

function isWalkable(col, row) {
  const { cols, rows } = gridData.grid;
  if (col < 0 || col >= cols || row < 0 || row >= rows) return false;
  return gridData.walkable[row][col] === 1;
}

function calcMoveRange(startCol, startRow, range) {
  const tiles = [];
  const visited = new Set();
  const queue = [{ col: startCol, row: startRow, dist: 0 }];
  visited.add(`${startCol},${startRow}`);
  const blockedTiles = new Set(
    enemyTokens.filter(e => e.hp > 0).map(e => `${e.col},${e.row}`)
  );
  if (serverState) {
    for (const p of serverState.players) {
      if (p.pid !== myPid) blockedTiles.add(`${p.col},${p.row}`);
    }
  }
  while (queue.length) {
    const { col, row, dist } = queue.shift();
    tiles.push({ col, row });
    if (dist < range) {
      for (const [dc, dr] of [[1,0],[-1,0],[0,1],[0,-1]]) {
        const nc = col + dc, nr = row + dr;
        const key = `${nc},${nr}`;
        if (!visited.has(key) && isWalkable(nc, nr) && !blockedTiles.has(key)) {
          visited.add(key);
          queue.push({ col: nc, row: nr, dist: dist + 1 });
        }
      }
    }
  }
  return tiles;
}

// ── Player token ──
const MOVE_RANGE_BY_ROLE = { Warrior: 3, Rogue: 5, Mage: 4 };
const MINI_FILES = { Warrior: 'warrior.glb', Rogue: 'rogue.glb', Mage: 'mage.glb' };

function loadPlayerToken() {
  return new Promise((resolve) => {
    const file = MINI_FILES[charData?.role];
    if (!file) { resolve(createFallbackToken()); return; }
    gltfLoader.load('../Assets/' + file, (gltf) => {
      const model = gltf.scene;
      model.scale.setScalar(1.2);
      model.traverse(c => { if (c.isMesh) c.castShadow = true; });
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.x -= center.x;
      model.position.z -= center.z;
      model.position.y -= box.min.y;
      const group = new THREE.Group();
      group.add(model);
      group.scale.setScalar(3);
      resolve(group);
    }, undefined, () => resolve(createFallbackToken()));
  });
}

function loadPlayerTokenForRole(roleName) {
  return new Promise((resolve) => {
    const file = MINI_FILES[roleName];
    if (!file) { resolve(createFallbackToken()); return; }
    gltfLoader.load('../Assets/' + file, (gltf) => {
      const model = gltf.scene;
      model.scale.setScalar(1.2);
      model.traverse(c => { if (c.isMesh) c.castShadow = true; });
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.x -= center.x;
      model.position.z -= center.z;
      model.position.y -= box.min.y;
      const group = new THREE.Group();
      group.add(model);
      group.scale.setScalar(3);
      resolve(group);
    }, undefined, () => resolve(createFallbackToken()));
  });
}

function createFallbackToken() {
  const group = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({ color: 0xd4af37, roughness: 0.4, metalness: 0.6 });
  const base = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.5, 0.2, 16), mat);
  group.add(base);
  const body = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.35, 0.9, 12), mat);
  body.position.y = 0.55;
  group.add(body);
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.25, 12, 10), mat);
  head.position.y = 1.15;
  group.add(head);
  group.traverse(c => { if (c.isMesh) c.castShadow = true; });
  group.scale.setScalar(3);
  return group;
}

// ── Enemy tokens ──
function createEnemyToken(enemy) {
  const group = new THREE.Group();
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.9 });
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.7, 1.2, 0.7), bodyMat);
  body.position.y = 0.6;
  body.castShadow = true;
  group.add(body);
  const headMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.8 });
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.55, 0.55), headMat);
  head.position.y = 1.45;
  head.castShadow = true;
  group.add(head);
  const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff2222 });
  [-0.14, 0.14].forEach(ex => {
    const eye = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 6), eyeMat);
    eye.position.set(ex, 1.48, 0.28);
    group.add(eye);
  });
  group.userData.enemyId = enemy.id;
  group.scale.setScalar(3);
  return group;
}

function placeEnemies() {
  gridData.enemies.forEach(e => {
    const mesh = createEnemyToken(e);
    const pos = gridToWorld(e.col, e.row);
    mesh.position.set(pos.x, gridData.grid.floorY, pos.z);
    scene.add(mesh);
    const label = document.createElement('div');
    label.className = 'enemy-hp';
    label.textContent = `${e.hp}/${e.maxHp}`;
    document.body.appendChild(label);
    enemyTokens.push({ ...e, mesh, label });
  });
}

async function applyState(snap) {
  serverState = snap;

  const indicator = document.getElementById('turn-indicator');
  if (indicator && snap.activeTurnPid) {
    const active = snap.players.find(p => p.pid === snap.activeTurnPid);
    const isMine = snap.activeTurnPid === myPid;
    indicator.textContent = isMine ? 'Your turn' : `${active?.name || '...'}'s turn`;
    indicator.classList.toggle('my-turn', isMine);
    indicator.style.display = 'block';
  }

  const seenPids = new Set();
  for (const p of snap.players) {
    seenPids.add(p.pid);
    let entry = playerTokens.get(p.pid);
    if (!entry && !loadingPids.has(p.pid)) {
      loadingPids.add(p.pid);
      const group = await loadPlayerTokenForRole(p.role);
      const label = document.createElement('div');
      label.className = 'player-name-label';
      label.textContent = p.name;
      document.body.appendChild(label);
      scene.add(group);
      entry = { group, label, role: p.role };
      playerTokens.set(p.pid, entry);
      loadingPids.delete(p.pid);
    }
    if (entry) {
      const pos = gridToWorld(p.col, p.row);
      entry.group.position.set(pos.x, gridData.grid.floorY, pos.z);
      entry.group.userData.targetPos = pos;
    }
  }
  for (const [pid, entry] of [...playerTokens.entries()]) {
    if (!seenPids.has(pid)) {
      scene.remove(entry.group);
      entry.label.remove();
      playerTokens.delete(pid);
    }
  }

  reconcileEnemies(snap.enemies);

  // Show move range only on local player's turn (not in combat)
  const me = snap.players.find(p => p.pid === myPid);
  if (me && snap.activeTurnPid === myPid && !snap.pendingCombat && !snap.outcome) {
    showMoveRange(me.col, me.row);
  } else {
    clearHighlights();
  }
}

function reconcileEnemies(enemiesFromServer) {
  for (const srvE of enemiesFromServer) {
    const local = enemyTokens.find(e => e.id === srvE.id);
    if (!local) continue;
    local.hp = srvE.hp;
    if (local.label) local.label.textContent = `${srvE.hp}/${srvE.maxHp}`;
    if (srvE.hp <= 0 && local.mesh.parent) {
      scene.remove(local.mesh);
      if (local.label) { local.label.remove(); local.label = null; }
    }
  }
}

function showMoveRange(col, row) {
  clearHighlights();
  const tiles = calcMoveRange(col, row, MOVE_RANGE_BY_ROLE[charData?.role] || 4);
  const { cellSizeX, cellSizeZ, floorY } = gridData.grid;
  tiles.forEach(tile => {
    if (tile.col === col && tile.row === row) return;
    const plane = new THREE.Mesh(
      new THREE.PlaneGeometry(cellSizeX * 0.85, cellSizeZ * 0.85),
      new THREE.MeshBasicMaterial({ color: 0xaa2222, transparent: true, opacity: 0.35, side: THREE.DoubleSide })
    );
    plane.rotation.x = -Math.PI / 2;
    const pos = gridToWorld(tile.col, tile.row);
    plane.position.set(pos.x, floorY + 0.05, pos.z);
    plane.userData = { col: tile.col, row: tile.row };
    highlightGroup.add(plane);
    highlightMeshes.push(plane);
  });
}

function clearHighlights() {
  highlightMeshes.forEach(m => highlightGroup.remove(m));
  highlightMeshes.length = 0;
}

gltfLoader.load('../Assets/dnd_luna_ruins_02a.glb', async (gltf) => {
  placeModel(gltf.scene, 'dnd_luna_ruins_02a.glb');

  // Load grid
  const resp = await fetch('../rooms/stage02-grid.json');
  gridData = await resp.json();

  // Invisible floor plane for raycasting
  const floorGeo = new THREE.PlaneGeometry(200, 200);
  floorPlane = new THREE.Mesh(
    floorGeo,
    new THREE.MeshBasicMaterial({ visible: false, side: THREE.DoubleSide })
  );
  floorPlane.rotation.x = -Math.PI / 2;
  floorPlane.position.y = gridData.grid.floorY;
  scene.add(floorPlane);

  // Spawn enemy tokens (visual placeholders — server is authoritative for HP)
  placeEnemies();

  // Subscribe to server state, then announce arrival
  on('state_update', (msg) => {
    applyState(msg.state).catch(err => console.error('[state_update] applyState failed:', err));
  });

  const localChar = JSON.parse(localStorage.getItem('dndlite-character') || '{"hp":10,"maxHp":10}');
  send({ type: 'enter_stage', stageId: 'stage02', hp: localChar.hp ?? 10, maxHp: localChar.maxHp ?? localChar.hp ?? 10 });
}, undefined, (err) => {
  console.error('GLB load error:', err);
  document.getElementById('loading').textContent = 'Load failed';
});

// ── Face tracking + rotation buttons ──
initRotationButtons();
initHUD();

window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  onResizeFaceCamera(w, h);
});
onResizeFaceCamera(window.innerWidth, window.innerHeight);

// ── Render loop ──
const faceCamConfig = {
  basePos: BASE_CAM_POS,
  lookTarget: LOOK_TARGET,
  offAxis: false,
  far: 500,
};

const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

canvas.addEventListener('click', (e) => {
  if (!serverState || !gridData) return;
  if (serverState.activeTurnPid !== myPid) return;       // not my turn
  if (serverState.pendingCombat) return;                 // combat panel handles its own input
  if (serverState.outcome) return;

  mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  // Click on a highlight tile -> request move
  const tileHits = raycaster.intersectObjects(highlightMeshes);
  if (tileHits.length > 0) {
    const { col, row } = tileHits[0].object.userData;
    send({ type: 'action_request', stageId: 'stage02', kind: 'move', col, row });
  }
});

function showStatusMsg(text) {
  const el = document.getElementById('status-msg');
  if (!el) return;
  el.textContent = text;
  el.style.opacity = '1';
  clearTimeout(el._timeout);
  el._timeout = setTimeout(() => { el.style.opacity = '0'; }, 2200);
}

// ── Combat system ──
const STAT_NAMES = { str: 'Strength', agi: 'Agility', int: 'Intelligence', lck: 'Luck' };

function rollD20() { return Math.floor(Math.random() * 20) + 1; }
function getModifier(val) { return Math.floor((val - 10) / 2); }

function createBtn(text, onclick) {
  const btn = document.createElement('button');
  btn.className = 'event-btn';
  btn.textContent = text;
  btn.addEventListener('click', onclick);
  return btn;
}

function openPanel() {
  document.getElementById('event-panel').classList.add('visible');
}

function closePanel() {
  document.getElementById('event-panel').classList.remove('visible');
  document.getElementById('event-desc').textContent = '';
  document.getElementById('event-actions').innerHTML = '';
  document.getElementById('event-result').textContent = '';
  document.getElementById('event-result').className = '';
  document.getElementById('event-outcome').textContent = '';
  const d20 = document.getElementById('d20-hud');
  d20.classList.remove('active');
  document.getElementById('d20-label').textContent = '';
  document.getElementById('d20-value').textContent = '—';
  document.getElementById('d20-dice-shape').setAttribute('class', '');
}

function startCombat(enemy) {
  turnState = 'action';
  clearHighlights();

  document.getElementById('event-desc').textContent = enemy.description;
  document.getElementById('event-actions').innerHTML = '';
  document.getElementById('event-result').textContent = '';
  document.getElementById('event-outcome').textContent = '';
  document.getElementById('d20-hud').classList.remove('active');
  document.getElementById('d20-label').textContent = '';
  document.getElementById('d20-value').textContent = '—';
  document.getElementById('d20-dice-shape').setAttribute('class', '');

  const statLabel = STAT_NAMES[enemy.stat] || enemy.stat.toUpperCase();
  const btn = createBtn(`Attack (${statLabel})`, () => {
    btn.disabled = true;
    pendingRoll = enemy;
    document.getElementById('d20-hud').classList.add('active');
    document.getElementById('d20-label').textContent = 'Roll d20';
  });
  document.getElementById('event-actions').appendChild(btn);
  openPanel();
}

document.getElementById('d20-hud').addEventListener('click', () => {
  if (!pendingRoll) return;
  executeRoll(pendingRoll);
  pendingRoll = null;
  document.getElementById('d20-hud').classList.remove('active');
});

function executeRoll(enemy) {
  const roll = rollD20();
  const statVal = charData?.[enemy.stat] || 10;
  const mod = getModifier(statVal);
  const total = roll + mod;
  const success = total >= enemy.dc;
  const modStr = mod >= 0 ? `+${mod}` : `${mod}`;
  const statLabel = STAT_NAMES[enemy.stat] || enemy.stat.toUpperCase();

  // Animate dice
  const diceShape = document.getElementById('d20-dice-shape');
  const diceValue = document.getElementById('d20-value');
  diceShape.classList.remove('rolling', 'success', 'fail');
  void diceShape.offsetWidth; // force reflow for animation restart
  diceShape.classList.add('rolling');
  document.getElementById('d20-label').textContent = '';

  let count = 0;
  const anim = setInterval(() => {
    diceValue.textContent = Math.floor(Math.random() * 20) + 1;
    count++;
    if (count > 12) {
      clearInterval(anim);
      diceValue.textContent = roll;
      diceValue.style.color = roll === 20 ? '#ffe97a' : roll === 1 ? '#ff6b6b' : '#ffe9a0';
      diceShape.classList.remove('rolling');
      diceShape.classList.add(success ? 'success' : 'fail');

      // Result line
      const resultEl = document.getElementById('event-result');
      resultEl.textContent = `${roll} ${modStr} (${statLabel}) = ${total} vs DC ${enemy.dc} — ${success ? 'SUCCESS!' : 'FAILED'}`;
      resultEl.className = success ? 'success' : 'fail';

      // Apply outcome
      let outcomeText = success ? enemy.successText : enemy.failText;
      if (success) {
        enemy.hp = Math.max(0, enemy.hp - 3);
        outcomeText += enemy.hp > 0
          ? ` [Enemy HP: ${enemy.hp}/${enemy.maxHp}]`
          : ' — ENEMY DEFEATED!';
        if (enemy.label) enemy.label.textContent = `${enemy.hp}/${enemy.maxHp}`;
        if (enemy.hp <= 0) {
          scene.remove(enemy.mesh);
          if (enemy.label) { enemy.label.remove(); enemy.label = null; }
        }
      } else {
        if (charData) {
          charData.hp = Math.max(0, charData.hp + enemy.failHp);
          localStorage.setItem('dndlite-character', JSON.stringify(charData));
          updateHUD();
          outcomeText += ` (${enemy.failHp} HP)`;
        }
      }
      document.getElementById('event-outcome').textContent = outcomeText;

      // Check game over
      if (charData && charData.hp <= 0) {
        setTimeout(() => {
          closePanel();
          document.getElementById('game-over').style.display = 'flex';
        }, 1400);
        return;
      }

      // Continue button — back to move phase
      document.getElementById('event-actions').innerHTML = '';
      document.getElementById('event-actions').appendChild(
        createBtn('Continue', () => {
          closePanel();
          turnState = 'move';
          showMoveRange(playerCol, playerRow);
          checkVictory();
        })
      );
    }
  }, 60);
}

function checkVictory() {
  if (enemyTokens.every(e => e.hp <= 0)) {
    setTimeout(() => {
      document.getElementById('victory').style.display = 'flex';
    }, 600);
  }
}

function tick() {
  requestAnimationFrame(tick);
  updateFaceCamera(camera, faceCamConfig);

  // Player token bob animation (positions are set by applyState)
  if (gridData) {
    for (const [pid, entry] of playerTokens) {
      const target = entry.group.userData.targetPos;
      if (!target) continue;
      entry.group.position.lerp(target, 0.15);
      entry.group.position.y = gridData.grid.floorY + Math.sin(performance.now() * 0.002) * 0.06;
    }
  }

  // Update enemy HP label screen positions
  const _labelVec = new THREE.Vector3();
  enemyTokens.forEach(e => {
    if (!e.label) return;
    _labelVec.copy(e.mesh.position);
    _labelVec.y += 7;
    _labelVec.project(camera);
    const x = (_labelVec.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-_labelVec.y * 0.5 + 0.5) * window.innerHeight;
    e.label.style.left = x + 'px';
    e.label.style.top = y + 'px';
  });

  // Update player name label positions
  const _pVec = new THREE.Vector3();
  for (const [pid, entry] of playerTokens) {
    _pVec.copy(entry.group.position);
    _pVec.y += 7;
    _pVec.project(camera);
    const x = (_pVec.x * 0.5 + 0.5) * window.innerWidth;
    const y = (-_pVec.y * 0.5 + 0.5) * window.innerHeight;
    entry.label.style.left = x + 'px';
    entry.label.style.top  = y + 'px';
    if (pid === myPid) entry.label.classList.add('me');
  }

  renderer.render(scene, camera);
}
tick();
</script>
