<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Lite — Dungeon Map</title>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.176.0/build/three.module.js",
    "three/": "https://cdn.jsdelivr.net/npm/three@0.176.0/"
  }
}
</script>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #050210;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Georgia', serif;
    color: #c8a96e;
    user-select: none;
  }
  canvas { display: block; width: 100%; height: 100%; }

  /* Room tooltip */
  #tooltip {
    position: fixed;
    z-index: 100;
    pointer-events: none;
    opacity: 0;
    transition: opacity .2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    transform: translate(-50%, -120%);
  }
  #tooltip.visible { opacity: 1; }
  #tooltip-name {
    font-size: 14px;
    letter-spacing: 2px;
    color: #ffe9a0;
    text-shadow: 0 0 12px rgba(200,169,110,.6);
    white-space: nowrap;
  }
  #tooltip-type {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(200,169,110,.45);
  }

  /* Loading */
  #map-loading {
    position: fixed;
    inset: 0;
    z-index: 999;
    background: #050210;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    transition: opacity .6s;
  }
  #map-loading.hidden { opacity: 0; pointer-events: none; }
  .ml-rune { font-size: 42px; opacity: .4; animation: spin 8s linear infinite; }
  .ml-text { font-size: 14px; letter-spacing: 5px; text-transform: uppercase; opacity: .7; }
  .ml-bar-wrap {
    width: 200px;
    height: 3px;
    background: rgba(200,169,110,.12);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 4px;
  }
  .ml-bar-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(to right, #c8a96e, #ffe9a0);
    border-radius: 2px;
    transition: width .2s;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* HUD — bottom left */
  #hud-stats {
    position: fixed;
    bottom: 28px;
    left: 28px;
    z-index: 50;
    display: flex;
    flex-direction: column;
    gap: 6px;
    background: rgba(0,0,0,.45);
    border: 1px solid rgba(200,169,110,.12);
    border-radius: 6px;
    padding: 12px 16px;
    backdrop-filter: blur(4px);
  }
  #hud-name {
    font-size: 24px;
    letter-spacing: 2px;
    color: #ffe9a0;
    opacity: .9;
    line-height: 1.2;
  }
  #hud-role {
    font-size: 12px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #c8a96e;
    opacity: .5;
    margin-bottom: 4px;
  }
  .hud-stat {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .hud-stat-name {
    font-size: 13px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: #c8a96e;
    opacity: .5;
    width: 120px;
  }
  .hud-stat-bar {
    width: 90px;
    height: 4px;
    background: rgba(200,169,110,.12);
    border-radius: 2px;
    overflow: hidden;
  }
  .hud-stat-fill {
    height: 100%;
    background: linear-gradient(to right, #c8a96e, #ffe9a0);
    border-radius: 2px;
  }
  .hud-stat-val {
    font-size: 15px;
    color: #c8a96e;
    opacity: .75;
    width: 22px;
    text-align: right;
  }

  /* Vignette */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 10;
    pointer-events: none;
    background: radial-gradient(ellipse at 50% 50%, transparent 35%, rgba(0,0,0,.5) 70%, rgba(0,0,0,.92) 100%);
  }

  /* Location text */
  #location-title {
    position: fixed;
    top: 36px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 50;
    font-size: 16px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(200,169,110,.5);
    text-shadow: 0 0 20px rgba(200,169,110,.3);
    pointer-events: none;
  }

  /* Editor button */
  #btn-editor {
    position: fixed;
    top: 28px;
    right: 180px;
    z-index: 50;
    padding: 8px 16px;
    background: rgba(200,169,110,.08);
    border: 1px solid rgba(200,169,110,.2);
    border-radius: 4px;
    color: rgba(200,169,110,.5);
    font-family: 'Georgia', serif;
    font-size: 12px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
    text-decoration: none;
  }
  #btn-editor:hover {
    background: rgba(200,169,110,.18);
    border-color: rgba(200,169,110,.5);
    color: #ffe9a0;
  }

  /* Webcam preview */
  /* Webcam styles injected by face-camera.js */
</style>
</head>
<body>

<canvas id="map-canvas"></canvas>

<div id="location-title">Dungeon Map</div>
<a id="btn-editor" href="voxel/editor.html">Room Editor</a>

<div id="tooltip">
  <div id="tooltip-name"></div>
  <div id="tooltip-type"></div>
</div>

<!-- HUD -->
<div id="hud-stats">
  <div id="hud-name">Adventurer</div>
  <div id="hud-role">—</div>
  <div class="hud-stat">
    <span class="hud-stat-name">Strength</span>
    <div class="hud-stat-bar"><div class="hud-stat-fill" style="width:0%"></div></div>
    <span class="hud-stat-val">—</span>
  </div>
  <div class="hud-stat">
    <span class="hud-stat-name">Agility</span>
    <div class="hud-stat-bar"><div class="hud-stat-fill" style="width:0%"></div></div>
    <span class="hud-stat-val">—</span>
  </div>
  <div class="hud-stat">
    <span class="hud-stat-name">Intelligence</span>
    <div class="hud-stat-bar"><div class="hud-stat-fill" style="width:0%"></div></div>
    <span class="hud-stat-val">—</span>
  </div>
  <div class="hud-stat">
    <span class="hud-stat-name">Luck</span>
    <div class="hud-stat-bar"><div class="hud-stat-fill" style="width:0%"></div></div>
    <span class="hud-stat-val">—</span>
  </div>
</div>

<div id="map-loading">
  <div class="ml-rune">⬡</div>
  <div class="ml-text" id="ml-text">Unrolling the Map</div>
  <div class="ml-bar-wrap"><div class="ml-bar-fill" id="ml-bar"></div></div>
</div>

<!-- Webcam preview -->
<div id="webcam-preview" class="hidden">
  <video id="webcam" autoplay playsinline muted></video>
  <canvas id="face-canvas"></canvas>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/examples/jsm/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/examples/jsm/loaders/DRACOLoader.js';
import { initFaceCamera, updateFaceCamera, onResizeFaceCamera, initRotationButtons } from '../scripts/face-camera.js';

// ── Character ──
const charData = JSON.parse(localStorage.getItem('dndlite-character') || 'null');
if (!charData) { window.location.href = '../index.html'; }

document.getElementById('hud-name').textContent = charData.name;
document.getElementById('hud-role').textContent = charData.role;
const statBars = document.querySelectorAll('.hud-stat');
['str','agi','int','lck'].forEach((key, i) => {
  const val = charData[key];
  statBars[i].querySelector('.hud-stat-val').textContent = val;
  statBars[i].querySelector('.hud-stat-fill').style.width = (val / 20 * 100) + '%';
});

// ── Dungeon rooms ──
const ROOMS = [
  { id: 'entrance',  name: 'Entrance Hall',     type: 'start',   x: -4.5, y: 0, z: -0.8,  exits: ['corridor'] },
  { id: 'corridor',  name: 'Dark Corridor',     type: 'trap',    x: -2.8, y: 0.5, z: -0.8,  exits: ['entrance','shrine'] },
  { id: 'shrine',    name: 'Forgotten Shrine',  type: 'choice',  x: -1.7, y: 1.0, z: 0,  exits: ['corridor','goblin'] },
  { id: 'goblin',    name: 'Goblin Den',        type: 'combat',  x: -0.7, y: 1, z: 1, exits: ['shrine','treasury'] },
  { id: 'treasury',  name: 'The Treasury',      type: 'rest',    x: -0.5, y: 1.2, z: -0.5, exits: ['goblin','lair'] },
  { id: 'lair',      name: "Dragon's Lair",     type: 'boss',    x: 0, y: 2.5, z: -1.5, exits: ['treasury'] },
];

let currentRoom = localStorage.getItem('dndlite-currentRoom') || 'entrance';
let playerToken;          // the 3D miniature
let playerTargetPos;      // where it's moving to
const roomMeshes = [];    // for raycasting
const roomById = {};
ROOMS.forEach(r => roomById[r.id] = r);

// Room progression — a room is unlocked if:
// 1. It's the entrance, OR
// 2. It's the current room, OR
// 3. An adjacent room (connected via exits) has been cleared
const clearedEvents = JSON.parse(localStorage.getItem('dndlite-clearedEvents') || '{}');
function isRoomUnlocked(roomId) {
  if (roomId === 'entrance' || roomId === currentRoom) return true;
  // Check if any room that has an exit to this room has been cleared
  // Start-type rooms are always considered cleared (entrance is the beginning)
  return ROOMS.some(r =>
    r.exits.includes(roomId) && (r.type === 'start' || isRoomCleared(r.id))
  );
}
function isRoomCleared(roomId) {
  // A room is cleared if its main event key or any choice key exists in clearedEvents
  if (clearedEvents[roomId]) return true;
  for (const key of Object.keys(clearedEvents)) {
    if (key.startsWith(roomId + ':')) return true;
  }
  return false;
}

// ── Three.js setup ──
const canvas = document.getElementById('map-canvas');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1;

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x06020e);
// scene.fog = new THREE.Fog(0x06020e, 18, 35);

const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 50);
camera.position.set(0, 5, 8);
camera.lookAt(0, 0, -0.5);

// ── Lighting ──
const ambient = new THREE.AmbientLight(0xfff0d0, 1.0);
scene.add(ambient);

// Directional from above — makes top bright, sides dark
const topLight = new THREE.DirectionalLight(0xfff0d0, 3.0);
topLight.position.set(0, 10, 2);
topLight.castShadow = true;
topLight.shadow.mapSize.set(1024, 1024);
scene.add(topLight);

// Main overhead warm light (like a hanging lantern)
const overhead = new THREE.PointLight(0xffa552, 15, 30, 1.5);
overhead.position.set(0, 4, 0);
overhead.castShadow = false;
scene.add(overhead);

// Two candle-like side lights
const candleL = new THREE.PointLight(0xff8833, 3, 10, 2);
candleL.position.set(-3.5, 2.5, 2);
scene.add(candleL);

const candleR = new THREE.PointLight(0xff8833, 3, 10, 2);
candleR.position.set(3.5, 2.5, -2);
scene.add(candleR);

// Subtle blue rim light from behind
const rimLight = new THREE.DirectionalLight(0x4466aa, 0.6);
rimLight.position.set(0, 4, -8);
scene.add(rimLight);

// ── Table (GLB model) ──
const table = new THREE.Group();
scene.add(table);

const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.176.0/examples/jsm/libs/draco/');
const gltfLoader = new GLTFLoader();
gltfLoader.setDRACOLoader(dracoLoader);
gltfLoader.load('../Assets/tabletop_castle_02.glb', (gltf) => {
  const model = gltf.scene;
  model.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      child.receiveShadow = true;
    }
  });

  // Center and scale the model
  const box = new THREE.Box3().setFromObject(model);
  const center = box.getCenter(new THREE.Vector3());
  model.position.sub(center);

  // Scale to roughly fit the existing room marker positions (~10 units wide)
  const size = box.getSize(new THREE.Vector3());
  const maxDim = Math.max(size.x, size.z);
  const targetSize = 50;
  const scale = targetSize / maxDim;
  model.scale.setScalar(scale);

  table.add(model);

  // Hide loading screen
  document.getElementById('map-loading').classList.add('hidden');
}, (progress) => {
  // Update progress bar
  if (progress.total > 0) {
    const pct = Math.round(progress.loaded / progress.total * 100);
    document.getElementById('ml-bar').style.width = pct + '%';
    document.getElementById('ml-text').textContent = `Loading Scene  ${pct}%`;
  }
}, (err) => {
  console.error('GLB load error:', err);
  document.getElementById('ml-text').textContent = 'Load failed';
});

// ── Markers group (all markers, paths, token inside — movable as one unit) ──
const markersGroup = new THREE.Group();
markersGroup.position.set(12, -1.5, 8); // same as CAM_LOOK
scene.add(markersGroup);

// ── Draw paths (connections between rooms) ──
function createPath(roomA, roomB) {
  const yA = (roomA.y || 0) + 0.025;
  const yB = (roomB.y || 0) + 0.025;
  const points = [
    new THREE.Vector3(roomA.x, yA, roomA.z),
    new THREE.Vector3(roomB.x, yB, roomB.z),
  ];
  const geo = new THREE.BufferGeometry().setFromPoints(points);
  const mat = new THREE.LineBasicMaterial({ color: 0x5a4228, linewidth: 1 });
  const line = new THREE.Line(geo, mat);
  markersGroup.add(line);

  // Dashed overlay for style
  const dashMat = new THREE.LineDashedMaterial({
    color: 0x7a5a32,
    dashSize: 0.15,
    gapSize: 0.1,
    linewidth: 1,
  });
  const dashLine = new THREE.Line(geo.clone(), dashMat);
  dashLine.computeLineDistances();
  markersGroup.add(dashLine);
}

// Draw all connections (avoid duplicates)
const drawnPaths = new Set();
ROOMS.forEach(room => {
  room.exits.forEach(exitId => {
    const key = [room.id, exitId].sort().join('-');
    if (!drawnPaths.has(key)) {
      drawnPaths.add(key);
      createPath(room, roomById[exitId]);
    }
  });
});

// ── Room markers ──

const markerGlowMeshes = [];

ROOMS.forEach(room => {
  // Each room marker is a group so we can move it as one unit
  const markerGroup = new THREE.Group();
  markerGroup.position.set(room.x, room.y || 0, room.z);
  markersGroup.add(markerGroup);

  // Hemisphere marker (translucent)
  const R = 0.18;
  const gemGeo = new THREE.SphereGeometry(R, 16, 12, 0, Math.PI * 2, 0, Math.PI / 2);
  const gemMat = new THREE.MeshStandardMaterial({
    color: 0x6622aa,
    roughness: 0.8,
    metalness: 0.1,
    emissive: 0x6622aa,
    emissiveIntensity: 0.5,
    transparent: true,
    opacity: 0.9,
  });
  const gem = new THREE.Mesh(gemGeo, gemMat);
  gem.position.set(0, 0, 0);
  markerGroup.add(gem);

  // Glowing rim ring at hemisphere base
  const rimGeo = new THREE.RingGeometry(R - 0.01, R + 0.02, 32);
  const rimMat = new THREE.MeshBasicMaterial({
    color: 0x8844ff,
    transparent: true,
    opacity: 0.8,
    side: THREE.DoubleSide,
  });
  const rim = new THREE.Mesh(rimGeo, rimMat);
  rim.rotation.x = -Math.PI / 2;
  rim.position.set(0, 0.005, 0);
  markerGroup.add(rim);

  // Glow point light at marker
  const glow = new THREE.PointLight(0x4466ff, 1, 3, 2);
  glow.position.set(0, 0.1, 0);
  markerGroup.add(glow);

  const disc = gem; // alias for compatibility

  // Glow ring (for reachable rooms)
  const ringGeo = new THREE.RingGeometry(0.38, 0.48, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0xffe9a0,
    transparent: true,
    opacity: 0,
    side: THREE.DoubleSide,
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI / 2;
  ring.position.set(0, 0.02, 0);
  markerGroup.add(ring);

  // Invisible click target (larger)
  const hitGeo = new THREE.CylinderGeometry(0.45, 0.45, 0.3, 16);
  const hitMat = new THREE.MeshBasicMaterial({ visible: false });
  const hitMesh = new THREE.Mesh(hitGeo, hitMat);
  hitMesh.position.set(0, 0.1, 0);
  hitMesh.userData = { roomId: room.id };
  markerGroup.add(hitMesh);
  roomMeshes.push(hitMesh);

  room._gem = gem;
  room._ring = ring;
  room._disc = disc;
  room._markerGroup = markerGroup;
  markerGlowMeshes.push({ gem, ring, room });
});

// ── Player miniature ──
const MINI_FILES = { Warrior: 'warrior.glb', Rogue: 'rogue.glb', Mage: 'mage.glb' };
const MAP_MINI_SCALE = 0.25;

function createFallbackToken() {
  const group = new THREE.Group();
  const baseGeo = new THREE.CylinderGeometry(0.18, 0.22, 0.08, 16);
  const baseMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, roughness: 0.4, metalness: 0.7 });
  group.add(new THREE.Mesh(baseGeo, baseMat));
  const bodyGeo = new THREE.CylinderGeometry(0.08, 0.14, 0.35, 12);
  const bodyMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, roughness: 0.4, metalness: 0.6 });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.22;
  group.add(body);
  const headGeo = new THREE.SphereGeometry(0.1, 12, 10);
  const headMat = new THREE.MeshStandardMaterial({ color: 0xd4af37, roughness: 0.35, metalness: 0.7 });
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.y = 0.46;
  group.add(head);
  group.traverse(c => { if (c.isMesh) c.castShadow = true; });
  return group;
}

{
  const charData = JSON.parse(localStorage.getItem('dndlite-character') || '{}');
  const file = MINI_FILES[charData.role];
  const startRoom = roomById[currentRoom];

  // Start with fallback
  playerToken = createFallbackToken();
  playerToken.position.set(startRoom.x, (startRoom.y || 0) + 0.08, startRoom.z);
  playerTargetPos = playerToken.position.clone();
  markersGroup.add(playerToken);

  // Try loading GLB to replace fallback
  if (file) {
    gltfLoader.load('../Assets/' + file, (gltf) => {
      const model = gltf.scene;
      model.scale.setScalar(MAP_MINI_SCALE);
      model.traverse(c => { if (c.isMesh) c.castShadow = true; });
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.x -= center.x;
      model.position.z -= center.z;
      model.position.y -= box.min.y;
      const group = new THREE.Group();
      group.add(model);
      // Replace fallback
      group.position.copy(playerToken.position);
      markersGroup.remove(playerToken);
      markersGroup.add(group);
      playerToken = group;
      playerTargetPos = group.position.clone();
    });
  }
}

// ── Update reachable room highlights ──
function updateReachable() {
  const current = roomById[currentRoom];
  markerGlowMeshes.forEach(({ gem, ring, room }) => {
    const isExit = current.exits.includes(room.id);
    const unlocked = isRoomUnlocked(room.id);
    const reachable = isExit && unlocked;
    const isCurrent = room.id === currentRoom;
    ring.material.opacity = reachable ? 0.5 : 0;
    gem.material.emissiveIntensity = isCurrent ? 0.8 : reachable ? 0.5 : unlocked ? 0.25 : 0.08;
    gem.material.opacity = unlocked || isCurrent ? 0.9 : 0.35;
  });
}
updateReachable();

// ── Raycasting / click ──
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();
let hoveredRoom = null;

canvas.addEventListener('mousemove', e => {
  mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
  mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;

  raycaster.setFromCamera(mouse, camera);
  const hits = raycaster.intersectObjects(roomMeshes);

  const tooltip = document.getElementById('tooltip');
  if (hits.length > 0) {
    const roomId = hits[0].object.userData.roomId;
    const room = roomById[roomId];
    const current = roomById[currentRoom];

    const canVisit = (current.exits.includes(roomId) && isRoomUnlocked(roomId)) || roomId === currentRoom;
    if (canVisit) {
      hoveredRoom = roomId;
      canvas.style.cursor = 'pointer';
      document.getElementById('tooltip-name').textContent = room.name;
      document.getElementById('tooltip-type').textContent = room.type;
      tooltip.style.left = e.clientX + 'px';
      tooltip.style.top = e.clientY + 'px';
      tooltip.classList.add('visible');
    } else {
      hoveredRoom = null;
      canvas.style.cursor = 'default';
      tooltip.classList.remove('visible');
    }
  } else {
    hoveredRoom = null;
    canvas.style.cursor = 'default';
    tooltip.classList.remove('visible');
  }
});

canvas.addEventListener('click', () => {
  if (!hoveredRoom) return;
  moveToRoom(hoveredRoom);
});

function moveToRoom(roomId) {
  currentRoom = roomId;
  const room = roomById[roomId];
  playerTargetPos = new THREE.Vector3(room.x, (room.y || 0) + 0.08, room.z);
  updateReachable();
  document.getElementById('tooltip').classList.remove('visible');

  // Save current room, then navigate to viewer after token arrives
  localStorage.setItem('dndlite-currentRoom', roomId);
  setTimeout(() => {
    window.location.href = roomId === 'corridor' ? 'viewer.html' : 'voxel/room.html';
  }, 1200);
}

// ── Face-tracked camera ──
const BASE_CAM_POS = new THREE.Vector3(-2, 8, 8);
const CAM_LOOK = markersGroup.position; // always look at markers center

const faceCamConfig = {
  basePos: BASE_CAM_POS,
  lookTarget: CAM_LOOK,
  offAxis: false,  // top-down view — no frustum distortion
  far: 50,
};

initFaceCamera();
initRotationButtons();

// ── Resize ──
window.addEventListener('resize', () => {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h);
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
});

// ── Render loop ──
const clock = new THREE.Clock();

function tick() {
  requestAnimationFrame(tick);
  const t = clock.getElapsedTime();

  // Light flicker
  overhead.intensity = 8 + Math.sin(t * 2.5) * 1.2 + Math.sin(t * 5.7) * 0.6;
  candleL.intensity  = 3 + Math.sin(t * 3.1 + 1) * 0.8 + Math.sin(t * 7.2) * 0.3;
  candleR.intensity  = 3 + Math.sin(t * 2.8 + 2) * 0.8 + Math.sin(t * 6.5) * 0.3;

  // Glow ring pulse on reachable rooms
  const current = roomById[currentRoom];
  markerGlowMeshes.forEach(({ ring, room }) => {
    if (current.exits.includes(room.id) && isRoomUnlocked(room.id)) {
      ring.material.opacity = 0.3 + 0.2 * Math.sin(t * 2.5 + ROOMS.indexOf(room));
    }
  });

  // Animate player token movement
  if (playerToken && playerTargetPos) {
    playerToken.position.lerp(playerTargetPos, 0.06);
    // Slight bob on top of target Y
    playerToken.position.y = playerTargetPos.y + Math.sin(t * 1.8) * 0.015;
  }

  // Face tracking → off-axis projection
  updateFaceCamera(camera, faceCamConfig);

  renderer.render(scene, camera);
}

// Start render loop (loading screen hides when GLB is ready)
tick();
</script>
</body>
</html>
