<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Lite — Character</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    color: #c8a96e;
    gap: 0;
  }
  h1 {
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(200,169,110,.4);
    margin-bottom: 48px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
    width: 260px;
  }
  label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(200,169,110,.4);
  }
  input, select {
    background: rgba(200,169,110,.06);
    border: 1px solid rgba(200,169,110,.25);
    border-radius: 4px;
    padding: 10px 14px;
    color: #ffe9a0;
    font-size: 16px;
    letter-spacing: 2px;
    font-family: 'Georgia', serif;
    width: 100%;
  }
  input:focus, select:focus { outline: none; border-color: rgba(200,169,110,.6); }
  input::placeholder { color: rgba(200,169,110,.2); }
  select option { background: #1a1a1a; color: #c8a96e; }
  button {
    display: block;
    width: 260px;
    padding: 12px;
    background: rgba(200,169,110,.08);
    border: 1px solid rgba(200,169,110,.3);
    border-radius: 4px;
    color: #c8a96e;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Georgia', serif;
    transition: all .2s;
    margin-top: 8px;
  }
  button:hover { background: rgba(200,169,110,.18); color: #ffe9a0; }
  button:disabled { opacity: .35; cursor: default; }
  #saved {
    margin-top: 20px;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(200,169,110,.4);
    text-transform: uppercase;
    height: 16px;
  }
</style>
</head>
<body>

<h1>Create Character</h1>

<div class="field">
  <label>Name</label>
  <input id="name-input" type="text" placeholder="Your name" maxlength="24" autocomplete="off">
</div>

<div class="field">
  <label>Class</label>
  <select id="role-select">
    <option value="warrior">Warrior</option>
    <option value="mage">Mage</option>
    <option value="rogue">Rogue</option>
    <option value="cleric">Cleric</option>
    <option value="ranger">Ranger</option>
  </select>
</div>

<button id="btn-save" disabled>Save & Continue →</button>
<div id="saved"></div>

<script>
const nameInput = document.getElementById('name-input');
const roleSelect = document.getElementById('role-select');
const btnSave = document.getElementById('btn-save');
const savedEl = document.getElementById('saved');

// Pre-fill if character already exists
const existing = JSON.parse(localStorage.getItem('dndlite-character') || 'null');
if (existing) {
  nameInput.value = existing.name || '';
  roleSelect.value = existing.role || 'warrior';
  btnSave.disabled = false;
}

nameInput.addEventListener('input', () => {
  btnSave.disabled = nameInput.value.trim().length === 0;
});

btnSave.addEventListener('click', () => {
  const charData = {
    name: nameInput.value.trim(),
    role: roleSelect.value,
  };
  localStorage.setItem('dndlite-character', JSON.stringify(charData));
  savedEl.textContent = 'Saved!';
  setTimeout(() => { window.location.href = 'index.html'; }, 400);
});
</script>
</body>
</html>
