<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D&D Lite — Join</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Georgia', serif;
    color: #c8a96e;
    gap: 0;
  }
  h1 {
    font-size: 13px;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: rgba(200,169,110,.4);
    margin-bottom: 48px;
  }
  .char-info {
    font-size: 18px;
    letter-spacing: 4px;
    color: #ffe9a0;
    margin-bottom: 6px;
  }
  .char-role {
    font-size: 11px;
    letter-spacing: 3px;
    color: rgba(200,169,110,.4);
    text-transform: uppercase;
    margin-bottom: 40px;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 20px;
    width: 260px;
  }
  label {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(200,169,110,.4);
  }
  input {
    background: rgba(200,169,110,.06);
    border: 1px solid rgba(200,169,110,.25);
    border-radius: 4px;
    padding: 10px 14px;
    color: #ffe9a0;
    font-size: 24px;
    letter-spacing: 8px;
    text-align: center;
    text-transform: uppercase;
    font-family: monospace;
    width: 100%;
  }
  input:focus { outline: none; border-color: rgba(200,169,110,.6); }
  input::placeholder { color: rgba(200,169,110,.2); letter-spacing: 4px; font-size: 14px; }
  button {
    display: block;
    width: 260px;
    padding: 12px;
    background: rgba(200,169,110,.08);
    border: 1px solid rgba(200,169,110,.3);
    border-radius: 4px;
    color: #c8a96e;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Georgia', serif;
    transition: all .2s;
    text-align: center;
    margin-top: 8px;
  }
  button:hover { background: rgba(200,169,110,.18); color: #ffe9a0; }
  button:disabled { opacity: .35; cursor: default; }
  .divider {
    width: 260px;
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 16px 0 8px;
  }
  .divider hr {
    flex: 1;
    border: none;
    border-top: 1px solid rgba(200,169,110,.12);
  }
  .divider span {
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(200,169,110,.25);
    text-transform: uppercase;
  }
  #btn-solo {
    background: transparent;
    border-color: rgba(200,169,110,.15);
    color: rgba(200,169,110,.4);
  }
  #btn-solo:hover { background: rgba(200,169,110,.08); color: rgba(200,169,110,.8); border-color: rgba(200,169,110,.3); }
  #status {
    margin-top: 24px;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(200,169,110,.35);
    text-transform: uppercase;
    height: 16px;
  }
  #no-char {
    font-size: 11px;
    letter-spacing: 2px;
    color: rgba(200,169,110,.4);
    text-align: center;
    line-height: 1.8;
  }
  #no-char a {
    color: #c8a96e;
  }
</style>
</head>
<body>

<h1>D&D Lite — Join Session</h1>

<div id="char-section"></div>

<div class="field">
  <label>Session Code</label>
  <input id="code-input" maxlength="4" placeholder="ABCD" autocomplete="off" spellcheck="false">
</div>

<button id="btn-join" disabled>Join Session</button>

<div class="divider"><hr><span>or</span><hr></div>

<button id="btn-solo">Play Solo</button>
<div id="status"></div>

<script type="module">
import { connect, send, on } from '../scripts/game-socket.js';

const charData = JSON.parse(localStorage.getItem('dndlite-character') || 'null');
const charSection = document.getElementById('char-section');
const codeInput = document.getElementById('code-input');
const btnJoin = document.getElementById('btn-join');
const statusEl = document.getElementById('status');

if (!charData) {
  const div = document.createElement('div');
  div.id = 'no-char';
  const text = document.createTextNode('No character found.\n');
  const link = document.createElement('a');
  link.href = 'character.html';
  link.textContent = 'Create one first →';
  div.append(text, link);
  charSection.appendChild(div);
  btnJoin.disabled = true;
} else {
  const nameDiv = document.createElement('div');
  nameDiv.className = 'char-info';
  nameDiv.textContent = charData.name || 'Adventurer';
  const roleDiv = document.createElement('div');
  roleDiv.className = 'char-role';
  roleDiv.textContent = charData.role || 'Unknown';
  charSection.append(nameDiv, roleDiv);
}

codeInput.addEventListener('input', () => {
  codeInput.value = codeInput.value.toUpperCase().replace(/[^A-Z0-9]/g, '');
  btnJoin.disabled = codeInput.value.length !== 4 || !charData;
});

on('joined', (msg) => {
  localStorage.setItem('player-id', msg.playerId);
  localStorage.setItem('session-code', codeInput.value);
  localStorage.setItem('unlocked-stages', JSON.stringify(msg.unlockedStages));
  statusEl.textContent = 'Joined! Entering world…';
  setTimeout(() => { window.location.href = 'world-map.html'; }, 600);
});

on('error', (msg) => {
  statusEl.textContent = msg.message;
  btnJoin.disabled = false;
});

on('_disconnect', () => {
  statusEl.textContent = 'Server not reachable';
});

document.getElementById('btn-solo').addEventListener('click', () => {
  localStorage.removeItem('session-code');
  localStorage.removeItem('player-id');
  localStorage.setItem('unlocked-stages', JSON.stringify(['stage_01', 'stage_02', 'stage_03']));
  window.location.href = 'world-map.html';
});

let connected = false;
connect(() => { connected = true; statusEl.textContent = 'Connected'; });

btnJoin.addEventListener('click', () => {
  if (!connected || !charData) return;
  btnJoin.disabled = true;
  statusEl.textContent = 'Joining…';
  send({
    type: 'player_join',
    code: codeInput.value,
    name: charData.name || 'Adventurer',
    role: charData.role || 'warrior',
  });
});
</script>
</body>
</html>
